      const pager = create("div");
      paneHost.appendChild(list);
      paneHost.appendChild(pager);

      const renderGroupList = () => {
        clear(list);
        const groupFilterKeyword = String(state.scheduler.groupFilter || "").trim().toLowerCase();
        const groups = groupFilterKeyword
          ? state.scheduler.groups.filter(g => String(g.name || "").toLowerCase().includes(groupFilterKeyword))
          : state.scheduler.groups;
        const pageInfo = paginate(groups, state.scheduler.groupPage, state.scheduler.groupPageSize);
        state.scheduler.groupPage = pageInfo.current;

        if (!pageInfo.data.length) {
          list.appendChild(create("div", "placeholder", "暂无配置组"));
        } else {
          for (const group of pageInfo.data) {
            const item = create("div", "list-item");
            const top = create("div", "inline-field");
            const check = create("input");
            check.type = "checkbox";
            check.checked = state.scheduler.selectedForRun.has(group.name);
            check.addEventListener("change", () => {
              if (check.checked) state.scheduler.selectedForRun.add(group.name);
              else state.scheduler.selectedForRun.delete(group.name);
            });

            const selectBtn = create("button", `btn ${state.scheduler.selectedGroup === group.name ? "primary" : ""}`, group.name);
            selectBtn.addEventListener("click", async () => {
              try {
                state.scheduler.selectedGroup = group.name;
                await loadSchedulerDetail(api, group.name);
                redrawAll();
              } catch (error) {
                showToast("error", error.message || error);
              }
            });

            top.appendChild(check);
            top.appendChild(selectBtn);
            if (group.nextFlag) {
              top.appendChild(create("span", "chip", "下次组"));
            }
            top.appendChild(create("span", "chip", `${group.projectCount || 0} ${t("项")}`));
            item.appendChild(top);
            list.appendChild(item);
          }
        }

        renderPager(pager, pageInfo, (nextPage) => {
          state.scheduler.groupPage = nextPage;
          renderGroupList();
        });
      };

      bindSearchInput(filterInput, (value) => {
        state.scheduler.groupFilter = value;
        state.scheduler.groupPage = 1;
        renderGroupList();
      });
      renderGroupList();

      runBtn.addEventListener("click", async () => {
        const names = Array.from(state.scheduler.selectedForRun);
        if (!names.length) {
          showToast("warn", "请先勾选要运行的配置组");
          return;
        }
        try {
          await postJson(api.run, { names });
          showToast("ok", l(`已启动 ${names.length} 个配置组`, `Started ${names.length} groups`));
        } catch (error) {
          showToast("error", error.message || error);
        }
      });

      createBtn.addEventListener("click", async () => {
        const name = promptL("输入新配置组名称");
        if (!name || !name.trim()) return;
        try {
          await postJson(api.create, { name: name.trim() });
          if (!state.scheduler.selectedGroup) {
            state.scheduler.selectedGroup = name.trim();
          }
          await schedulerRefreshAll(api);
          redrawAll();
          showToast("ok", "配置组已创建");
        } catch (error) {
          showToast("error", error.message || error);
        }
      });

      copyBtn.addEventListener("click", async () => {
        const name = state.scheduler.selectedGroup || promptL("输入要复制的组名");
        if (!name || !name.trim()) return;
        const copySuffix = state.locale === "en" ? "-copy" : "-副本";
        const newName = promptL("输入复制后的名称（留空自动生成）", `${name.trim()}${copySuffix}`);
        try {
          const payload = { name: name.trim() };
          if (newName && newName.trim()) {
            payload.newName = newName.trim();
          }
          const data = await postJson(api.copy, payload);
          if (data && data.name) {
            state.scheduler.selectedGroup = data.name;
          }
          await schedulerRefreshAll(api);
          redrawAll();
          showToast("ok", l(`复制完成: ${data && data.name ? data.name : "新配置组"}`, `Copy completed: ${data && data.name ? data.name : "New Group"}`));
        } catch (error) {
          showToast("error", error.message || error);
        }
      });

      setNextGroupBtn.addEventListener("click", async () => {
        const name = state.scheduler.selectedGroup || promptL("输入要设为连续起点的组名");
        if (!name || !name.trim()) return;
        try {
          await postJson(api.setNextGroup, { name: name.trim() });
          await schedulerRefreshAll(api);
          redrawAll();
          showToast("ok", l(`已设置连续执行从 ${name.trim()} 开始`, `Continuous run will start from ${name.trim()}`));
        } catch (error) {
          showToast("error", error.message || error);
        }
      });

      clearNextGroupBtn.addEventListener("click", async () => {
        try {
          await postJson(api.setNextGroup, { clear: true });
          await schedulerRefreshAll(api);
          redrawAll();
          showToast("ok", "连续执行起点已清除");
        } catch (error) {
          showToast("error", error.message || error);
        }
      });

      renameBtn.addEventListener("click", async () => {
        const oldName = state.scheduler.selectedGroup || promptL("输入旧名称");
        if (!oldName) return;
        const newName = promptL("输入新名称", oldName);
        if (!newName || newName.trim() === oldName.trim()) return;
        try {
          await postJson(api.rename, { oldName: oldName.trim(), newName: newName.trim() });
          state.scheduler.selectedGroup = newName.trim();
          await schedulerRefreshAll(api);
          redrawAll();
          showToast("ok", "重命名完成");
        } catch (error) {
          showToast("error", error.message || error);
        }
      });

      deleteBtn.addEventListener("click", async () => {
        const name = state.scheduler.selectedGroup || promptL("输入要删除的组名");
        if (!name) return;
        if (!confirmL(l(`确定删除配置组 ${name} ?`, `Delete group ${name} ?`))) return;
        try {
          await postJson(api.delete, { name: name.trim() });
          state.scheduler.selectedForRun.delete(name.trim());
          if (state.scheduler.selectedGroup === name.trim()) {
            state.scheduler.selectedGroup = "";
          }
          await schedulerRefreshAll(api);
          redrawAll();
          showToast("ok", "删除完成");
        } catch (error) {
          showToast("error", error.message || error);
        }
      });
    }

    function drawSchedulerDetail(host, api, redrawAll) {
      clear(host);
      const name = state.scheduler.selectedGroup;
      const detailCount = state.scheduler.detail && Array.isArray(state.scheduler.detail.projects)
        ? state.scheduler.detail.projects.length
        : 0;
      const paneHost = createSchedulerPaneShell(
        host,
        "detail",
        "组详情",
        name
          ? l(`${name} · ${detailCount} 项`, `${name} · ${detailCount} items`)
          : l("未选择配置组", "No group selected"),
        redrawAll
      );
      if (!paneHost) {
        return;
      }
      if (!name || !state.scheduler.detail) {
        paneHost.appendChild(create("div", "placeholder", "未选择配置组"));
        return;
      }

      const statusOptions = Array.isArray(state.scheduler.options.statuses) && state.scheduler.options.statuses.length
        ? state.scheduler.options.statuses
        : ["Enabled", "Disabled"];
      const scheduleOptions = Array.isArray(state.scheduler.options.schedules) && state.scheduler.options.schedules.length
        ? state.scheduler.options.schedules
        : ["Daily", "EveryTwoDays", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];
      const getFilteredProjects = () => {
        const detailFilterKeyword = String(state.scheduler.detailFilter || "").trim().toLowerCase();
        const projectsRaw = Array.isArray(state.scheduler.detail.projects) ? state.scheduler.detail.projects : [];
        if (!detailFilterKeyword) return projectsRaw;
        return projectsRaw.filter(item => {
          const haystack = `${item.name || ""} ${item.type || ""} ${item.folderName || ""}`.toLowerCase();
          return haystack.includes(detailFilterKeyword);
        });
      };
      const collectFilteredIndices = () =>
        getFilteredProjects()
          .map(item => Number(item.index))
          .filter(index => Number.isInteger(index) && index >= 0);
      const runBatchUpdate = async (patch, successLabel) => {
        if (!api.batchUpdate) {
          showToast("warn", "当前后端未提供批量更新接口");
          return;
        }
        const indices = collectFilteredIndices();
        if (!indices.length) {
          showToast("warn", "当前筛选下没有可更新项目");
          return;
        }
        try {
          const data = await postJson(api.batchUpdate, Object.assign({ name, indices }, patch));
          const updated = Number(data && data.updated);
          const total = Number(data && data.total);
          await loadSchedulerDetail(api, name);
          redrawAll();
          showToast(
            "ok",
            l(
              `${successLabel}，已更新 ${Number.isFinite(updated) ? updated : indices.length}/${Number.isFinite(total) ? total : indices.length} 项`,
              `${t(successLabel)}: updated ${Number.isFinite(updated) ? updated : indices.length}/${Number.isFinite(total) ? total : indices.length} items`
            )
          );
        } catch (error) {
          showToast("error", error.message || error);
        }
      };

      paneHost.appendChild(create("div", "muted", l(`当前组: ${name}`, `Current Group: ${name}`)));
      const topOps = create("div", "btn-row");
      const reverseBtn = create("button", "btn", "任务倒序");

            titleLine.appendChild(showMoreBtn);

            row.appendChild(create("div", "muted small", `${item.type || t("Unknown")} · ${item.folderName || "-"}`));
            row.appendChild(

                "div",
                "scheduler-item-summary",
                `${item.status || "-"} · ${item.schedule || "-"} · ${l("次数", "runs")} ${item.runNum || 1}`
              )
            );

            const editRow = create("div", "split");
            const statusSelect = create("select");
            for (const option of statusOptions) {
              const node = create("option");
              node.value = option;
              node.setAttribute("data-i18n-base", String(option));
              node.textContent = t(option);
              statusSelect.appendChild(node);
            }
            const currentStatus = String(item.status || "");

              customStatus.textContent = `${t(currentStatus)} (${t("自定义")})`;

            }
            statusSelect.value = currentStatus || (statusOptions[0] || "Enabled");

            const scheduleSelect = create("select");
            for (const option of scheduleOptions) {
              const node = create("option");
              node.value = option;
              node.setAttribute("data-i18n-base", String(option));
              node.textContent = t(option);
              scheduleSelect.appendChild(node);
            }
            const customScheduleValue = "__custom__";
            const customOption = create("option");
            customOption.value = customScheduleValue;
            customOption.textContent = t("自定义");
            scheduleSelect.appendChild(customOption);

            const customScheduleInput = create("input");
            customScheduleInput.value = item.schedule || "";
            const currentSchedule = String(item.schedule || "");
            if (currentSchedule && scheduleOptions.includes(currentSchedule)) {
              scheduleSelect.value = currentSchedule;
              customScheduleInput.style.display = "none";
            } else {
              scheduleSelect.value = customScheduleValue;
              customScheduleInput.style.display = "";
            }
            scheduleSelect.addEventListener("change", () => {
              customScheduleInput.style.display = scheduleSelect.value === customScheduleValue ? "" : "none";
            });

            editRow.appendChild(wrapWithLabel("状态", statusSelect));
            editRow.appendChild(wrapWithLabel("计划", scheduleSelect));
            const customScheduleField = wrapWithLabel("自定义计划", customScheduleInput);

            const runNumInput = create("input");
            runNumInput.type = "number";
            runNumInput.min = "1";
            runNumInput.value = String(item.runNum || 1);

            const ops = create("div", "btn-row");
            const saveBtn = create("button", "btn", "保存");
            const setNextBtn = create("button", "btn", "设为下次起点");
            const runFromBtn = create("button", "btn primary", "从此项开始");
            const upBtn = create("button", "btn", "上移");
            const downBtn = create("button", "btn", "下移");
            const removeBtn = create("button", "btn danger", "移除");
            ops.appendChild(saveBtn);
            ops.appendChild(setNextBtn);
            ops.appendChild(runFromBtn);
            ops.appendChild(upBtn);
            ops.appendChild(downBtn);
            ops.appendChild(removeBtn);

            saveBtn.addEventListener("click", async () => {
              try {
                const rawScheduleValue = scheduleSelect.value === customScheduleValue
                  ? String(customScheduleInput.value || "").trim()
                  : scheduleSelect.value;
                const scheduleValue = normalizeOptionValue(rawScheduleValue, scheduleOptions);
                if (!scheduleValue) {
                  showToast("warn", "计划不能为空");
                  return;
                }

                await postJson(api.updateItem, {
                  name,
                  index: item.index,
                  status: statusSelect.value,
                  schedule: scheduleValue,
                  runNum: Math.max(1, Number(runNumInput.value) || 1)
                });
                await loadSchedulerDetail(api, name);
                redrawAll();
                showToast("ok", "项目已更新");
              } catch (error) {
                showToast("error", error.message || error);
              }
            });

            setNextBtn.addEventListener("click", async () => {
              try {
                await postJson(api.setNext, { name, index: item.index });
                await loadSchedulerDetail(api, name);
                redrawAll();

                showToast("error", error.message || error);
              }

              if (!confirmL(l(`确认从「${item.name}」开始立即运行当前配置组？`, `Run current group immediately from "${item.name}"?`))) return;
              try {
                await postJson(api.runFrom, { name, index: item.index });
                await loadSchedulerDetail(api, name);
                redrawAll();

              } catch (error) {
                showToast("error", error.message || error);
              }
            });

            upBtn.addEventListener("click", async () => {
              if (item.index <= 0) return;
              try {
                await postJson(api.reorder, { name, fromIndex: item.index, toIndex: item.index - 1 });
                await loadSchedulerDetail(api, name);
                redrawAll();
              } catch (error) {
                showToast("error", error.message || error);
              }
            });

            downBtn.addEventListener("click", async () => {
              try {
                await postJson(api.reorder, { name, fromIndex: item.index, toIndex: item.index + 1 });
                await loadSchedulerDetail(api, name);
                redrawAll();
              } catch (error) {
                showToast("error", error.message || error);
              }
            });

            removeBtn.addEventListener("click", async () => {
              if (!confirmL(l(`确认移除 ${item.name} ?`, `Remove ${item.name} ?`))) return;
              try {
                await postJson(api.removeItem, { name, index: item.index });
                await loadSchedulerDetail(api, name);
                redrawAll();
                showToast("ok", "项目已移除");
              } catch (error) {
                showToast("error", error.message || error);

            detailsWrap.appendChild(wrapWithLabel("运行次数", runNumInput));
            detailsWrap.appendChild(ops);
            const expanded = state.scheduler.detailExpandedKeys.has(detailKey);
            detailsWrap.style.display = expanded ? "" : "none";
            showMoreBtn.addEventListener("click", () => {
              const nextExpanded = !state.scheduler.detailExpandedKeys.has(detailKey);
              if (nextExpanded) {
                state.scheduler.detailExpandedKeys.add(detailKey);
              } else {
                state.scheduler.detailExpandedKeys.delete(detailKey);
              }

            });
            row.appendChild(detailsWrap);
            list.appendChild(row);

        renderPager(pager, pageInfo, (nextPage) => {
          state.scheduler.detailPage = nextPage;

      bindSearchInput(filterInput, (value) => {
        state.scheduler.detailFilter = value;
        state.scheduler.detailPage = 1;
        renderDetailList();
      });

      reverseBtn.addEventListener("click", async () => {
        try {
          await postJson(api.reverse, { name });
          await loadSchedulerDetail(api, name);
          redrawAll();
          showToast("ok", "任务顺序已倒置");
        } catch (error) {
          showToast("error", error.message || error);
        }
      });

      clearNextBtn.addEventListener("click", async () => {
        try {
          await postJson(api.setNext, { name, clear: true });
          await loadSchedulerDetail(api, name);
          redrawAll();
          showToast("ok", "下次起点已清除");
        } catch (error) {
          showToast("error", error.message || error);
        }
      });

      exportBtn.addEventListener("click", async () => {
        try {
          const data = await postJson(api.exportMerged, { name });
          state.scheduler.lastExport = data || null;
          redrawAll();
          showToast("ok", l(`已导出 ${data.count || 0} 个合并追踪 JSON`, `Exported ${data.count || 0} merged pathing JSON`));
        } catch (error) {
          showToast("error", error.message || error);
        }
      });

      batchEnableBtn.addEventListener("click", async () => {
        await runBatchUpdate({ status: "Enabled" }, "批量启用已应用");
      });

      batchDisableBtn.addEventListener("click", async () => {
        await runBatchUpdate({ status: "Disabled" }, "批量禁用已应用");
      });

      batchScheduleBtn.addEventListener("click", async () => {
        const hint = scheduleOptions.length
          ? l(`输入计划（示例: ${scheduleOptions.join(" / ")}）`, `Enter schedule (e.g. ${scheduleOptions.join(" / ")})`)
          : l("输入计划", "Enter schedule");
        const nextSchedule = promptL(hint, scheduleOptions[0] || "Daily");
        if (nextSchedule === null) return;
        const schedule = normalizeOptionValue(nextSchedule, scheduleOptions);
        if (!schedule) {
          showToast("warn", "计划不能为空");
          return;
        }
        await runBatchUpdate({ schedule }, "批量计划已应用");
      });

      batchRunNumBtn.addEventListener("click", async () => {
        const raw = promptL(l("输入运行次数（正整数）", "Enter run count (positive integer)"), "1");
        if (raw === null) return;
        const parsed = Number(raw);
        if (!Number.isFinite(parsed) || parsed < 1) {
          showToast("warn", "运行次数必须是正整数");
          return;
        }
        await runBatchUpdate({ runNum: Math.max(1, Math.floor(parsed)) }, "批量运行次数已应用");
      });

      expandRowsBtn.addEventListener("click", () => {
        for (const project of getFilteredProjects()) {
          state.scheduler.detailExpandedKeys.add(`${name}:${project.index}`);
        }
        renderDetailList();
      });

      collapseRowsBtn.addEventListener("click", () => {
        for (const project of getFilteredProjects()) {
          state.scheduler.detailExpandedKeys.delete(`${name}:${project.index}`);
        }
        renderDetailList();
      });
      renderDetailList();
    }

    function drawSchedulerLibraryAndJson(host, api, redrawAll) {
      clear(host);
      const libCount =
        state.scheduler.library.js.length +
        state.scheduler.library.keymouse.length +
        state.scheduler.library.pathing.length;
      const paneHost = createSchedulerPaneShell(
        host,
        "library",
        "脚本库与组 JSON",
        l(`${libCount} 项`, `${libCount} items`),
        redrawAll
      );
      if (!paneHost) {
        return;
      }

      const actionRow = create("div", "btn-row");
      const addBtn = create("button", "btn primary", "添加勾选项到当前组");
      const addShellBtn = create("button", "btn", "添加Shell命令");
      const clearSelectionBtn = create("button", "btn", "清空勾选");
      actionRow.appendChild(addBtn);
      actionRow.appendChild(addShellBtn);
      actionRow.appendChild(clearSelectionBtn);
      paneHost.appendChild(actionRow);

      const tabs = create("div", "split");
      tabs.appendChild(drawSchedulerLibraryList("js", "JS", state.scheduler.library.js));
      tabs.appendChild(drawSchedulerLibraryList("keymouse", "KeyMouse", state.scheduler.library.keymouse));
      paneHost.appendChild(tabs);
      paneHost.appendChild(drawSchedulerLibraryList("pathing", "Pathing", state.scheduler.library.pathing));

      const shellWrap = create("div", "field");
      const shellArea = create("textarea", "mono");
      shellArea.style.minHeight = "90px";
      shellArea.placeholder = t("每行一个 Shell 命令，添加后会作为 Shell 类型任务写入当前组");
      shellArea.value = state.scheduler.shellDraft || "";
      shellArea.addEventListener("input", () => {
        state.scheduler.shellDraft = shellArea.value;
      });
      shellWrap.appendChild(create("label", "", "Shell 任务（低代码维护入口）"));
      shellWrap.appendChild(shellArea);
      paneHost.appendChild(shellWrap);

      const jsonWrap = create("div", "field");
      const jsonArea = create("textarea", "mono");
      jsonArea.style.minHeight = "180px";
      jsonArea.value = state.scheduler.groupJson || "";
      jsonWrap.appendChild(create("label", "", "当前组 JSON"));
      jsonWrap.appendChild(jsonArea);
      jsonWrap.appendChild(create("div", "muted small", "保存前会先做本地 JSON 格式校验"));

      const jsonOps = create("div", "btn-row");
      const loadBtn = create("button", "btn", "重载 JSON");
      const saveBtn = create("button", "btn", "保存 JSON");
      jsonOps.appendChild(loadBtn);
      jsonOps.appendChild(saveBtn);
      jsonWrap.appendChild(jsonOps);
      paneHost.appendChild(jsonWrap);

      clearSelectionBtn.addEventListener("click", () => {
        state.scheduler.librarySelected.js.clear();
        state.scheduler.librarySelected.keymouse.clear();
        state.scheduler.librarySelected.pathing.clear();
        redrawAll();
      });

      loadBtn.addEventListener("click", async () => {
        if (!state.scheduler.selectedGroup) return;
        try {
          const text = await requestText(`${api.get}?name=${encodeURIComponent(state.scheduler.selectedGroup)}`);
          state.scheduler.groupJson = text;
          jsonArea.value = text;
          showToast("ok", "JSON 已重载");
        } catch (error) {
          showToast("error", error.message || error);
        }
      });

      saveBtn.addEventListener("click", async () => {
        try {
          let parsed;
          try {
            parsed = JSON.parse(jsonArea.value);
          } catch (error) {
            showToast("error", `JSON 格式错误: ${error.message || error}`);
            return;
          }
          if (!parsed || typeof parsed !== "object" || Array.isArray(parsed)) {
            showToast("error", "JSON 必须是对象");
            return;
          }
          if (!parsed.name || !String(parsed.name).trim()) {
            showToast("warn", "JSON 需包含非空 name 字段");
            return;
          }

          await postJson(api.save, { json: jsonArea.value });
          state.scheduler.selectedGroup = String(parsed.name).trim();
          state.scheduler.groupJson = jsonArea.value;
          await schedulerRefreshAll(api);
          redrawAll();
          showToast("ok", "JSON 已保存");
        } catch (error) {
          showToast("error", error.message || error);
        }
      });

      addBtn.addEventListener("click", async () => {
        const groupName = state.scheduler.selectedGroup;
        if (!groupName) {
          showToast("warn", "请先选择配置组");
          return;
        }

        const jsFolders = Array.from(state.scheduler.librarySelected.js);
        const keyMouseNames = Array.from(state.scheduler.librarySelected.keymouse);
        const pathing = Array.from(state.scheduler.librarySelected.pathing).map(encoded => {
          try {
            return JSON.parse(encoded);
          } catch {
            return null;
          }
        }).filter(Boolean);

        if (!jsFolders.length && !keyMouseNames.length && !pathing.length) {
          showToast("warn", "请先勾选要添加的脚本");
          return;
        }

        try {
          await postJson(api.addItems, {
            name: groupName,
            jsFolders,
            keyMouseNames,
            pathing
          });
          await loadSchedulerDetail(api, groupName);
          redrawAll();
          showToast("ok", "已添加到配置组");
        } catch (error) {
          showToast("error", error.message || error);
        }
      });

      addShellBtn.addEventListener("click", async () => {
        const groupName = state.scheduler.selectedGroup;
        if (!groupName) {
          showToast("warn", "请先选择配置组");
          return;
        }

        const shellCommands = String(shellArea.value || "")
          .split(/\r?\n/)
          .map(x => x.trim())
          .filter(Boolean);
        if (!shellCommands.length) {
          showToast("warn", "请先输入 Shell 命令");
          return;
        }

        try {
          await postJson(api.addItems, {
            name: groupName,
            shellCommands
          });
          state.scheduler.shellDraft = "";
          shellArea.value = "";
          await loadSchedulerDetail(api, groupName);
          redrawAll();
          showToast("ok", l(`已添加 ${shellCommands.length} 条 Shell 任务`, `Added ${shellCommands.length} shell tasks`));
        } catch (error) {
          showToast("error", error.message || error);
        }
      });
    }

    function drawSchedulerLibraryList(kind, title, items) {
      const wrap = create("div", "card");
      wrap.style.padding = "8px";
      wrap.appendChild(create("h5", "", `${title} (${Array.isArray(items) ? items.length : 0})`));
      const filterState =
        state.scheduler.libraryFilter && typeof state.scheduler.libraryFilter === "object"
          ? state.scheduler.libraryFilter
          : { js: "", keymouse: "", pathing: "" };
      state.scheduler.libraryFilter = filterState;
      const filterWrap = create("div", "btn-row");
      const filterInput = create("input");
      filterInput.placeholder = l(`搜索 ${title}`, `Search ${title}`);
      filterInput.value = String(filterState[kind] || "");
      filterInput.style.minWidth = "180px";
      filterWrap.appendChild(filterInput);
      wrap.appendChild(filterWrap);

      const list = create("div", "list");
      const pager = create("div");
      wrap.appendChild(list);
      wrap.appendChild(pager);

      const renderLibraryList = () => {
        clear(list);
        const page = state.scheduler.libraryPage[kind] || 1;
        const keyword = String(filterState[kind] || "").trim().toLowerCase();
        const rawItems = Array.isArray(items) ? items : [];
        const filteredItems = keyword
          ? rawItems.filter(item => {
            const haystack = `${item && item.name ? item.name : ""} ${item && item.folder ? item.folder : ""} ${item && item.type ? item.type : ""}`.toLowerCase();
            return haystack.includes(keyword);
          })
          : rawItems;
        const pageInfo = paginate(filteredItems, page, state.scheduler.libraryPageSize);
        state.scheduler.libraryPage[kind] = pageInfo.current;

        if (!pageInfo.data.length) {
          list.appendChild(create("div", "placeholder", keyword ? "无匹配结果" : "空"));
        } else {
          for (const item of pageInfo.data) {
            const row = create("div", "list-item");
            const check = create("input");
            check.type = "checkbox";

            let key;
            if (kind === "js") {
              key = item.folder || item.name;
            } else if (kind === "keymouse") {
              key = item.name;
            } else {
              key = JSON.stringify({ name: item.name, folder: item.folder || "" });
            }

            check.checked = state.scheduler.librarySelected[kind].has(key);
            check.addEventListener("change", () => {
              if (check.checked) state.scheduler.librarySelected[kind].add(key);
              else state.scheduler.librarySelected[kind].delete(key);
            });

            const titleLine = create("div", "inline-field");
            titleLine.appendChild(check);
            titleLine.appendChild(create("span", "name", item.name || item.folder || "未命名"));
            row.appendChild(titleLine);

            if (item.folder) {
              row.appendChild(create("div", "muted small mono", `folder: ${item.folder}`));
            }

            list.appendChild(row);
          }
        }

        renderPager(pager, pageInfo, (nextPage) => {
          state.scheduler.libraryPage[kind] = nextPage;
          renderLibraryList();
        });
      };

      bindSearchInput(filterInput, (value) => {
        filterState[kind] = value;
        state.scheduler.libraryPage[kind] = 1;
        renderLibraryList();
      });
      renderLibraryList();

      return wrap;
    }

    function wrapWithLabel(labelText, input) {
      const field = create("div", "field");
      field.appendChild(create("label", "", labelText));
      field.appendChild(input);
      return field;
    }

      const layout = create("div", "one-dragon-layout");
      const fieldPanel = create("section", "one-dragon-panel one-dragon-fields-panel");
      const taskPanel = create("section", "one-dragon-panel one-dragon-tasks-panel");
      const jsonPanel = create("section", "one-dragon-panel one-dragon-json-panel");

      const fieldTool = create("div", "btn-row");
      const fieldSearch = create("input");
      fieldSearch.placeholder = t("筛选字段");
      fieldSearch.style.minWidth = "220px";
      const fieldPageSize = create("select");
      for (const n of [5, 10, 20]) {
        const opt = create("option");
        opt.value = String(n);
        opt.textContent = `${n} ${t("字段/页")}`;
        fieldPageSize.appendChild(opt);
      }
      fieldPageSize.value = String(defaultFieldPageSize);
      fieldTool.appendChild(create("span", "chip", "配置字段"));
      fieldTool.appendChild(fieldSearch);
      fieldTool.appendChild(fieldPageSize);

      const fieldArea = create("div", "list");
      const fieldPager = create("div");
      fieldPanel.appendChild(create("h4", "", "配置字段"));
      fieldPanel.appendChild(fieldTool);
      fieldPanel.appendChild(fieldArea);
      fieldPanel.appendChild(fieldPager);

      const taskTool = create("div", "btn-row");
      const taskCatalog = create("select");
      taskCatalog.style.minWidth = "220px";
      const taskCustom = create("input");
      taskCustom.placeholder = t("或输入自定义任务名");
      taskCustom.style.minWidth = "200px";
      const taskAddBtn = create("button", "btn", "新增任务");
      const taskFilter = create("input");
      taskFilter.placeholder = t("筛选任务");
      taskFilter.style.minWidth = "180px";
      const taskPageSize = create("select");
      for (const n of [5, 10, 20]) {
        const opt = create("option");
        opt.value = String(n);
        opt.textContent = `${n} ${t("任务/页")}`;
        taskPageSize.appendChild(opt);
      }
      taskPageSize.value = String(defaultTaskPageSize);
      taskTool.appendChild(create("span", "chip", "任务编排"));
      taskTool.appendChild(taskCatalog);
      taskTool.appendChild(taskCustom);
      taskTool.appendChild(taskAddBtn);
      taskTool.appendChild(taskFilter);
      taskTool.appendChild(taskPageSize);

      const taskArea = create("div", "list");
      const taskPager = create("div");
      taskPanel.appendChild(create("h4", "", "任务编排"));
      taskPanel.appendChild(taskTool);
      taskPanel.appendChild(taskArea);
      taskPanel.appendChild(taskPager);

      const jsonTool = create("div", "btn-row");
      const applyJsonBtn = create("button", "btn", "从 JSON 应用到编辑器");
      jsonTool.appendChild(create("span", "chip", "高级 JSON"));
      jsonTool.appendChild(applyJsonBtn);

      const jsonArea = create("textarea", "mono");
      jsonArea.style.minHeight = "220px";
      jsonPanel.appendChild(create("h4", "", "高级 JSON"));
      jsonPanel.appendChild(jsonTool);
      jsonPanel.appendChild(jsonArea);

      if (state.standaloneMode) {
        card.classList.add("is-standalone-workspace");
        layout.classList.add("is-standalone-workspace");
        // 在电脑端保持双列布局，只在移动端使用单列
        // layout.style.gridTemplateColumns = "1fr";
        fieldPanel.style.gridColumn = "auto";
        taskPanel.style.gridColumn = "auto";
        jsonPanel.style.gridColumn = "1 / -1";
      }

      body.appendChild(intro);
      body.appendChild(layout);
      layout.appendChild(fieldPanel);
      layout.appendChild(taskPanel);
      layout.appendChild(jsonPanel);

      let currentConfig = null;
      let oneDragonOptions = { taskCatalog: [], optionMap: {}, fieldOrder: [] };
      const fieldState = { page: 1, pageSize: defaultFieldPageSize, filter: "" };
      const taskState = { page: 1, pageSize: defaultTaskPageSize, filter: "" };

      const syncJsonArea = () => {
        jsonArea.value = currentConfig ? toJsonPretty(currentConfig) : "";
      };

      const ensureTaskMap = () => {
        if (!currentConfig || typeof currentConfig !== "object") return {};
        const map = currentConfig.TaskEnabledList;
        if (!map || typeof map !== "object" || Array.isArray(map)) {
          currentConfig.TaskEnabledList = {};
        } else {
          currentConfig.TaskEnabledList = Object.fromEntries(Object.entries(map).map(([k, v]) => [k, !!v]));
        }
        return currentConfig.TaskEnabledList;
      };

      const rebuildTaskMap = (entries) => {
        const clean = {};
        for (const [name, enabled] of entries) {
          const key = String(name || "").trim();
          if (!key) continue;
          clean[key] = !!enabled;
        }
        currentConfig.TaskEnabledList = clean;
        syncJsonArea();
      };

      const refreshTaskCatalog = () => {
        clear(taskCatalog);
        const seen = new Set();
        const all = [];
        for (const item of Array.isArray(oneDragonOptions.taskCatalog) ? oneDragonOptions.taskCatalog : []) {
          const name = String(item || "").trim();
          if (!name || seen.has(name)) continue;
          seen.add(name);
          all.push(name);
        }
        for (const name of Object.keys(ensureTaskMap())) {
          if (!name || seen.has(name)) continue;
          seen.add(name);
          all.push(name);
        }
        all.sort((a, b) => a.localeCompare(b, "zh-CN"));
        const empty = create("option");
        empty.value = "";
        empty.textContent = t("选择可添加任务");
        taskCatalog.appendChild(empty);
        for (const name of all) {
          const opt = create("option");
          opt.value = name;
          opt.textContent = name;
          taskCatalog.appendChild(opt);
        }
      };

      const buildFieldDefs = () => {
        if (!currentConfig || typeof currentConfig !== "object") return [];
        const optionMap = oneDragonOptions && oneDragonOptions.optionMap && typeof oneDragonOptions.optionMap === "object"
          ? oneDragonOptions.optionMap
          : {};
        const preferred = Array.isArray(oneDragonOptions.fieldOrder) ? oneDragonOptions.fieldOrder.map(x => String(x)) : [];
        const preferredIndex = new Map(preferred.map((x, idx) => [x, idx]));
        const ignore = new Set(["Name", "TaskEnabledList"]);
        const defs = [];
        for (const key of Object.keys(currentConfig)) {
          if (ignore.has(key)) continue;
          const value = currentConfig[key];
          const options = Array.isArray(optionMap[key]) ? optionMap[key] : null;
          let type = inferTypeFromValue(key, value);
          if (options && (typeof value === "string" || value == null)) {
            type = "select";
          }
          defs.push({
            key,
            label: toFriendlyLabel(key),
            type,
            value: cloneValue(value),
            options
          });
        }
        defs.sort((a, b) => {
          const ai = preferredIndex.has(a.key) ? preferredIndex.get(a.key) : 9999;
          const bi = preferredIndex.has(b.key) ? preferredIndex.get(b.key) : 9999;
          if (ai !== bi) return ai - bi;
          return a.key.localeCompare(b.key, "zh-CN");
        });
        return defs;
      };

      const drawFields = () => {
        clear(fieldArea);
        if (!currentConfig) {
          fieldArea.appendChild(create("div", "placeholder", "未加载配置"));
          renderPager(fieldPager, { current: 1, total: 1, count: 0, size: fieldState.pageSize }, () => { });
          return;
        }

        const defs = buildFieldDefs();
        const keyword = fieldState.filter.trim().toLowerCase();
        const filtered = keyword
          ? defs.filter(d => `${d.key} ${d.label}`.toLowerCase().includes(keyword))
          : defs;
        const pageInfo = paginate(filtered, fieldState.page, fieldState.pageSize);
        fieldState.page = pageInfo.current;

        if (!pageInfo.data.length) {
          fieldArea.appendChild(create("div", "placeholder", "没有匹配字段"));
        } else {
          for (const def of pageInfo.data) {
            const row = create("div", "list-item");
            const control = createFieldControl(
              { key: def.key, label: def.label, type: def.type, options: def.options },
              def.value,
              def.options
            );
            const applyBtn = create("button", "btn", "应用本项");
            applyBtn.addEventListener("click", () => {
              try {
                currentConfig[def.key] = control.getValue();
                syncJsonArea();
                showToast("ok", `${def.label || def.key} 已应用`);
              } catch (error) {
                showToast("error", `应用失败: ${error.message || error}`);
              }
            });
            if (control.input) {
              const evt = def.type === "bool" || def.type === "select" || def.type === "enum" ? "change" : "blur";
              control.input.addEventListener(evt, () => {
                try {
                  currentConfig[def.key] = control.getValue();
                  syncJsonArea();
                } catch {
                }
              });
            }
            row.appendChild(control.field);
            row.appendChild(applyBtn);
            fieldArea.appendChild(row);
          }
        }

        renderPager(fieldPager, pageInfo, (nextPage) => {
          fieldState.page = nextPage;
          drawFields();
        });
      };

      const drawTasks = () => {
        clear(taskArea);
        if (!currentConfig) {
          taskArea.appendChild(create("div", "placeholder", "未加载配置"));
          renderPager(taskPager, { current: 1, total: 1, count: 0, size: taskState.pageSize }, () => { });
          return;
        }

        const taskMap = ensureTaskMap();
        const allEntries = Object.entries(taskMap);
        const keyword = taskState.filter.trim().toLowerCase();
        const filteredEntries = keyword
          ? allEntries.filter(([name]) => String(name || "").toLowerCase().includes(keyword))
          : allEntries;
        const pageInfo = paginate(filteredEntries, taskState.page, taskState.pageSize);
        taskState.page = pageInfo.current;

        if (!pageInfo.data.length) {
          taskArea.appendChild(create("div", "placeholder", "当前配置没有任务开关"));
        } else {
          for (const [name, enabled] of pageInfo.data) {
            const row = create("div", "list-item");
            row.appendChild(create("div", "name", name));
            const ops = create("div", "btn-row");
            const toggle = create("label", "toggle");
            const checkbox = create("input");
            checkbox.type = "checkbox";
            checkbox.checked = !!enabled;
            checkbox.addEventListener("change", () => {
              taskMap[name] = checkbox.checked;
              syncJsonArea();
            });
            toggle.appendChild(checkbox);
            toggle.appendChild(create("span", "", "启用"));

            const upBtn = create("button", "btn", "上移");
            const downBtn = create("button", "btn", "下移");
            const removeBtn = create("button", "btn danger", "移除");

            upBtn.addEventListener("click", () => {
              const entries = Object.entries(ensureTaskMap());
              const idx = entries.findIndex(x => x[0] === name);
              if (idx <= 0) return;
              const tmp = entries[idx - 1];
              entries[idx - 1] = entries[idx];
              entries[idx] = tmp;
              rebuildTaskMap(entries);
              drawTasks();
            });

            downBtn.addEventListener("click", () => {
              const entries = Object.entries(ensureTaskMap());
              const idx = entries.findIndex(x => x[0] === name);
              if (idx < 0 || idx >= entries.length - 1) return;
              const tmp = entries[idx + 1];
              entries[idx + 1] = entries[idx];
              entries[idx] = tmp;
              rebuildTaskMap(entries);
              drawTasks();
            });

            removeBtn.addEventListener("click", () => {
              const entries = Object.entries(ensureTaskMap()).filter(x => x[0] !== name);
              rebuildTaskMap(entries);
              drawTasks();
            });

            ops.appendChild(toggle);
            ops.appendChild(upBtn);
            ops.appendChild(downBtn);
            ops.appendChild(removeBtn);
            row.appendChild(ops);
            taskArea.appendChild(row);
          }
        }

        renderPager(taskPager, pageInfo, (nextPage) => {
          taskState.page = nextPage;
          drawTasks();
        });
      };

      const updateStandaloneViewActions = () => {
        if (state.standaloneMode) {
          card.classList.toggle("is-density-compact", !oneDragonExpandedView);
        }
        // 不再需要更新按钮状态
      };

      const applyStandaloneViewPreset = (expanded, showTip) => {
        if (!state.standaloneMode) return;
        oneDragonExpandedView = !!expanded;
        fieldState.page = 1;
        taskState.page = 1;
        // 始终使用默认的分页大小（5条/页）
        fieldState.pageSize = defaultFieldPageSize;
        taskState.pageSize = defaultTaskPageSize;
        fieldPageSize.value = String(fieldState.pageSize);
        taskPageSize.value = String(taskState.pageSize);
        drawFields();
        drawTasks();
        updateStandaloneViewActions();
        if (showTip) {
          showToast("ok", oneDragonExpandedView ? "已切换视图" : "已恢复分页模式");
        }
      };

      updateStandaloneViewActions();

      const loadConfigByName = async (name) => {
        if (!name) return;
        const text = await requestText(`${endpoints.get}?name=${encodeURIComponent(name)}`);
        const parsed = JSON.parse(text);
        if (!parsed || typeof parsed !== "object") {
          throw new Error("配置数据格式错误");
        }
        currentConfig = parsed;
        if (!currentConfig.Name) currentConfig.Name = name;
        ensureTaskMap();
        syncJsonArea();
        refreshTaskCatalog();
        drawFields();
        drawTasks();
      };

      const refreshConfigs = async () => {
        const data = await requestJson(endpoints.list);
        clear(select);
        const configs = Array.isArray(data.configs) ? data.configs : [];
        for (const name of configs) {
          const opt = create("option");
          opt.value = name;
          opt.textContent = name;
          select.appendChild(opt);
        }
        if (data.selected) {
          select.value = data.selected;
        }
        if (!select.value && configs.length) {
          select.value = configs[0];
        }
        if (select.value) {
          await loadConfigByName(select.value);
        } else {
          currentConfig = null;
          syncJsonArea();
          drawFields();
          drawTasks();
        }
      };

      const refreshOptions = async () => {
        try {
          const data = await requestJson(endpoints.options);
          if (data && typeof data === "object") {
            oneDragonOptions = {
              taskCatalog: Array.isArray(data.taskCatalog) ? data.taskCatalog : [],
              optionMap: data.optionMap && typeof data.optionMap === "object" ? data.optionMap : {},
              fieldOrder: Array.isArray(data.fieldOrder) ? data.fieldOrder : []
            };
          } else {
            oneDragonOptions = { taskCatalog: [], optionMap: {}, fieldOrder: [] };
          }
        } catch {
          oneDragonOptions = { taskCatalog: [], optionMap: {}, fieldOrder: [] };
        }
        refreshTaskCatalog();
      };

      const addTask = (taskName) => {
        const name = String(taskName || "").trim();
        if (!name) return;
        const entries = Object.entries(ensureTaskMap());
        if (entries.some(x => x[0] === name)) {
          showToast("warn", "任务已存在");
          return;
        }
        entries.push([name, true]);
        rebuildTaskMap(entries);
        taskState.page = 1;
        refreshTaskCatalog();
        drawTasks();
      };

      select.addEventListener("change", () => loadConfigByName(select.value).catch(err => showToast("error", err.message || err)));

      bindSearchInput(fieldSearch, (value) => {
        fieldState.filter = value;
        fieldState.page = 1;
        drawFields();
      });

      fieldPageSize.addEventListener("change", () => {
        fieldState.pageSize = Number(fieldPageSize.value) || defaultFieldPageSize;
        fieldState.page = 1;
        // 不再根据 pageSize 更新 expandedView，因为已移除 999 选项
        drawFields();
      });

      bindSearchInput(taskFilter, (value) => {
        taskState.filter = value;
        taskState.page = 1;
        drawTasks();
      });

      taskPageSize.addEventListener("change", () => {
        taskState.pageSize = Number(taskPageSize.value) || defaultTaskPageSize;
        taskState.page = 1;
        // 不再根据 pageSize 更新 expandedView，因为已移除 999 选项
        drawTasks();
      });

      taskAddBtn.addEventListener("click", () => {
        const custom = taskCustom.value.trim();
        const picked = taskCatalog.value.trim();
        addTask(custom || picked);
        taskCustom.value = "";
      });

      applyJsonBtn.addEventListener("click", () => {
        try {
          const parsed = parseJsonOrThrow(jsonArea.value);
          if (!parsed || typeof parsed !== "object") {
            throw new Error("JSON 需为对象");
          }
          currentConfig = parsed;
          ensureTaskMap();
          refreshTaskCatalog();
          syncJsonArea();
          drawFields();
          drawTasks();
          showToast("ok", "JSON 已应用到编辑器");
        } catch (error) {
          showToast("error", `JSON 解析失败: ${error.message || error}`);
        }
      });

      refreshBtn.addEventListener("click", async () => {
        try {
          await refreshOptions();
          await refreshConfigs();
          showToast("ok", "一条龙配置已刷新");
        } catch (error) {
          showToast("error", error.message || error);
        }
      });

      chooseBtn.addEventListener("click", async () => {
        try {
          if (!select.value) return;
          await postJson(endpoints.select, { name: select.value });
          showToast("ok", "已切换当前配置");
        } catch (error) {
          showToast("error", error.message || error);
        }
      });

      runBtn.addEventListener("click", async () => {
        try {
          if (!select.value) return;
          await postJson(endpoints.run, { name: select.value });
          showToast("ok", "一条龙已启动");
        } catch (error) {
          showToast("error", error.message || error);
        }
      });

      cloneBtn.addEventListener("click", async () => {
        try {
          if (!select.value) return;
          const suggest = `${select.value}${state.locale === "en" ? "-copy" : "-副本"}`;
          const newName = promptL(l("输入克隆后的配置名（可留空自动生成）", "Enter cloned config name (blank for auto)"), suggest);
          const data = await postJson(endpoints.clone, { name: select.value, newName: newName == null ? "" : newName.trim() });
          await refreshConfigs();
          if (data && data.name) {
            select.value = String(data.name);
            await loadConfigByName(select.value);
          }
          showToast("ok", "配置已克隆");
        } catch (error) {
          showToast("error", error.message || error);
        }
      });

      renameBtn.addEventListener("click", async () => {
        try {
          if (!select.value) return;
          const newName = promptL(l("输入新的配置名", "Enter new config name"), select.value);
          if (!newName) return;
          await postJson(endpoints.rename, { oldName: select.value, newName: newName.trim() });
          await refreshConfigs();
          select.value = newName.trim();
          await loadConfigByName(select.value);
          showToast("ok", "配置已重命名");
        } catch (error) {
          showToast("error", error.message || error);
        }
      });

      deleteBtn.addEventListener("click", async () => {
        try {
          if (!select.value) return;
          const ok = confirmL(l(`确认删除一条龙配置「${select.value}」吗？`, `Delete One-Dragon config "${select.value}"?`));
          if (!ok) return;
          await postJson(endpoints.delete, { name: select.value });
          await refreshConfigs();
          showToast("ok", "配置已删除");
        } catch (error) {
          showToast("error", error.message || error);
        }
      });

      saveBtn.addEventListener("click", async () => {
        try {
          const parsed = parseJsonOrThrow(jsonArea.value);
          if (!parsed || typeof parsed !== "object") {
            throw new Error("配置 JSON 需为对象");
          }
          if (!parsed.Name) {
            parsed.Name = select.value || (currentConfig && currentConfig.Name) || "";
          }
          if (!parsed.Name) {
            throw new Error("配置名为空，请先选择配置或通过重命名创建配置名");
          }
          const res = await fetch(endpoints.save, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(parsed)
          });
          const text = await res.text();
          if (!res.ok) {
            throw new Error(text || `${res.status} ${res.statusText}`);
          }
          currentConfig = parsed;
          await refreshConfigs();
          if (parsed.Name) {
            select.value = parsed.Name;
            await loadConfigByName(select.value);
          }
          showToast("ok", "配置已保存");
        } catch (error) {
          showToast("error", `保存失败: ${error.message || error}`);
        }
      });

      host.appendChild(card);

      try {
        await refreshOptions();
        await refreshConfigs();
      } catch (error) {
        body.appendChild(create("div", "placeholder", `加载失败: ${error.message || error}`));
      }
    }

    async function loadLibrary(kind) {
      if (kind === "js") {
        const data = await requestJson("/api/library/js");
        state.libraryView.js.items = Array.isArray(data) ? data : [];
        return;
      }
      if (kind === "pathing") {
        const data = await requestJson("/api/library/pathing");
        state.libraryView.pathing.items = Array.isArray(data) ? data : [];
        return;
      }
      if (kind === "keymouse") {
        const data = await requestJson("/api/library/keymouse");
        state.libraryView.keymouse.status = data.status || "Unknown";
        state.libraryView.keymouse.items = Array.isArray(data.items) ? data.items : [];
      }
    }

    async function renderLibrarySection(section, host) {
      const kind = section.kind || "js";
      const view = state.libraryView[kind];
      const { card, body, tools } = createSectionCard(section);

      // 添加搜索输入框
      const filterInput = create("input");
      filterInput.placeholder = t("搜索名称或路径");
      filterInput.style.minWidth = "180px";
      filterInput.value = view.filter || "";
      filterInput.setAttribute("aria-label", t("搜索名称或路径"));
      tools.appendChild(filterInput);

      const list = create("div", "list");
      const pager = create("div");

      const refreshBtn = create("button", "btn", "刷新");
      tools.appendChild(refreshBtn);

      let statusChip = null;
      if (kind === "keymouse") {
        const startBtn = create("button", "btn", "开始录制");
        const stopBtn = create("button", "btn", "停止录制");
        statusChip = create("span", "chip", "状态: -");
        tools.appendChild(startBtn);
        tools.appendChild(stopBtn);
        tools.appendChild(statusChip);

        startBtn.addEventListener("click", async () => {
          try {
            await postJson("/api/library/keymouse/record/start", {});
            await loadLibrary("keymouse");
            draw();
            showToast("ok", "已开始录制");
          } catch (error) {
            showToast("error", error.message || error);
          }
        });

        stopBtn.addEventListener("click", async () => {
          try {
            const data = await postJson("/api/library/keymouse/record/stop", {});
            await loadLibrary("keymouse");
            draw();
            showToast("ok", data.fileName ? l(`录制已保存: ${data.fileName}`, `Recording saved: ${data.fileName}`) : "录制已停止");
          } catch (error) {
            showToast("error", error.message || error);
          }
        });
      }

      refreshBtn.addEventListener("click", async () => {
        try {
          await loadLibrary(kind);
          draw();
          showToast("ok", l(`${section.title} 已刷新`, `${section.title} refreshed`));
        } catch (error) {
          showToast("error", error.message || error);
        }
      });

      // 绑定搜索输入框
      bindSearchInput(filterInput, (value) => {
        view.filter = value;
        view.page = 1;
        draw();
      });

      body.appendChild(list);
      body.appendChild(pager);
      host.appendChild(card);

      function draw() {
        clear(list);

        // 应用搜索过滤
        const keyword = String(view.filter || "").trim().toLowerCase();
        const rawItems = Array.isArray(view.items) ? view.items : [];
        const filteredItems = keyword
          ? rawItems.filter(item => {
            const haystack = `${item.name || ""} ${item.folder || ""} ${item.relativePath || ""}`.toLowerCase();
            return haystack.includes(keyword);
          })
          : rawItems;

        const pageInfo = paginate(filteredItems, view.page, view.pageSize);
        view.page = pageInfo.current;
        if (!pageInfo.data.length) {
          list.appendChild(create("div", "placeholder", keyword ? "无匹配结果" : "暂无数据"));
        } else {
          for (const item of pageInfo.data) {
            const row = create("div", "list-item");
            const name = item.name || item.folder || item.relativePath || "未命名";
            row.appendChild(create("div", "name", name));
            if (item.folder) row.appendChild(create("div", "muted small mono", `folder: ${item.folder}`));
            if (item.relativePath) row.appendChild(create("div", "muted small mono", `path: ${item.relativePath}`));

            const ops = create("div", "btn-row");
            if (kind === "js") {
