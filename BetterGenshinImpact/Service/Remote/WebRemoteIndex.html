<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>BetterGI Web 控制台</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');
    :root {
      --bg: #f8f9fb;
      --bg-deep: #eef1f5;
      --card: #ffffff;
      --line: #d4dae3;
      --text: #1a1d23;
      --muted: #6b7280;
      --primary: #0f7f9f;
      --primary-strong: #056180;
      --accent: #e78f2f;
      --danger: #ef4444;
      --success: #10b981;
      --shadow: 0 12px 36px rgba(15, 30, 50, 0.12);
      --shadow-sm: 0 4px 12px rgba(15, 30, 50, 0.06);
      --topbar-height: clamp(112px, 15vh, 140px);
      --mono: "JetBrains Mono", "Consolas", monospace;
      --ui: "Manrope", "Noto Sans SC", "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: var(--ui);
      color: var(--text);
      background:
        radial-gradient(72rem 44rem at -8% -12%, rgba(15, 127, 159, 0.16), transparent 62%),
        radial-gradient(66rem 38rem at 112% -10%, rgba(231, 143, 47, 0.14), transparent 64%),
        linear-gradient(180deg, #fafbfc 0%, var(--bg) 100%);
      min-height: 100vh;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 252px minmax(0, 1fr);
    }

    .sidebar {
      border-right: 1px solid var(--line);
      background: linear-gradient(180deg, #ffffff 0%, #f8fafb 100%);
      padding: 18px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
    }

    .brand {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: linear-gradient(135deg, #ffffff 0%, #fafbfc 100%);
      padding: 14px;
      box-shadow: var(--shadow-sm);
      flex-shrink: 0;
    }

    .brand h1 {
      margin: 0;
      font-size: 19px;
      font-weight: 700;
      letter-spacing: 0.02em;
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .brand .muted {
      margin-top: 6px;
      font-size: 12px;
    }

    .nav-list {
      display: grid;
      gap: 8px;
      flex-shrink: 0;
    }

    .nav-btn {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 12px;
      text-align: left;
      padding: 11px 13px;
      font-size: 14px;
      cursor: pointer;
      transition: all .2s ease;
      box-shadow: 0 1px 3px rgba(15, 30, 50, 0.04);
    }

    .nav-btn:hover {
      border-color: rgba(15, 127, 159, 0.3);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(15, 127, 159, 0.12);
    }

    .nav-btn.active {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-strong) 100%);
      border-color: var(--primary);
      color: #fff;
      font-weight: 600;
      box-shadow: 0 4px 14px rgba(15, 127, 159, 0.3);
    }
      background: linear-gradient(130deg, rgba(15,127,159,.17), rgba(231,143,47,.15));
      border-color: rgba(15,127,159,.48);
      font-weight: 700;
    }

    .sidebar-footer {
      margin-top: auto;
      border-top: 1px solid var(--line);
      padding-top: 10px;
      display: grid;
      gap: 8px;
      flex-shrink: 0;
    }

    .main {
      padding: 16px 18px 26px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-width: 0;
      min-height: calc(100vh - 32px);
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--card);
      box-shadow: var(--shadow);
      flex-shrink: 0;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      padding: 8px 10px;
      min-height: auto;
      overflow: hidden;
      flex-shrink: 0;
    }

    .topbar-main {
      min-width: 0;
      flex: 1 1 auto;
      display: grid;
      gap: 2px;
      align-content: start;
    }

    .global-search {
      margin-top: 0;
      width: min(560px, 100%);
    }

    .global-search-row {
      margin-top: 4px;
      flex-wrap: nowrap;
      min-width: 0;
    }

    .global-search-row .btn {
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .global-search-row .global-search {
      flex: 1 1 auto;
      min-width: 140px;
    }

    .status-line {
      font-size: 12px;
      line-height: 1.35;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .warning {
      color: var(--danger);
      font-size: 12px;
      margin-top: 0;
      min-height: 0;
      line-height: 1.35;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #networkLine {
      font-size: 12px;
      line-height: 1.35;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .muted {
      color: var(--muted);
      font-size: 13px;
    }

    .small {
      font-size: 12px;
    }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .compact-more-toggle.active {
      background: rgba(37, 99, 235, 0.12);
      border-color: rgba(37, 99, 235, 0.35);
      color: var(--primary-strong);
    }

    .inline-more-group {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex-wrap: nowrap;
      min-width: 0;
    }

    .inline-more-group > .btn,
    .inline-more-group > button,
    .inline-more-group > select,
    .inline-more-group > input,
    .inline-more-group > .chip {
      flex: 0 0 auto;
      white-space: nowrap;
    }

    button, .btn {
      font-family: inherit;
      border: 1px solid transparent;
      border-radius: 12px;
      padding: 9px 14px;
      cursor: pointer;
      background: #fff;
      color: var(--text);
      transition: all .2s ease;
      box-shadow: 0 1px 3px rgba(15, 30, 50, 0.04);
    }

    button:hover, .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(15, 30, 50, 0.1);
    }

    .btn {
      border-color: var(--line);
    }

    .btn.primary {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-strong) 100%);
      border-color: var(--primary);
      color: #fff;
      box-shadow: 0 4px 14px rgba(15, 127, 159, 0.3);
    }

    .btn.primary:hover {
      background: linear-gradient(135deg, var(--primary-strong) 0%, #044d66 100%);
      border-color: var(--primary-strong);
      box-shadow: 0 6px 20px rgba(15, 127, 159, 0.4);
    }

    .btn.danger {
      background: linear-gradient(135deg, #fef2f2 0%, #fee2e2 100%);
      border-color: #fca5a5;
      color: var(--danger);
      box-shadow: 0 2px 8px rgba(239, 68, 68, 0.15);
    }

    .btn.danger:hover {
      background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%);
      border-color: #f87171;
      box-shadow: 0 4px 14px rgba(239, 68, 68, 0.25);
    }

    .btn.ghost {
      background: #f8fbfd;
    }

    .page-host {
      display: grid;
      gap: 12px;
      min-width: 0;
      flex: 1 1 auto;
      grid-auto-rows: auto;
      align-content: start;
    }

    .page-host.overview-grid {
      grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
      align-items: start;
    }

    .page-host.dashboard-pairs {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      align-items: stretch;
    }

    .page-host.dashboard-pairs > .section-card {
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .page-host.dashboard-pairs > .section-card > .section-body {
      flex: 1 1 auto;
    }

    .page-host.overview-grid > .page-title,
    .page-host.overview-grid > .placeholder,
    .page-host.dashboard-pairs > .page-title,
    .page-host.dashboard-pairs > .placeholder {
      grid-column: 1 / -1;
    }

    .page-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      flex-shrink: 0;
    }

    .page-title h2 {
      margin: 0;
      font-size: 20px;
      letter-spacing: 0.02em;
    }

    .section-card {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fff;
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      transition: box-shadow .2s ease;
      flex-shrink: 0;
    }

    .section-card:hover {
      box-shadow: var(--shadow);
    }

    .section-jump-flash {
      animation: sectionJumpFlash .95s var(--ease-standard);
    }

    .field-jump-flash {
      animation: fieldJumpFlash .95s var(--ease-standard);
    }

    @keyframes sectionJumpFlash {
      0% { box-shadow: 0 0 0 0 rgba(0, 113, 227, 0.42); }
      100% { box-shadow: var(--shadow-sm); }
    }

    @keyframes fieldJumpFlash {
      0% { background: rgba(0, 113, 227, 0.2); }
      100% { background: transparent; }
    }

    .section-head {
      border-bottom: 1px solid var(--line);
      padding: 12px 14px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      background: linear-gradient(130deg, rgba(15,127,159,.08), rgba(231,143,47,.08));
    }

    .section-head.collapsible {
      cursor: pointer;
      user-select: none;
    }

    .section-head.collapsible:hover {
      background: linear-gradient(130deg, rgba(15,127,159,.12), rgba(231,143,47,.12));
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      flex: 1 1 auto;
    }

    .section-jump-breadcrumb {
      max-width: 58%;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 11px;
      color: var(--primary);
      background: rgba(0, 113, 227, 0.12);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      animation: sectionJumpCrumb .95s var(--ease-standard);
    }

    @keyframes sectionJumpCrumb {
      0% { transform: translateY(-2px); opacity: .25; }
      100% { transform: translateY(0); opacity: 1; }
    }

    .section-collapse-icon {
      width: 12px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1;
      flex: 0 0 12px;
    }

    .section-head h3 {
      margin: 0;
      font-size: 16px;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .section-collapsed-summary {
      display: none;
      align-items: center;
      gap: 6px;
      min-width: 0;
      margin-left: auto;
      margin-right: 8px;
      max-width: 52%;
      overflow: hidden;
    }

    .section-summary-chip {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface-soft);
      color: var(--muted);
      font-size: 11px;
      line-height: 1.2;
      letter-spacing: -0.01em;
      padding: 3px 8px;
      white-space: nowrap;
      text-overflow: ellipsis;
      overflow: hidden;
      max-width: 100%;
    }

    .section-summary-chip.ok {
      border-color: rgba(31, 157, 98, 0.32);
      background: rgba(31, 157, 98, 0.11);
      color: #176d47;
    }

    .section-summary-chip.bad {
      border-color: rgba(199, 58, 66, 0.34);
      background: rgba(199, 58, 66, 0.12);
      color: #983039;
    }

    .section-summary-chip.neutral {
      border-color: rgba(15, 127, 159, 0.28);
      background: rgba(15, 127, 159, 0.12);
      color: #0d6179;
    }

    .section-summary-run {
      border: 1px solid rgba(15, 127, 159, 0.36);
      border-radius: 999px;
      background: rgba(15, 127, 159, 0.14);
      color: var(--primary-strong);
      min-height: 26px;
      padding: 3px 10px;
      font-size: 12px;
      line-height: 1.2;
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .section-summary-run:hover {
      transform: translateY(-1px);
      border-color: rgba(15, 127, 159, 0.5);
      background: rgba(15, 127, 159, 0.2);
    }

    .section-summary-run.is-on {
      border-color: rgba(31, 157, 98, 0.42);
      background: rgba(31, 157, 98, 0.18);
      color: #176d47;
    }

    .section-summary-run.is-off {
      border-color: rgba(199, 58, 66, 0.45);
      background: rgba(199, 58, 66, 0.18);
      color: #983039;
    }

    .section-summary-run.is-pending {
      border-color: rgba(231, 143, 47, 0.48);
      background: rgba(231, 143, 47, 0.2);
      color: #9a5b10;
    }

    .section-body {
      padding: 12px 14px;
      display: grid;
      gap: 12px;
      min-width: 0;
    }

    .section-card.is-collapsed .section-head {
      border-bottom: none;
      padding: 8px 12px;
      background: #ffffff;
    }

    .section-card.is-collapsed {
      box-shadow: none;
    }

    .section-card.is-collapsed .section-head h3 {
      font-size: 14px;
    }

    .section-card.is-collapsed .section-collapsed-summary {
      display: inline-flex;
    }

    .section-card.type-one-dragon.is-collapsed {
      box-shadow: var(--shadow);
    }

    .section-card.type-one-dragon.is-collapsed .section-head {
      padding: 10px 14px;
      background: linear-gradient(130deg, rgba(15,127,159,.08), rgba(231,143,47,.08));
      border-bottom: 1px solid rgba(210,220,229,.6);
    }

    .section-card.type-one-dragon.is-collapsed .section-head h3 {
      font-size: 15px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 10px;
      min-width: 0;
    }

    .task-metrics {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .task-metric {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface-soft);
      padding: 5px 10px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.3;
      letter-spacing: -0.01em;
    }

    .task-metric.metric-ok {
      border-color: rgba(31, 157, 98, 0.32);
      background: rgba(31, 157, 98, 0.11);
      color: #176d47;
    }

    .task-metric.metric-bad {
      border-color: rgba(199, 58, 66, 0.34);
      background: rgba(199, 58, 66, 0.12);
      color: #983039;
    }

    .task-metric.metric-neutral {
      border-color: rgba(15, 127, 159, 0.28);
      background: rgba(15, 127, 159, 0.12);
      color: #0d6179;
    }

    .field {
      display: grid;
      gap: 6px;
      min-width: 0;
    }

    .field label {
      font-size: 12px;
      color: var(--muted);
      display: flex;
      gap: 6px;
      align-items: center;
      min-width: 0;
    }

    .field-path {
      font-family: var(--mono);
      font-size: 11px;
      color: #7f90a6;
      word-break: break-all;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 10px;
      font-family: inherit;
      background: #fff;
      color: var(--text);
      min-width: 0;
    }

    input[type="checkbox"] {
      width: 16px;
      height: 16px;
      margin: 0;
    }

    textarea {
      resize: vertical;
      min-height: 92px;
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.5;
    }

    .inline-field {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 10px;
      background: #fbfdff;
    }

    .list {
      display: grid;
      gap: 8px;
    }

    .list-item {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      background: #fcfeff;
      display: grid;
      gap: 8px;
      min-width: 0;
    }

    .list-item.is-dirty {
      border-color: rgba(231, 143, 47, 0.56);
      background: rgba(231, 143, 47, 0.1);
      box-shadow: inset 0 0 0 1px rgba(231, 143, 47, 0.22);
    }

    .dirty-chip {
      border: 1px solid rgba(231, 143, 47, 0.52);
      border-radius: 999px;
      padding: 3px 9px;
      font-size: 11px;
      color: #9a5b10;
      background: rgba(231, 143, 47, 0.16);
      line-height: 1.2;
      white-space: nowrap;
      display: none;
    }

    .list-item .name {
      font-weight: 700;
      word-break: break-all;
    }

    .mono {
      font-family: var(--mono);
      font-size: 12px;
    }

    .split {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .split-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .scheduler-card .section-body {
      padding: 10px 12px;
    }

    .scheduler-layout {
      display: grid;
      grid-template-columns: minmax(280px, 1.05fr) minmax(420px, 1.55fr) minmax(320px, 1.2fr);
      gap: 10px;
      align-items: start;
    }

    .scheduler-pane {
      padding: 10px;
      min-width: 0;
    }

    .scheduler-card.is-standalone-workspace .section-body {
      min-height: 0;
      display: block;
    }

    .scheduler-layout.is-standalone-workspace {
      grid-template-columns: 1fr;
      gap: 12px;
      min-height: 0;
    }

    .scheduler-layout.is-standalone-workspace > .scheduler-pane {
      min-height: 0;
      max-height: none;
      overflow: visible;
    }

    .scheduler-layout.is-standalone-workspace > .scheduler-pane:nth-child(3) {
      grid-column: 1;
    }

    .scheduler-pane-block {
      display: grid;
      gap: 10px;
      min-width: 0;
    }

    .scheduler-pane-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 6px;
      min-width: 0;
    }

    .scheduler-pane-head h4 {
      margin: 0;
      font-size: 15px;
      letter-spacing: -0.01em;
      min-width: 0;
    }

    .scheduler-pane-content {
      display: grid;
      gap: 10px;
      min-width: 0;
    }

    .scheduler-item-summary {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      min-width: 0;
    }

    .scheduler-item-extra {
      display: grid;
      gap: 8px;
      min-width: 0;
    }

    .one-dragon-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(0, 0.95fr);
      gap: 12px;
      align-items: start;
      min-width: 0;
      min-height: 0;
    }

    .one-dragon-layout.is-standalone-workspace {
      grid-template-columns: 1fr;
      gap: 12px;
      min-height: 0;
    }

    .one-dragon-panel {
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: var(--surface-soft);
      padding: 10px;
      display: grid;
      gap: 10px;
      min-width: 0;
      min-height: 0;
    }

    .one-dragon-panel h4 {
      margin: 0;
      font-size: 14px;
      letter-spacing: -0.01em;
    }

    .one-dragon-secondary-ops {
      margin: -2px 0 4px;
    }

    .one-dragon-json-panel {
      grid-column: 1 / -1;
    }

    .one-dragon-card.is-standalone-workspace .section-body {
      min-height: 0;
      display: grid;
      grid-template-rows: auto auto auto;
      gap: 10px;
    }

    .one-dragon-card.is-standalone-workspace .one-dragon-fields-panel,
    .one-dragon-card.is-standalone-workspace .one-dragon-tasks-panel {
      grid-template-rows: auto auto auto auto;
      max-height: none;
    }

    .one-dragon-card.is-standalone-workspace .one-dragon-fields-panel .list,
    .one-dragon-card.is-standalone-workspace .one-dragon-tasks-panel .list {
      min-height: 0;
      overflow: visible;
    }

    .one-dragon-card.is-standalone-workspace .one-dragon-json-panel {
      display: grid;
      grid-template-rows: auto auto auto;
    }

    .one-dragon-card.is-standalone-workspace .one-dragon-json-panel textarea {
      min-height: 260px;
      height: auto;
    }

    .pager {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .pager-info {
      font-size: 12px;
      color: var(--muted);
      min-width: 76px;
    }

    .screen-box {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #f1f5f8;
      padding: 8px;
    }

    .screen-box img {
      width: 100%;
      border-radius: 8px;
      display: block;
      background: #d9e3ec;
    }

    .log-box {
      border: 1px solid var(--line);
      border-radius: 10px;

    :root,

      transition: background-color .3s ease, color .3s ease;
      padding-left: var(--safe-left);
      padding-right: var(--safe-right);
    }

    .app {
      grid-template-columns: 220px minmax(0, 1fr) minmax(320px, 0.94fr);
      max-width: 1880px;

    .nav-btn::before {
      content: "";

    .section-head {

      letter-spacing: -0.01em;

      gap: 12px;

      fill: none;

    .section-status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #9ca3af;
      box-shadow: 0 0 0 2px rgba(156, 163, 175, 0.18);
      flex: 0 0 8px;
    }

    .section-card.status-running .section-status-dot {
      background: var(--success);
      box-shadow: 0 0 0 2px rgba(22, 163, 74, 0.24);
    }

    .section-card.status-stopped .section-status-dot {
      background: var(--danger);
      box-shadow: 0 0 0 2px rgba(220, 38, 38, 0.24);
    }

    .section-card.status-alert .section-status-dot {
      background: #d97706;
      box-shadow: 0 0 0 2px rgba(217, 119, 6, 0.24);
    }

    .section-card.role-control .section-head {
      background: linear-gradient(145deg, rgba(37, 99, 235, 0.14), rgba(59, 130, 246, 0.08));
    }

    .section-card.role-settings .section-head {
      background: linear-gradient(145deg, rgba(15, 118, 110, 0.15), rgba(20, 184, 166, 0.08));
    }

    .section-card.role-info .section-head {
      background: linear-gradient(145deg, rgba(100, 116, 139, 0.19), rgba(148, 163, 184, 0.09));
    }

    .section-card.role-control {
      box-shadow: 0 8px 22px rgba(37, 99, 235, 0.09);
    }

    .section-card.role-settings {
      box-shadow: 0 8px 22px rgba(15, 118, 110, 0.1);
    }

    .section-card.role-info {
      box-shadow: 0 8px 22px rgba(71, 85, 105, 0.1);
    }

    .muted {
      color: var(--muted);
    }

    .field label {
      color: var(--muted);
      font-size: 12px;
    }

    .field-path {
      color: var(--muted);
    }

    button, .btn {
      min-height: 36px;
      border-radius: 999px;
      border: 1px solid var(--line);
      padding: 8px 14px;
      font-weight: 500;
      letter-spacing: -0.01em;
      background: var(--card);
      color: var(--text);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      box-shadow: var(--shadow-sm);
      transition: background-color .2s var(--ease-standard), border-color .2s var(--ease-standard),
        color .2s var(--ease-standard), transform .2s var(--ease-standard),
        box-shadow .2s var(--ease-standard);
    }

    .btn:hover,
    button:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }

    .btn:active,
    button:active {
      transform: scale(0.98);
    }

    .btn.is-loading,
    button.is-loading {
      cursor: progress;
      opacity: 0.8;
    }

    .btn.is-loading::after,
    button.is-loading::after {
      content: "";
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 2px solid currentColor;
      border-right-color: transparent;
      animation: spin .8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .btn.primary {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
      box-shadow: none;
    }

    .btn.primary:hover {
      background: var(--primary-strong);
      border-color: var(--primary-strong);
    }

    .btn.danger {
      background: rgba(255, 59, 48, 0.1);
      border-color: rgba(255, 59, 48, 0.24);
      color: var(--danger);
    }

    .btn.ghost {
      background: rgba(127, 127, 127, 0.08);
    }

    .btn.ghost.active {
      border-color: rgba(37, 99, 235, 0.34);
      background: rgba(37, 99, 235, 0.14);
      color: var(--primary-strong);
    }

    input, select, textarea {
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: var(--card);
      color: var(--text);
      min-height: 38px;
      padding: 8px 10px;
      transition: border-color .2s ease, box-shadow .2s ease, background-color .2s ease, color .2s ease;
    }

    textarea {
      min-height: 112px;
      line-height: 1.5;
    }

    input:focus,
    select:focus,
    textarea:focus,
    button:focus-visible,
    .btn:focus-visible {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.2);
    }

    .toggle {
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: var(--surface-soft);
    }

    input[type="checkbox"] {
      accent-color: var(--primary);
    }

    .list-item,
    .screen-box,
    .chat-history,
    .route-result,
    .placeholder {
      border-color: var(--line);
      border-radius: var(--radius-md);
      background: var(--card);
    }

    .screen-box {
      background: var(--surface-soft);
      aspect-ratio: 16 / 9;
      max-height: min(46vh, 520px);
      display: grid;
      place-items: center;
      padding: 8px;
      overflow: hidden;
    }

    .screen-box img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .log-box {
      border-color: rgba(85, 110, 148, 0.35);
      border-radius: var(--radius-md);
      background: var(--terminal-bg);
      color: var(--terminal-text);
      height: clamp(250px, 34vh, 520px);
      min-height: 240px;
      max-height: 74vh;
      resize: vertical;
      overflow: auto;
    }

    .section-card.logs-fullscreen {
      position: fixed;
      inset: 14px;
      z-index: 190;
      margin: 0;
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
    }

    .section-card.logs-fullscreen .section-body {
      height: calc(100% - 58px);
      min-height: 0;
      grid-template-rows: auto minmax(0, 1fr);
    }

    .section-card.logs-fullscreen .log-box {
      height: 100%;
      max-height: none;
      resize: none;
    }

    .log-dock-resizer {
      display: none;
      height: 10px;
      margin: -2px 0 4px;
      border-radius: 999px;
      background:
        linear-gradient(to bottom, transparent 0, transparent 3px, var(--line-strong) 3px, var(--line-strong) 7px, transparent 7px, transparent 10px);
      cursor: ns-resize;
      touch-action: none;
    }

    .section-card.logs-docked {
      position: fixed;
      left: max(12px, calc(12px + var(--safe-left)));
      right: max(12px, calc(12px + var(--safe-right)));
      bottom: calc(10px + var(--safe-bottom));
      z-index: 175;
      margin: 0;
      height: var(--log-dock-height, 320px);
      min-height: 220px;
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }

    .section-card.logs-docked .section-body {
      min-height: 0;
      height: 100%;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      gap: 8px;
      padding-top: 8px;
    }

    .section-card.logs-docked .log-box {
      height: 100%;
      max-height: none;
      min-height: 0;
      resize: none;
    }

    .section-card.logs-docked .log-dock-resizer {
      display: block;
    }

    body.logs-docked .main {
      padding-bottom: calc(var(--log-dock-height, 320px) + 22px + var(--safe-bottom));
    }

    body.logs-fullscreen {
      overflow: hidden;
    }

    body.log-dock-resizing {
      cursor: ns-resize;
      user-select: none;
    }

    .global-log-dock {
      position: fixed;
      left: max(12px, calc(12px + var(--safe-left)));
      right: max(12px, calc(12px + var(--safe-right)));
      bottom: calc(10px + var(--safe-bottom));
      height: var(--global-log-dock-height, 280px);
      min-height: 220px;
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background: var(--surface-glass);
      backdrop-filter: saturate(170%) blur(16px);
      -webkit-backdrop-filter: saturate(170%) blur(16px);
      box-shadow: var(--shadow-lg);
      z-index: 170;
      display: grid;
      grid-template-rows: auto auto auto minmax(0, 1fr);
      gap: 8px;
      padding: 10px 12px 12px;
      opacity: 0;
      transform: translateY(calc(100% + 14px));
      pointer-events: none;
      transition: transform .24s var(--ease-standard), opacity .22s var(--ease-standard);
    }

    .global-log-dock.is-open {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .global-log-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
      min-width: 0;
    }

    .global-log-title {
      display: grid;
      gap: 3px;
      min-width: 0;
    }

    .global-log-title h4 {
      margin: 0;
      font-size: 14px;
      font-weight: 620;
      letter-spacing: -0.01em;
    }

    .global-log-meta {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }

    .global-log-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: flex-end;
    }

    .global-log-actions .btn,
    .global-log-actions .toggle {
      min-height: 34px;
    }

    .global-log-filters {
      display: grid;
      grid-template-columns: 150px minmax(0, 1fr);
      gap: 8px;
      align-items: end;
      min-width: 0;
    }

    .global-log-filter {
      display: grid;
      gap: 5px;
      min-width: 0;
    }

    .global-log-filter span {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: -0.01em;
    }

    .global-log-filter input,
    .global-log-filter select {
      min-height: 34px;
      padding: 6px 9px;
    }

    .global-log-query-row {
      display: flex;
      gap: 6px;
      align-items: center;
      min-width: 0;
    }

    .global-log-query-row input {
      flex: 1 1 auto;
      min-width: 0;
    }

    .global-log-query-clear {
      min-height: 34px;
      padding: 6px 10px;
      flex: 0 0 auto;
    }

    .global-log-quick-levels {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-width: 0;
    }

    .global-log-chip {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface-soft);
      padding: 3px 10px;
      min-height: 28px;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      transition: all .15s ease;
    }

    .global-log-chip:hover {
      transform: translateY(-1px);
      border-color: rgba(15, 127, 159, 0.26);
      color: var(--text);
    }

    .global-log-chip.active {
      border-color: rgba(15, 127, 159, 0.42);
      background: rgba(15, 127, 159, 0.16);
      color: var(--primary-strong);
      font-weight: 620;
    }

    .global-log-resizer {
      height: 10px;
      border-radius: 999px;
      background:
        linear-gradient(to bottom, transparent 0, transparent 3px, var(--line-strong) 3px, var(--line-strong) 7px, transparent 7px, transparent 10px);
      cursor: ns-resize;
      touch-action: none;
    }

    .global-log-box {
      border: 1px solid rgba(85, 110, 148, 0.35);
      border-radius: var(--radius-md);
      background: var(--terminal-bg);
      color: var(--terminal-text);
      padding: 10px;
      min-height: 0;
      overflow: auto;
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.48;
      white-space: pre-wrap;
      word-break: break-word;
    }

    body.global-log-dock-open .main {
      padding-bottom: calc(var(--global-log-dock-height, 280px) + 22px + var(--safe-bottom));
    }

    .chat-item {
      border-color: var(--line);
      border-radius: var(--radius-sm);
      background: var(--card);
    }

    .chat-item.assistant {
      background: rgba(0, 113, 227, 0.08);
      border-color: rgba(0, 113, 227, 0.2);
    }

    .chat-item.user {
      background: rgba(52, 199, 89, 0.1);
      border-color: rgba(52, 199, 89, 0.24);
    }

    .chip {
      border-color: var(--line);
      background: var(--card);
      color: var(--muted);
    }

    .hit-mark {
      background: rgba(255, 214, 10, 0.4);
    }

    .toast-host {
      top: calc(10px + var(--safe-top));
      right: 14px;
      bottom: auto;
      width: min(420px, calc(100vw - 26px));
    }

    .toast {
      border-radius: var(--radius-md);
      border: 1px solid var(--line);
      background: var(--surface-glass);
      backdrop-filter: saturate(170%) blur(14px);
      -webkit-backdrop-filter: saturate(170%) blur(14px);
      box-shadow: var(--shadow-md);
      padding: 11px 12px;
    }

    .toast.ok { border-color: rgba(29, 186, 102, 0.35); background: rgba(29, 186, 102, 0.12); }
    .toast.error { border-color: rgba(255, 69, 58, 0.36); background: rgba(255, 69, 58, 0.14); }
    .toast.warn { border-color: rgba(255, 149, 0, 0.34); background: rgba(255, 149, 0, 0.13); }

    .mobile-settings-btn {
      display: none;
    }

    .mobile-sheet-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.34);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s var(--ease-standard);
      z-index: 120;
    }

    .mobile-sheet {
      position: fixed;
      left: 8px;
      right: 8px;
      bottom: calc(8px + var(--safe-bottom));
      border: 1px solid var(--line);
      border-radius: 22px;
      background: var(--surface-glass);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      box-shadow: var(--shadow-lg);
      padding: 10px 12px calc(12px + var(--safe-bottom));
      z-index: 130;
      transform: translateY(110%);
      opacity: 0;
      pointer-events: none;
      transition: transform .24s var(--ease-standard), opacity .24s var(--ease-standard);
    }

    .mobile-sheet-grab {
      width: 38px;
      height: 4px;
      border-radius: 99px;
      background: var(--line-strong);
      margin: 2px auto 10px;
    }

    .mobile-sheet-title {
      margin: 0 0 10px;
      font-size: 16px;
      font-weight: 620;
      letter-spacing: -0.01em;
    }

    .mobile-sheet-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .mobile-sheet-grid label {
      font-size: 12px;
      color: var(--muted);
      display: grid;
      gap: 6px;
    }

    .mobile-sheet-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 10px;
    }

    .mobile-sheet-backdrop.is-open {
      opacity: 1;
      pointer-events: auto;
    }

    .mobile-sheet.is-open {
      transform: translateY(0);
      opacity: 1;
      pointer-events: auto;
    }

    body.mobile-sheet-open {
      overflow: hidden;
      touch-action: none;
    }

    .spotlight-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.32);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s var(--ease-standard);
      z-index: 150;
    }

    .spotlight-panel {
      position: fixed;
      left: 50%;
      top: max(calc(48px + var(--safe-top)), 8vh);
      width: min(760px, calc(100vw - 28px));
      max-height: min(76vh, calc(100vh - 44px - var(--safe-top)));
      transform: translate(-50%, -12px);
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--surface-glass);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      box-shadow: var(--shadow-lg);
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      gap: 8px;
      padding: 12px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s var(--ease-standard), transform .2s var(--ease-standard);
      z-index: 160;
    }

      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .spotlight-input {
      min-height: 44px;
      border-radius: 12px;
      font-size: 15px;
      letter-spacing: -0.01em;
    }

    .spotlight-close {
      min-height: 44px;
    }

    .spotlight-hint {
      margin: 0;
      font-size: 12px;
      color: var(--muted);
    }

    .spotlight-hint-keys {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 8px;
      background: var(--card);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: -0.01em;
    }

    .spotlight-results {
      min-height: 0;
      overflow: auto;
      display: grid;
      gap: 10px;
      padding-right: 2px;
    }

    .spotlight-group {
      display: grid;
      gap: 6px;
    }

    .spotlight-group-title {
      margin: 0;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: -0.01em;
    }

    .spotlight-item {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--card);
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      column-gap: 10px;
      row-gap: 2px;
      align-items: start;
      text-align: left;
      padding: 10px 12px;
      cursor: pointer;
      transition: border-color .18s var(--ease-standard), background-color .18s var(--ease-standard),

      display: grid;
      gap: 2px;
      grid-column: 2;
    }

      border-radius: 999px;
      border: 1px solid var(--line);
      font-size: 10px;
      color: var(--muted);
      padding: 3px 7px;
      letter-spacing: .02em;

      background: rgba(127, 127, 127, 0.08);
      white-space: nowrap;
      grid-column: 1;
      grid-row: 1 / span 2;

      border-color: rgba(0, 113, 227, 0.22);
      background: rgba(0, 113, 227, 0.12);
    }

    .spotlight-kind.kind-action {
      color: #ff9f0a;
      border-color: rgba(255, 159, 10, 0.28);
      background: rgba(255, 159, 10, 0.14);
    }

    .spotlight-kind.kind-field {
      color: #30d158;
      border-color: rgba(48, 209, 88, 0.28);
      background: rgba(48, 209, 88, 0.14);
    }

    .spotlight-kind.kind-setting {
      color: #64d2ff;
      border-color: rgba(100, 210, 255, 0.28);
      background: rgba(100, 210, 255, 0.14);
    }

    .spotlight-item:hover {
      border-color: rgba(0, 113, 227, 0.28);
      background: rgba(0, 113, 227, 0.08);
      transform: translateY(-1px);
    }

    .spotlight-item.active {
      border-color: rgba(0, 113, 227, 0.32);
      background: rgba(0, 113, 227, 0.14);
    }

    .spotlight-item-title {
      font-size: 14px;
      font-weight: 610;
      letter-spacing: -0.01em;
    }

    .spotlight-item-sub {
      font-size: 12px;
      color: var(--muted);
      word-break: break-word;
    }

    .spotlight-empty {
      border: 1px dashed var(--line);
      border-radius: 12px;
      padding: 16px;
      color: var(--muted);
      text-align: center;
      background: var(--card);
      font-size: 13px;
    }

    .spotlight-backdrop.is-open {
      opacity: 1;
      pointer-events: auto;
    }

    .spotlight-panel.is-open {
      opacity: 1;
      pointer-events: auto;
      transform: translate(-50%, 0);
    }

    body.spotlight-open {
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      border-bottom: 1px solid var(--line);
      padding: 10px 12px;
      text-align: left;
      font-size: 13px;
      vertical-align: middle;
    }

    th {
      color: var(--muted);
      font-size: 12px;
      font-weight: 620;
      letter-spacing: -0.01em;
    }

    @media (min-width: 1680px) {
      .app {
        grid-template-columns: 230px minmax(0, 1fr) minmax(360px, 0.9fr);
      }

      body.sidebar-collapsed .app {
        grid-template-columns: 82px minmax(0, 1fr) minmax(360px, 0.9fr);
      }

      .page-host.overview-grid {
        grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
      }

      .dashboard-layout {
        grid-template-columns: minmax(0, 1.86fr) minmax(360px, 0.94fr);
      }
    }

    @media (max-width: 1439px) {
      .app {
        grid-template-columns: 214px minmax(0, 1fr) minmax(300px, 0.88fr);

    function normalizeStandalonePageId(value) {
      const text = String(value || "")
        .trim()
        .toLowerCase()
        .replace(/_/g, "-")
        .replace(/\s+/g, "");
      if (!text) {
        return "";
      }
      if (text === "scheduler") {
        return "scheduler";
      }
      if (text === "api-center" || text === "apicenter" || text === "route-center" || text === "api") {
        return "route-center";
      }
      if (text === "one-dragon" || text === "onedragon") {
        return "one-dragon";
      }
      return "";
    }

    function resolveStandalonePageFromPath(pathname) {
      const path = String(pathname || "").toLowerCase();
      if (/\/scheduler(?:\.html)?\/?$/.test(path)) {
        return "scheduler";
      }
      if (/\/api-center(?:\.html)?\/?$/.test(path)) {
        return "route-center";
      }
      if (/\/one-dragon(?:\.html)?\/?$/.test(path)) {
        return "one-dragon";
      }
      return "";
    }

    function normalizeLocale(value) {
      const text = String(value || "").trim().toLowerCase();
      return text.startsWith("en") ? "en" : "zh";
    }

    function loadInitialLocale() {
      try {
        const saved = localStorage.getItem(LOCALE_STORAGE_KEY);
        if (saved) return normalizeLocale(saved);
      } catch {
      }
      return normalizeLocale(navigator.language || "zh-CN");
    }

    function replaceByMap(source, map) {
      let result = String(source || "");
      const entries = Object.entries(map).sort((a, b) => b[0].length - a[0].length);
      for (const [from, to] of entries) {
        result = result.split(from).join(to);
      }
      return result;
    }

    function t(value) {
      const raw = String(value == null ? "" : value);
      if (!raw) return "";
      if (state.locale === "en") {
        const remoteMap = state.remoteI18n && state.remoteI18n.locale === "en" && state.remoteI18n.map
          ? state.remoteI18n.map
          : null;
        if (remoteMap && Object.prototype.hasOwnProperty.call(remoteMap, raw)) {
          const translated = String(remoteMap[raw] == null ? "" : remoteMap[raw]);
          if (translated) {
            return translated;
          }
        }
        if (Object.prototype.hasOwnProperty.call(I18N_ZH_TO_EN, raw)) {
          return I18N_ZH_TO_EN[raw];
        }
        return replaceByMap(raw, I18N_TOKEN_ZH_TO_EN);
      }
      if (Object.prototype.hasOwnProperty.call(I18N_EN_TO_ZH, raw)) {
        return I18N_EN_TO_ZH[raw];
      }
      return replaceByMap(raw, I18N_TOKEN_EN_TO_ZH);
    }

      return state.locale === "en" ? String(en == null ? zh : en) : String(zh);
    }

      if (defaultValue === undefined) {
        return window.prompt(t(message));
      }
      return window.prompt(t(message), defaultValue == null ? defaultValue : String(defaultValue));
    }

    function confirmL(message) {

      const host = root || document;
      const nodes = host.querySelectorAll("[data-i18n-base]");
      for (const node of nodes) {
        const base = node.getAttribute("data-i18n-base");
        if (base == null) continue;
        node.textContent = t(base);

      const placeholders = host.querySelectorAll("[data-i18n-placeholder]");

        if (!("placeholder" in node)) continue;
        node.placeholder = t(base);
      }

    function normalizeTaskMetricRecord(value) {
      const source = value && typeof value === "object" ? value : {};
      const runsRaw = Number(source.runs);
      const successRaw = Number(source.success);
      const failureRaw = Number(source.failure);
      const runs = Number.isFinite(runsRaw) && runsRaw > 0 ? Math.floor(runsRaw) : 0;
      const success = Number.isFinite(successRaw) && successRaw > 0 ? Math.floor(successRaw) : 0;
      const failure = Number.isFinite(failureRaw) && failureRaw > 0 ? Math.floor(failureRaw) : 0;
      const normalizedStatus = String(source.lastStatus || "").trim().toLowerCase();
      let lastStatus = "";
      if (normalizedStatus === "success" || normalizedStatus === "ok") {
        lastStatus = "success";
      } else if (normalizedStatus === "failure" || normalizedStatus === "failed" || normalizedStatus === "error") {
        lastStatus = "failure";
      }
      return {
        runs: Math.max(runs, success + failure),
        success,
        failure,
        lastRun: source.lastRun ? String(source.lastRun) : "",
        lastStatus
      };

    async function jumpToSectionByKey(collapseKey, options) {
      const opts = options || {};
      const key = String(collapseKey || "");
      if (!key) {
        return false;
      }
      let card = resolveSectionCardByKey(key);
      if (!card) {
        if (state.globalQuery) {
          state.globalQuery = "";
          if (ui.globalSearchInput) {
            ui.globalSearchInput.value = "";
          }
          await renderActivePage();
          card = resolveSectionCardByKey(key);
        }
      }
      if (!card) {
        return false;
      }

      if (card.classList.contains("is-collapsed")) {
        const head = card.querySelector(".section-head.collapsible");
        if (head) {
          head.click();
          await new Promise(resolve => setTimeout(resolve, 0));
          card = resolveSectionCardByKey(key) || card;
        }
      }

      let target = card;
      const fieldPath = String(opts.fieldPath || "").trim();
      if (fieldPath) {
        const fieldPathNodes = card.querySelectorAll(".field-path");
        for (const node of fieldPathNodes) {
          const text = String(node.textContent || "").trim();
          if (!text) continue;
          if (text === fieldPath || text.toLowerCase().includes(fieldPath.toLowerCase())) {
            const fieldNode = node.closest(".field");
            if (fieldNode) {
              target = fieldNode;
            }
            break;
          }
        }
      }

      const breadcrumb = String(opts.breadcrumb || "").trim();
      if (breadcrumb) {
        const titleHost = card.querySelector(".section-title");
        if (titleHost) {
          const existed = titleHost.querySelector(".section-jump-breadcrumb");
          if (existed) {
            existed.remove();
          }
          const crumb = create("span", "section-jump-breadcrumb");
          crumb.textContent = breadcrumb;
          titleHost.appendChild(crumb);
          setTimeout(() => {
            if (crumb.parentElement === titleHost) {
              titleHost.removeChild(crumb);
            }
          }, 2200);
        }
      }

      target.scrollIntoView({ behavior: "smooth", block: "start" });
      card.classList.add("section-jump-flash");
      setTimeout(() => card.classList.remove("section-jump-flash"), 2000);
      if (target !== card) {
        target.classList.add("field-jump-flash");
        setTimeout(() => target.classList.remove("field-jump-flash"), 2000);
        const focusInput = target.querySelector("input:not([type='hidden']):not([disabled]),select:not([disabled]),textarea:not([disabled]),button:not([disabled])");
        if (focusInput && typeof focusInput.focus === "function") {
          focusInput.focus({ preventScroll: true });

        const focusFallback = card.querySelector("input:not([type='hidden']):not([disabled]),select:not([disabled]),textarea:not([disabled]),button:not([disabled])");
        if (focusFallback && typeof focusFallback.focus === "function") {
          focusFallback.focus({ preventScroll: true });
        }

      return true;

          for (const field of fieldsInSection) {

    function parseSpotlightQuery(queryText) {
      const raw = String(queryText || "").trim();
      const knownPages = new Set(
        getPages()
          .map(page => String(page && page.id ? page.id : "").trim().toLowerCase())
          .filter(Boolean)
      );
      const base = {
        scope: "all",
        query: "",
        fieldPageFilter: "",
        fieldPathFilter: ""
      };
      if (!raw) {
        return base;
      }
      const prefix = raw.charAt(0);
      const rest = raw.slice(1).trim().toLowerCase();
      if (prefix === "@") {
        return { ...base, scope: "pages", query: rest };
      }
      if (prefix === "!") {
        return { ...base, scope: "actions", query: rest };
      }
      if (prefix === "#") {
        const parsed = { ...base, scope: "fields", query: rest };
        if (!rest) {
          return parsed;
        }
        if (knownPages.has(rest)) {
          parsed.fieldPageFilter = rest;
          parsed.query = "";
          return parsed;
        }
        const dotIndex = rest.indexOf(".");
        if (dotIndex > 0) {
          const candidatePage = rest.slice(0, dotIndex).trim();
          const candidatePath = rest.slice(dotIndex + 1).trim();
          if (candidatePage && knownPages.has(candidatePage)) {
            parsed.fieldPageFilter = candidatePage;
            parsed.fieldPathFilter = candidatePath;
            parsed.query = candidatePath;
          }
        }
        return parsed;
      }
      if (prefix === "$") {
        return { ...base, scope: "settings", query: rest };
      }
      return { ...base, scope: "all", query: raw.toLowerCase() };
    }

    function filterSpotlightGroups(queryInput, catalog) {
      const parsed = queryInput && typeof queryInput === "object"
        ? queryInput
        : parseSpotlightQuery(queryInput);
      const query = String(parsed.query || "").trim().toLowerCase();
      const scope = String(parsed.scope || "all");
      const fieldPageFilter = scope === "fields"
        ? String(parsed.fieldPageFilter || "").trim().toLowerCase()
        : "";
      const fieldPathFilter = scope === "fields"
        ? String(parsed.fieldPathFilter || "").trim().toLowerCase()
        : "";
      const activePageLower = String(state.activePageId || "").toLowerCase();
      const groups = [];
      const pages = Array.isArray(catalog && catalog.pages) ? catalog.pages : [];
      const actions = Array.isArray(catalog && catalog.actions) ? catalog.actions : [];
      const settings = Array.isArray(catalog && catalog.settings) ? catalog.settings : [];
      const fields = Array.isArray(catalog && catalog.fields) ? catalog.fields : [];
      const allById = new Map();
      for (const bucket of [pages, actions, settings, fields]) {
        for (const item of bucket) {
          allById.set(item.id, item);
        }
      }

      const allowKind = (kind) => {
        if (scope === "pages") return kind === "page";
        if (scope === "actions") return kind === "action";
        if (scope === "fields") return kind === "field";
        if (scope === "settings") return kind === "setting";
        return true;
      };

      const extractItemPageId = (item) => {
        const pageHint = String(item && item.pageId ? item.pageId : "").trim().toLowerCase();
        if (pageHint) {
          return pageHint;
        }
        const id = String(item && item.id ? item.id : "");
        if (id.startsWith("page:")) {
          return String(id.slice(5)).toLowerCase();
        }
        if (id.startsWith("field:")) {
          const rest = id.slice(6);
          const idx = rest.indexOf(":");
          if (idx > 0) {
            return String(rest.slice(0, idx)).toLowerCase();
          }
        }
        return "";
      };

      const extractFieldPath = (item) => {
        const fieldHint = String(item && item.fieldPath ? item.fieldPath : "").trim().toLowerCase();
        if (fieldHint) {
          return fieldHint;
        }
        const id = String(item && item.id ? item.id : "");
        if (!id.startsWith("field:")) {
          return "";
        }
        const rest = id.slice(6);
        const first = rest.indexOf(":");
        if (first < 0) {
          return "";
        }
        const second = rest.indexOf(":", first + 1);
        if (second < 0) {
          return "";
        }
        return String(rest.slice(second + 1)).toLowerCase();
      };

      const pageAffinity = (item) => {
        const pageId = extractItemPageId(item);
        if (!activePageLower || !pageId) {
          return 0;
        }
        return pageId === activePageLower ? 1 : 0;
      };

      const scoreItem = (item) => {
        const title = String(item.title || "").toLowerCase();
        const subtitle = String(item.subtitle || "").toLowerCase();
        const translatedTitle = String(t(item.title || "")).toLowerCase();
        const translatedSubtitle = String(t(item.subtitle || "")).toLowerCase();
        const keywords = String(item.keywords || "").toLowerCase();
        const group = String(item.group || "").toLowerCase();
        const id = String(item.id || "").toLowerCase();
        const fieldPath = extractFieldPath(item);
        let score = 0;
        if (title === query) score += 180;
        if (translatedTitle === query) score += 180;
        if (title.startsWith(query)) score += 120;
        if (translatedTitle.startsWith(query)) score += 120;
        if (title.includes(query)) score += 72;
        if (translatedTitle.includes(query)) score += 72;
        if (keywords.includes(query)) score += 58;
        if (subtitle.includes(query)) score += 34;
        if (translatedSubtitle.includes(query)) score += 34;
        if (group.includes(query)) score += 18;
        if (id.includes(query)) score += 12;
        if (scope === "fields" && fieldPageFilter && extractItemPageId(item) === fieldPageFilter) {
          score += 140;
        }
        if (scope === "fields" && fieldPathFilter) {
          if (fieldPath === fieldPathFilter) score += 240;
          else if (fieldPath.startsWith(fieldPathFilter)) score += 170;
          else if (fieldPath.includes(fieldPathFilter)) score += 96;
        }
        if (pageAffinity(item)) {
          score += scope === "fields" ? 60 : 24;
        }
        if (score <= 0) {
          return -1;
        }
        score -= Math.min(16, Math.floor(Math.max(0, title.length - query.length) / 8));
        return score;
      };

      const rankItems = (items, limitWhenQuery, limitWhenEmpty) => {
        const scoped = items.filter(item => allowKind(String(item && item.kind ? item.kind : "")));
        let candidates = scoped;
        if (scope === "fields") {
          if (fieldPageFilter) {
            candidates = candidates.filter(item => extractItemPageId(item) === fieldPageFilter);
          }
          if (fieldPathFilter) {
            candidates = candidates.filter(item => {
              const path = extractFieldPath(item);
              if (path.includes(fieldPathFilter)) {
                return true;
              }
              const title = String(item && item.title ? item.title : "").toLowerCase();
              const subtitle = String(item && item.subtitle ? item.subtitle : "").toLowerCase();
              return title.includes(fieldPathFilter) || subtitle.includes(fieldPathFilter);
            });
          }
        }
        if (!query) {
          return candidates
            .slice()
            .sort((a, b) => pageAffinity(b) - pageAffinity(a) || String(a.title || "").localeCompare(String(b.title || "")))
            .slice(0, limitWhenEmpty);
        }
        return candidates
          .map(item => ({ item, score: scoreItem(item) }))
          .filter(x => x.score > 0)
          .sort((a, b) => b.score - a.score || String(a.item.title || "").localeCompare(String(b.item.title || "")))
          .slice(0, limitWhenQuery)
          .map(x => x.item);
      };

      if (!query && Array.isArray(state.spotlight.recent) && state.spotlight.recent.length) {
        const recentItems = state.spotlight.recent
          .map(id => allById.get(id))
          .filter(item => item && allowKind(String(item.kind || "")))
          .filter(item => !fieldPageFilter || extractItemPageId(item) === fieldPageFilter)
          .filter(item => !fieldPathFilter || extractFieldPath(item).includes(fieldPathFilter))
          .slice(0, 6);
        if (recentItems.length) {
          groups.push({ title: "最近访问", items: recentItems });
        }
      }

      const matchedPages = rankItems(pages, 18, 8);
      const matchedActions = rankItems(actions, 12, 6);
      const matchedFields = rankItems(fields, 40, scope === "fields" ? 24 : 10);
      const matchedSettings = rankItems(settings, 14, 6);
      if (matchedPages.length) {
        groups.push({ title: "页面", items: matchedPages });
      }
      if (matchedActions.length) {
        groups.push({ title: "操作", items: matchedActions });
      }
      if (matchedFields.length) {
        groups.push({ title: "字段", items: matchedFields });
      }
      if (matchedSettings.length) {
        groups.push({ title: "设置", items: matchedSettings });
      }
      return groups;
    }

    async function runWithButtonBusy(button, loadingText, task) {
      const worker = typeof task === "function" ? task : async () => {};
      if (!button) {
        return worker();
      }
      if (button.dataset.busy === "1") {
        return undefined;
      }
      const restoreDisabled = !!button.disabled;
      const restoreBase = button.getAttribute("data-i18n-base");
      const restoreText = button.textContent;
      button.dataset.busy = "1";
      button.classList.add("is-loading");
      button.disabled = true;
      if (loadingText) {
        button.removeAttribute("data-i18n-base");
        button.textContent = t(loadingText);
      }
      try {
        return await worker();
      } finally {
        button.dataset.busy = "0";
        button.classList.remove("is-loading");
        button.disabled = restoreDisabled;
        if (restoreBase != null) {
          button.setAttribute("data-i18n-base", restoreBase);
          button.textContent = t(restoreBase);
        } else {
          button.textContent = restoreText || "";
        }

    function readTaskMetric(metricKey) {
      const key = String(metricKey || "").trim().toLowerCase();
      if (!key) {
        return { runs: 0, success: 0, failure: 0, lastRun: "", lastStatus: "" };
      }
      const item = state.taskMetrics.get(key);
      if (!item) {
        return { runs: 0, success: 0, failure: 0, lastRun: "", lastStatus: "" };
      }
      return normalizeTaskMetricRecord(item);
    }

    function bumpTaskMetric(metricKey, ok) {
      const key = String(metricKey || "").trim().toLowerCase();
      if (!key) {
        return;
      }
      const prev = readTaskMetric(key);
      const next = {
        runs: Math.max(0, Number(prev.runs || 0)) + 1,
        success: Math.max(0, Number(prev.success || 0)),
        failure: Math.max(0, Number(prev.failure || 0)),
        lastRun: new Date().toISOString(),
        lastStatus: String(prev.lastStatus || "")
      };
      if (ok === true) {
        next.success += 1;
        next.lastStatus = "success";
      } else if (ok === false) {
        next.failure += 1;
        next.lastStatus = "failure";
      }
      state.taskMetrics.set(key, {
        runs: next.runs,
        success: next.success,
        failure: next.failure,
        lastRun: next.lastRun,
        lastStatus: next.lastStatus
      });
      persistTaskMetrics();
    }

    function formatTaskResultStatus(status) {
      const normalized = String(status || "").trim().toLowerCase();
      if (normalized === "success") {
        return t("Success");
      }
      if (normalized === "failure") {
        return t("Failed");
      }
      return "-";
    }

    function formatMetricTime(isoText) {
      const text = String(isoText || "").trim();
      if (!text) {
        return "-";
      }
      const date = new Date(text);
      if (Number.isNaN(date.getTime())) {
        return "-";
      }
      return `${date.toLocaleDateString()} ${date.toLocaleTimeString()}`;
    }

    function isRiskSortableTaskSection(section) {
      const type = String(section && section.type ? section.type : "").toLowerCase();
      if (type !== "task") {
        return false;
      }
      const runTask = section && section.runTask ? String(section.runTask).trim() : "";
      return !!runTask;
    }

    function resolveTaskRiskSnapshot(section) {
      const metricKey = resolveTaskMetricKey(section);
      const metric = readTaskMetric(metricKey);
      const runs = Math.max(0, Number(metric.runs || 0));
      const failure = Math.max(0, Number(metric.failure || 0));
      const failureRate = runs > 0 ? failure / runs : 0;
      const recentPenalty = metric.lastStatus === "failure" ? 0.18 : 0;
      const volumeBoost = runs > 0 ? Math.min(1.5, Math.log10(runs + 1)) : 0;
      const score = runs <= 0
        ? -1
        : (failureRate + recentPenalty) * 100 + volumeBoost * 6 + Math.min(20, failure * 1.2);
      return { metricKey, metric, runs, failure, failureRate, score };
    }

    function sortTaskSectionsByRisk(sections) {
      const list = Array.isArray(sections) ? sections.slice() : [];
      const decorated = list
        .map((section, index) => ({ section, index }))
        .filter(item => isRiskSortableTaskSection(item.section))
        .map(item => Object.assign({}, item, { risk: resolveTaskRiskSnapshot(item.section) }))
        .sort((a, b) => {
          if (b.risk.score !== a.risk.score) {
            return b.risk.score - a.risk.score;
          }
          return a.index - b.index;
        });
      if (decorated.length < 2) {
        return list;
      }
      let cursor = 0;
      return list.map(section => {
        if (!isRiskSortableTaskSection(section)) {
          return section;
        }
        const next = decorated[cursor];
        cursor += 1;
        return next && next.section ? next.section : section;
      });
    }

    function normalizeLogLevelToken(level) {
      const text = String(level || "").trim().toLowerCase();
      if (!text) {
        return "info";
      }
      if (text.startsWith("warn")) {
        return "warn";
      }
      if (text.startsWith("err") || text.includes("fatal")) {
        return "error";
      }
      if (text.startsWith("debug") || text.startsWith("trace") || text.startsWith("info")) {
        return "info";
      }
      return text;
    }

    function formatLogLine(line) {
      if (typeof line === "string") {
        return `[--:--:--] [INFO] ${line}`;
      }
      const item = line && typeof line === "object" ? line : {};
      const timeSource = item.timestamp || item.time || "";
      const time = timeSource ? new Date(timeSource).toLocaleTimeString() : "--:--:--";
      const levelRaw = item.level || "INFO";
      const level = String(levelRaw || "INFO").toUpperCase();
      let message = "";
      if (item.message != null) {
        message = String(item.message);
      } else if (item.msg != null) {
        message = String(item.msg);
      } else if (item.content != null) {
        message = String(item.content);
      }
      return `[${time}] [${level}] ${message}`;
    }

    function matchesGlobalLogLine(line, levelFilter, query) {
      const normalizedLevel = normalizeLogLevelToken(line && line.level);
      if (levelFilter !== "all" && normalizedLevel !== levelFilter) {
        return false;
      }
      if (!query) {
        return true;
      }
      return formatLogLine(line).toLowerCase().includes(query);
    }

    function applyHighlightedText(node, rawText, keyword) {
      if (!node) return;
      const text = String(rawText == null ? "" : rawText);
      const query = normalizeSearchText(keyword).toLowerCase();
      clear(node);
      if (!query || !text) {
        node.textContent = text;
        return;
      }

      const lower = text.toLowerCase();
      let start = 0;
      while (start < text.length) {
        const hit = lower.indexOf(query, start);
        if (hit < 0) {
          node.appendChild(document.createTextNode(text.slice(start)));
          break;
        }
        if (hit > start) {
          node.appendChild(document.createTextNode(text.slice(start, hit)));
        }
        const mark = create("mark", "hit-mark");
        mark.textContent = text.slice(hit, hit + query.length);
        node.appendChild(mark);
        start = hit + query.length;
      }
    }

    function showToast(type, message) {
      const toast = create("div", `toast ${type || ""}`);

      toast.setAttribute("data-i18n-base", base);
      toast.textContent = t(base);
