    async function renderAiChatSection(section, host) {
      const endpoints = Object.assign({
        chat: "/api/ai/chat"
      }, section && section.endpoints ? section.endpoints : {});
      const { card, body, tools } = createSectionCard(section);
      card.classList.add("ai-chat-card");
      body.classList.add("ai-chat-layout");
      const clearBtn = create("button", "btn", "清空对话");
      const sendBtnTop = create("button", "btn primary", "发送");
      tools.appendChild(clearBtn);
      tools.appendChild(sendBtnTop);

      const main = create("div", "card ai-chat-main");
      const statusLine = create("div", "ai-chat-status", "");
      const historyBox = create("div", "chat-history ai-chat-history-large");
      const composer = create("div", "ai-chat-composer");
      const input = create("textarea", "ai-chat-input");
      input.placeholder = t("输入问题，回车发送；Shift+Enter 换行");
      const composerActions = create("div", "btn-row");
      const sendBtn = create("button", "btn primary", "发送");
      composerActions.appendChild(sendBtn);
      composer.appendChild(input);
      composer.appendChild(composerActions);
      main.appendChild(statusLine);
      main.appendChild(historyBox);
      main.appendChild(composer);
      body.appendChild(main);
      host.appendChild(card);

      const roleText = (role) => {
        const key = String(role || "").toLowerCase();
        if (key === "assistant") return "AI";
        if (key === "user") return t("你");
        if (key === "mcp") return "MCP";
        if (key === "system") return t("系统");
        return key || "-";
      };

      const renderHistory = () => {
        clear(historyBox);
        if (!state.ai.history.length) {
          historyBox.appendChild(create("div", "placeholder", "暂无对话"));
          return;
        }
        for (const item of state.ai.history) {
          const role = String(item.role || "system").toLowerCase();
          const row = create("div", `chat-item ${role}`);
          row.appendChild(create("div", "role", roleText(role)));
          const content = create("div", "");
          content.textContent = String(item.content || "");
          row.appendChild(content);
          historyBox.appendChild(row);
        }
        historyBox.scrollTop = historyBox.scrollHeight;
      };

      const setStatus = (text) => {
        const safe = String(text || "");
        state.ai.status = safe;
        statusLine.textContent = safe;
      };

      clearBtn.addEventListener("click", () => {
        state.ai.history = [];
        renderHistory();
        setStatus(t("聊天记录已清空"));
      });

      const sendMessage = async () => {
        const message = input.value.trim();
        if (!message) return;
        const historyBefore = state.ai.history.map(item => ({
          role: String(item.role || "user"),
          content: String(item.content || "")
        }));
        state.ai.history.push({ role: "user", content: message });
        renderHistory();
        input.value = "";
        sendBtn.disabled = true;
        sendBtnTop.disabled = true;
        setStatus(t("AI 正在思考..."));

        try {
          const data = await postJson(endpoints.chat, {
            message,
            history: historyBefore
          });
          if (data.ok === false) {
            throw new Error(data.error || "AI 响应失败");
          }

          if (Array.isArray(data.messages) && data.messages.length) {
            state.ai.history = data.messages
              .filter(x => x && x.content != null)
              .map(x => ({
                role: String(x.role || "system").toLowerCase(),
                content: String(x.content || "")
              }));
          } else {
            state.ai.history.push({ role: "assistant", content: data.reply || "(空响应)" });
          }
          renderHistory();
          setStatus(data.status || t("完成"));
        } catch (error) {
          showToast("error", error.message || error);
          setStatus(`${t("AI 调用失败")}: ${error.message || error}`);
        } finally {
          sendBtn.disabled = false;
          sendBtnTop.disabled = false;
        }
      };

      sendBtn.addEventListener("click", () => {
        sendMessage().catch(err => showToast("error", err.message || err));
      });
      sendBtnTop.addEventListener("click", () => {
        sendMessage().catch(err => showToast("error", err.message || err));
      });
      input.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          sendMessage().catch(err => showToast("error", err.message || err));
        }
      });

      renderHistory();
      setStatus(t("就绪"));
    }

    async function saveConfigPath(path, value) {
      return postJson("/api/config/set", { path, value });
    }

    async function renderConfigGroupSection(section, host) {
      const globalConfigQuery = String(section && section._globalConfigQuery ? section._globalConfigQuery : "").trim().toLowerCase();
      const collapseKey = section && section._collapseKey
        ? String(section._collapseKey)
        : buildSectionCollapseKey(state.activePageId, section);
      const { card, body } = createSectionCard(section, {
        collapsible: true,
        defaultCollapsed: true,
        collapseKey,
        forceExpanded: !!globalConfigQuery || !!(section && section._forceExpanded)
      });
      const fields = Array.isArray(section.fields) ? section.fields : [];
      if (!state.configEditors.has(section.id)) {
        state.configEditors.set(section.id, {
          page: 1,
          pageSize: 5,
          filter: "",
          kindFilter: "all",
          onlyDirty: false,
          dirtyCursorPath: "",
          drafts: new Map(),
          baseline: new Map()
        });
      }
      const editor = state.configEditors.get(section.id);
      if (typeof editor.filter !== "string") {
        editor.filter = "";
      }
      if (typeof editor.kindFilter !== "string") {
        editor.kindFilter = "all";
      }
      if (typeof editor.onlyDirty !== "boolean") {
        editor.onlyDirty = false;
      }
      if (typeof editor.dirtyCursorPath !== "string") {
        editor.dirtyCursorPath = "";
      }
      if (!(editor.drafts instanceof Map)) {
        editor.drafts = new Map();
      }
      if (!(editor.baseline instanceof Map)) {
        editor.baseline = new Map();
      }
      for (const field of fields) {
        if (!field || !field.path) {
          continue;
        }
        if (editor.drafts.has(field.path)) {
          continue;
        }
        editor.baseline.set(field.path, cloneValue(field.value));
      }
      if (globalConfigQuery && editor.filter !== globalConfigQuery) {
        editor.page = 1;
      }

      const pageSizeSelect = create("select");
      for (const n of [5, 10, 20, 35, 50]) {
        const opt = create("option");
        opt.value = String(n);
        opt.textContent = `${n} / ${t("页")}`;
        if (n === editor.pageSize) opt.selected = true;
        pageSizeSelect.appendChild(opt);
      }

      const savePageBtn = create("button", "btn primary", "保存当前页");
      const reloadBtn = create("button", "btn", "刷新 Schema");
      const filterInput = create("input");
      filterInput.placeholder = t("筛选字段路径或名称");
      filterInput.style.minWidth = "220px";
      filterInput.value = globalConfigQuery || editor.filter;
      filterInput.disabled = !!globalConfigQuery;
      filterInput.setAttribute("aria-label", t("筛选字段路径或名称"));

      const normalizeConfigFieldType = (value) => {
        const raw = String(value || "").trim().toLowerCase();
        if (raw === "bool" || raw === "boolean") return "bool";
        if (raw === "number" || raw === "int" || raw === "float" || raw === "double") return "number";
        if (raw === "json" || raw === "object" || raw === "array") return "json";
        if (raw === "enum") return "enum";
        return "text";
      };

      const kindSelect = create("select");
      kindSelect.style.minWidth = "126px";
      kindSelect.setAttribute("aria-label", t("字段类型"));
      kindSelect.title = t("字段类型");
      const kindItems = [
        { value: "all", label: "全部类型" },
        { value: "text", label: "文本" },
        { value: "number", label: "数值" },
        { value: "bool", label: "布尔" },
        { value: "enum", label: "枚举" },
        { value: "json", label: "JSON" }
      ];
      for (const item of kindItems) {
        const opt = create("option", "", item.label);
        opt.value = item.value;
        kindSelect.appendChild(opt);
      }
      kindSelect.value = editor.kindFilter === "all"
        ? "all"
        : normalizeConfigFieldType(editor.kindFilter);
      if (!kindItems.some(item => item.value === kindSelect.value)) {
        editor.kindFilter = "all";
        kindSelect.value = "all";
      }

      const bodyTools = create("div", "btn-row");
      bodyTools.appendChild(filterInput);
      bodyTools.appendChild(kindSelect);
      const onlyDirtyInput = create("input");
      onlyDirtyInput.type = "checkbox";
      onlyDirtyInput.checked = !!editor.onlyDirty;
      const onlyDirtyLabel = create("label", "toggle");
      onlyDirtyLabel.appendChild(onlyDirtyInput);
      onlyDirtyLabel.appendChild(create("span", "", "仅看已修改"));
      const dirtyCountChip = create("span", "chip");
      const dirtyCursorChip = create("span", "chip");
      const dirtyHotkeyChip = create("span", "chip");
      dirtyHotkeyChip.textContent = l("Alt+↑/↓ 跳转 · Ctrl+Shift+S 全保存", "Alt+↑/↓ Jump · Ctrl+Shift+S Save All");
      const prevDirtyBtn = create("button", "btn", "上一个改动");
      const nextDirtyBtn = create("button", "btn", "下一个改动");
      const locateDirtyBtn = create("button", "btn", "定位首个改动");
      const saveDirtyBtn = create("button", "btn primary", "保存全部已修改");
      bodyTools.appendChild(onlyDirtyLabel);
      bodyTools.appendChild(dirtyCountChip);
      bodyTools.appendChild(dirtyCursorChip);
      bodyTools.appendChild(dirtyHotkeyChip);
      bodyTools.appendChild(prevDirtyBtn);
      bodyTools.appendChild(nextDirtyBtn);
      bodyTools.appendChild(locateDirtyBtn);
      bodyTools.appendChild(saveDirtyBtn);
      bodyTools.appendChild(pageSizeSelect);
      bodyTools.appendChild(savePageBtn);
      bodyTools.appendChild(reloadBtn);

      const list = create("div", "list");
      const pager = create("div");
      body.appendChild(bodyTools);
      body.appendChild(list);
      body.appendChild(pager);

      const getCurrentValue = (field) => {
        if (editor.drafts.has(field.path)) {
          return editor.drafts.get(field.path);
        }
        if (!editor.baseline.has(field.path)) {
          editor.baseline.set(field.path, cloneValue(field.value));
        }
        return cloneValue(editor.baseline.get(field.path));
      };

      const setDraft = (field, value) => {
        editor.drafts.set(field.path, value);
      };

      const getBaselineValue = (field) => {
        if (!editor.baseline.has(field.path)) {
          editor.baseline.set(field.path, cloneValue(field.value));
        }
        return cloneValue(editor.baseline.get(field.path));
      };

      const isFieldDirty = (field, value) => {
        const baseline = getBaselineValue(field);
        return !isSameValue(value, baseline);
      };

      const isPathDirty = (path) => {
        const key = String(path || "");
        if (!key || !editor.drafts.has(key)) {
          return false;
        }
        const draft = editor.drafts.get(key);
        const baseline = editor.baseline.get(key);
        return !isSameValue(draft, baseline);
      };

      const getDirtyFields = () => fields.filter(field => isPathDirty(field && field.path));

      const refreshDirtyCount = () => {
        const dirtyItems = getDirtyFields();
        const dirtyCount = dirtyItems.length;
        dirtyCountChip.textContent = `${t("已修改")}: ${dirtyCount}`;
        const activePath = inferActiveDirtyPath();
        if (activePath) {
          editor.dirtyCursorPath = activePath;
        }
        if (dirtyCount <= 0) {
          editor.dirtyCursorPath = "";
          dirtyCursorChip.textContent = l("改动 -/-", "Dirty -/-");
        } else {
          let cursorIndex = dirtyItems.findIndex(field => String(field && field.path ? field.path : "") === String(editor.dirtyCursorPath || ""));
          if (cursorIndex < 0) {
            cursorIndex = 0;
            editor.dirtyCursorPath = String(dirtyItems[0] && dirtyItems[0].path ? dirtyItems[0].path : "");
          }
          dirtyCursorChip.textContent = l(`改动 ${cursorIndex + 1}/${dirtyCount}`, `Dirty ${cursorIndex + 1}/${dirtyCount}`);
        }
        const disabled = dirtyCount <= 0;
        locateDirtyBtn.disabled = disabled;
        prevDirtyBtn.disabled = disabled;
        nextDirtyBtn.disabled = disabled;
        saveDirtyBtn.disabled = disabled;
        return dirtyCount;
      };

      const locateDirtyPathOnPage = (path) => {
        const key = String(path || "");
        if (!key) {
          return false;
        }
        const rows = list.querySelectorAll(".list-item");
        for (const row of rows) {
          const pathNode = row.querySelector(".field-path");
          if (!pathNode) {
            continue;
          }
          if (String(pathNode.textContent || "").trim() !== key) {
            continue;
          }
          row.scrollIntoView({ behavior: "smooth", block: "center" });
          row.classList.add("field-jump-flash");
          setTimeout(() => row.classList.remove("field-jump-flash"), 1800);
          const focusTarget = row.querySelector("input,select,textarea,button");
          if (focusTarget && typeof focusTarget.focus === "function") {
            focusTarget.focus({ preventScroll: true });
          }
          return true;
        }
        return false;
      };

      const ensureDirtyPathVisible = (path) => {
        const key = String(path || "");
        if (!key) {
          return false;
        }
        const hasPath = () => filtered().some(field => String(field && field.path ? field.path : "") === key);
        if (hasPath()) {
          return true;
        }
        editor.onlyDirty = true;
        onlyDirtyInput.checked = true;
        editor.kindFilter = "all";
        kindSelect.value = "all";
        if (!globalConfigQuery) {
          editor.filter = "";
          filterInput.value = "";
        }
        return hasPath();
      };

      const jumpToDirtyPath = (path, successMessage) => {
        const key = String(path || "");
        if (!key) {
          return false;
        }
        if (!ensureDirtyPathVisible(key)) {
          return false;
        }
        const data = filtered();
        const targetIndex = data.findIndex(field => String(field && field.path ? field.path : "") === key);
        if (targetIndex < 0) {
          return false;
        }
        editor.page = Math.floor(targetIndex / editor.pageSize) + 1;
        editor.dirtyCursorPath = key;
        draw();
        setTimeout(() => {
          const located = locateDirtyPathOnPage(key);
          if (located && successMessage) {
            showToast("ok", successMessage);
          }
        }, 0);
        return true;
      };

      const inferActiveDirtyPath = () => {
        const active = document.activeElement;
        if (!active || typeof active.closest !== "function") {
          return "";
        }
        const row = active.closest(".list-item");
        if (!row) {
          return "";
        }
        const pathNode = row.querySelector(".field-path");
        const key = pathNode ? String(pathNode.textContent || "").trim() : "";
        if (!key || !isPathDirty(key)) {
          return "";
        }
        return key;
      };

      const moveDirtyCursor = (delta) => {
        const dirtyItems = getDirtyFields();
        if (!dirtyItems.length) {
          showToast("warn", l("暂无未保存改动", "No unsaved changes"));
          return;
        }
        const activeKey = inferActiveDirtyPath();
        if (activeKey) {
          editor.dirtyCursorPath = activeKey;
        }
        const currentKey = String(editor.dirtyCursorPath || "");
        let currentIndex = dirtyItems.findIndex(field => String(field && field.path ? field.path : "") === currentKey);
        if (currentIndex < 0) {
          currentIndex = delta > 0 ? -1 : 0;
        }
        const nextIndex = (currentIndex + delta + dirtyItems.length) % dirtyItems.length;
        const target = dirtyItems[nextIndex];
        if (!target || !target.path) {
          return;
        }
        const moved = jumpToDirtyPath(
          target.path,
          delta > 0
            ? l("已定位到下一个改动项", "Jumped to next dirty item")
            : l("已定位到上一个改动项", "Jumped to previous dirty item")
        );
        if (!moved) {
          showToast("warn", l("未找到可定位的改动项", "No visible dirty item"));
        }
      };

      const filtered = () => {
        const keyword = String(globalConfigQuery || editor.filter || "").trim().toLowerCase();
        const kind = String(editor.kindFilter || "all").trim().toLowerCase();
        return fields.filter(f => {
          const text = `${f.path || ""} ${f.label || ""} ${f.key || ""}`.toLowerCase();
          const textMatched = !keyword || text.includes(keyword);
          const fieldKind = normalizeConfigFieldType(f && f.valueType);
          const kindMatched = kind === "all" || fieldKind === kind;
          const dirtyMatched = !editor.onlyDirty || isPathDirty(f && f.path);
          return textMatched && kindMatched && dirtyMatched;
        });
      };

      const buildControl = (field) => {
        const type = field.valueType || "text";
        const inferredType = type === "enum" ? "enum" : type === "bool" ? "bool" : type === "number" ? "number" : type === "json" ? "json" : "text";
        return createFieldControl(
          {
            key: field.key,
            label: field.label || toFriendlyLabel(field.key),
            path: field.path,
            type: inferredType,
            options: field.options
          },
          getCurrentValue(field),
          field.options
        );
      };

      const saveField = async (field, control) => {
        const value = control.getValue();
        await saveConfigPath(field.path, value);
        editor.baseline.set(field.path, cloneValue(value));
        editor.drafts.delete(field.path);
      };

      const draw = () => {
        clear(list);
        const data = filtered();
        refreshDirtyCount();
        const pageInfo = paginate(data, editor.page, editor.pageSize);
        editor.page = pageInfo.current;

        if (!pageInfo.data.length) {
          list.appendChild(create("div", "placeholder", "没有匹配的字段"));
        } else {
          for (const field of pageInfo.data) {
            const row = create("div", "list-item");
            const control = buildControl(field);
            const saveBtn = create("button", "btn", "保存本项");
            const dirtyChip = create("span", "dirty-chip", "已修改");
            saveBtn.addEventListener("click", async () => {
              try {
                await saveField(field, control);
                const savedValue = control.getValue();
                editor.baseline.set(field.path, cloneValue(savedValue));
                setDraft(field, cloneValue(savedValue));
                updateRowDirtyState();
                showToast("ok", `${field.path} 已保存`);
              } catch (error) {
                showToast("error", `${field.path} 保存失败: ${error.message || error}`);
              }
            });
            const highlightQuery = String(globalConfigQuery || editor.filter || "").trim();
            if (highlightQuery) {
              const labelNode = control.field.querySelector(":scope > label");
              const pathNode = control.field.querySelector(".field-path");
              if (labelNode) {
                applyHighlightedText(labelNode, labelNode.textContent || "", highlightQuery);
              }
              if (pathNode) {
                applyHighlightedText(pathNode, pathNode.textContent || "", highlightQuery);
              }
            }
            row.appendChild(control.field);
            const rowTools = create("div", "btn-row");
            rowTools.appendChild(saveBtn);
            rowTools.appendChild(dirtyChip);
            row.appendChild(rowTools);
            list.appendChild(row);

            const updateRowDirtyState = () => {
              let value;
              let parseError = false;
              try {
                value = control.getValue();
              } catch {
                parseError = true;
              }
              const dirty = parseError || isFieldDirty(field, value);
              row.classList.toggle("is-dirty", dirty);
              dirtyChip.style.display = dirty ? "inline-flex" : "none";
              saveBtn.classList.toggle("primary", dirty);
              if (!parseError) {
                if (dirty) {
                  setDraft(field, cloneValue(value));
                } else {
                  editor.drafts.delete(field.path);
                }
              }
              if (!dirty && editor.dirtyCursorPath === field.path) {
                editor.dirtyCursorPath = "";
              }
              refreshDirtyCount();
            };

            const target = control && control.input ? control.input : null;
            if (target && typeof target.addEventListener === "function") {
              target.addEventListener("input", updateRowDirtyState);
              target.addEventListener("change", updateRowDirtyState);
              target.addEventListener("focus", () => {
                if (isPathDirty(field.path)) {
                  editor.dirtyCursorPath = field.path;
                }
              });
            }
            updateRowDirtyState();
          }
        }

        renderPager(pager, pageInfo, (nextPage) => {
          editor.page = nextPage;
          draw();
        });
      };

      pageSizeSelect.addEventListener("change", () => {
        editor.pageSize = Number(pageSizeSelect.value) || 20;
        editor.page = 1;
        draw();
      });

      if (!globalConfigQuery) {
        let filterTimer = null;
        filterInput.addEventListener("input", () => {
          editor.filter = filterInput.value || "";
          if (filterTimer) {
            clearTimeout(filterTimer);
          }
          filterTimer = setTimeout(() => {
            editor.page = 1;
            draw();
          }, 90);
        });
      }

      kindSelect.addEventListener("change", () => {
        editor.kindFilter = String(kindSelect.value || "all").trim().toLowerCase() || "all";
        editor.page = 1;
        draw();
      });

      onlyDirtyInput.addEventListener("change", () => {
        editor.onlyDirty = !!onlyDirtyInput.checked;
        editor.page = 1;
        draw();
      });

      prevDirtyBtn.addEventListener("click", () => {
        moveDirtyCursor(-1);
      });

      nextDirtyBtn.addEventListener("click", () => {
        moveDirtyCursor(1);
      });

      locateDirtyBtn.addEventListener("click", () => {
        const dirtyItems = getDirtyFields();
        if (!dirtyItems.length) {
          showToast("warn", l("暂无未保存改动", "No unsaved changes"));
          return;
        }
        const target = dirtyItems[0];
        if (!target || !target.path) {
          showToast("warn", l("未找到可定位的改动项", "No visible dirty item"));
          return;
        }
        const moved = jumpToDirtyPath(target.path, l("已定位到首个改动项", "Jumped to first dirty item"));
        if (!moved) {
          showToast("warn", l("未找到可定位的改动项", "No visible dirty item"));
        }
      });

      saveDirtyBtn.addEventListener("click", () => {
        runWithButtonBusy(saveDirtyBtn, "保存中...", async () => {
          const dirtyItems = getDirtyFields();
          if (!dirtyItems.length) {
            showToast("warn", l("暂无未保存改动", "No unsaved changes"));
            return;
          }
          let saved = 0;
          let failed = 0;
          for (const field of dirtyItems) {
            const path = field && field.path ? String(field.path) : "";
            if (!path || !editor.drafts.has(path)) {
              continue;
            }
            const value = cloneValue(editor.drafts.get(path));
            try {
              await saveConfigPath(path, value);
              editor.baseline.set(path, cloneValue(value));
              editor.drafts.delete(path);
              saved += 1;
            } catch (error) {
              failed += 1;
              showToast("error", `${path} 保存失败: ${error.message || error}`);
            }
          }
          draw();
          if (failed > 0) {
            showToast("warn", l(`已保存 ${saved} 项，失败 ${failed} 项`, `Saved ${saved}, failed ${failed}`));
          } else {
            showToast("ok", l(`已保存全部改动（${saved} 项）`, `Saved all changes (${saved})`));
          }
        }).catch(err => showToast("error", err.message || err));
      });

      const onConfigKeydown = (event) => {
        const key = String(event && event.key ? event.key : "");
        if (!key) {
          return;
        }
        if (event.altKey && !event.ctrlKey && !event.metaKey && !event.shiftKey && key === "ArrowUp") {
          event.preventDefault();
          moveDirtyCursor(-1);
          return;
        }
        if (event.altKey && !event.ctrlKey && !event.metaKey && !event.shiftKey && key === "ArrowDown") {
          event.preventDefault();
          moveDirtyCursor(1);
          return;
        }
        const saveAllHotkey = (event.ctrlKey || event.metaKey) && event.shiftKey && key.toLowerCase() === "s";
        if (saveAllHotkey) {
          event.preventDefault();
          saveDirtyBtn.click();
        }
      };
      card.addEventListener("keydown", onConfigKeydown);
      registerCleanup(() => {
        card.removeEventListener("keydown", onConfigKeydown);
      });

      savePageBtn.addEventListener("click", async () => {
        const data = filtered();
        const pageInfo = paginate(data, editor.page, editor.pageSize);
        if (!pageInfo.data.length) return;
        let saved = 0;
        for (const field of pageInfo.data) {
          const row = [...list.children].find(node => node.querySelector(".field-path")?.textContent === field.path);
          if (!row) continue;
          const input = row.querySelector("input,select,textarea");
          if (!input) continue;
          try {
            let value;
            if (field.valueType === "bool") {
              value = !!input.checked;
            } else if (field.valueType === "number") {
              const parsed = Number(input.value);
              value = Number.isFinite(parsed) ? parsed : 0;
            } else if (field.valueType === "json") {
              value = parseJsonOrThrow(input.value);
            } else {
              value = input.value;
            }
            await saveConfigPath(field.path, value);
            editor.baseline.set(field.path, cloneValue(value));
            editor.drafts.delete(field.path);
            saved += 1;
          } catch (error) {
            showToast("error", `${field.path} 保存失败: ${error.message || error}`);
          }
        }
        draw();
        showToast("ok", l(`已保存 ${saved} 个字段`, `Saved ${saved} fields`));
      });

      reloadBtn.addEventListener("click", () => loadSchema(true));

      draw();
      host.appendChild(card);
    }

    async function renderRouteExplorerSection(section, host) {
      const { card, body, tools } = createSectionCard(section);
      const filterInput = create("input");
      filterInput.placeholder = t("筛选 route");
      filterInput.style.minWidth = "240px";
      const result = create("div", "route-result");
      const list = create("div", "list");
      const pager = create("div");

      let page = 1;
      const pageSize = 18;
      let activeBlobUrl = null;

      const cleanupBlobUrl = () => {
        if (!activeBlobUrl) return;
        try {
          URL.revokeObjectURL(activeBlobUrl);
        } catch {
        }
        activeBlobUrl = null;
      };
      registerCleanup(cleanupBlobUrl);

      const showTextResult = (text) => {
        cleanupBlobUrl();
        clear(result);
        result.textContent = text;
      };

      const showBinaryResult = (blob, contentType) => {
        cleanupBlobUrl();
        clear(result);
        const size = Number(blob.size || 0);
        result.appendChild(create("div", "", `Binary: ${contentType || "application/octet-stream"} | ${size} bytes`));
        const link = create("a", "btn");
        link.textContent = t("下载响应");
        link.target = "_blank";
        activeBlobUrl = URL.createObjectURL(blob);
        link.href = activeBlobUrl;
        link.download = "route-response.bin";
        link.style.display = "inline-block";
        link.style.marginTop = "8px";
        result.appendChild(link);
      };

      const showImageResult = (blob, contentType) => {
        cleanupBlobUrl();
        clear(result);
        const info = create("div", "small muted", `${contentType || "image/*"} | ${blob.size || 0} bytes`);
        const img = create("img");
        img.style.maxWidth = "100%";
        img.style.display = "block";
        img.style.marginTop = "8px";
        img.style.borderRadius = "8px";
        activeBlobUrl = URL.createObjectURL(blob);
        img.src = activeBlobUrl;
        result.appendChild(info);
        result.appendChild(img);
      };

      const invokeRoute = async (route, payload) => {
        const init = route.method === "POST"
          ? {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload ?? {})
            }
          : { method: "GET" };
        const response = await fetch(route.path, init);
        const contentType = (response.headers.get("content-type") || "").toLowerCase();
        if (!response.ok) {
          const text = await response.text().catch(() => "");
          throw new Error(text || `${response.status} ${response.statusText}`);
        }

        if (contentType.includes("text/event-stream")) {
          showTextResult(t("SSE 接口不支持直接预览，请在对应页面查看。"));
          return;
        }

        if (contentType.startsWith("image/")) {
          const blob = await response.blob();
          showImageResult(blob, contentType);
          return;
        }

        const isText = contentType.includes("application/json") ||
          contentType.startsWith("text/") ||
          contentType.includes("xml") ||
          contentType.includes("javascript") ||
          contentType.includes("html");

        if (isText) {
          const text = await response.text();
          showTextResult(text.length > 120000 ? `${text.slice(0, 120000)}\n... (truncated)` : text);
          return;
        }

        const blob = await response.blob();
        showBinaryResult(blob, contentType);
      };

      tools.appendChild(filterInput);
      body.appendChild(list);
      body.appendChild(pager);
      body.appendChild(result);
      host.appendChild(card);

      const allRoutes = [];
      for (const path of state.routes.get || []) allRoutes.push({ method: "GET", path });
      for (const path of state.routes.post || []) allRoutes.push({ method: "POST", path });

      const draw = () => {
        clear(list);
        const keyword = filterInput.value.trim().toLowerCase();
        const filtered = allRoutes.filter(r => {
          if (!keyword) return true;
          return `${r.method} ${r.path}`.toLowerCase().includes(keyword);
        });

        const pageInfo = paginate(filtered, page, pageSize);
        page = pageInfo.current;

        if (!pageInfo.data.length) {
          list.appendChild(create("div", "placeholder", "无匹配接口"));
        } else {
          for (const route of pageInfo.data) {
            const row = create("div", "list-item");
            row.appendChild(create("div", "name mono", `${route.method} ${route.path}`));
            const ops = create("div", "btn-row");
            const callBtn = create("button", `btn ${route.method === "POST" ? "primary" : ""}`, "调用");
            ops.appendChild(callBtn);
            row.appendChild(ops);
            list.appendChild(row);

            callBtn.addEventListener("click", async () => {
              try {
                if (route.method === "POST") {
                  const payloadText = promptL(
                    l(`POST ${route.path} 的 JSON 请求体`, `POST ${route.path} JSON request body`),
                    "{}"
                  );
                  if (payloadText == null) return;
                  const payload = payloadText.trim() ? JSON.parse(payloadText) : {};
                  await invokeRoute(route, payload);
                } else {
                  await invokeRoute(route, null);
                }
              } catch (error) {
                showTextResult(`ERROR: ${error.message || error}`);
              }
            });
          }
        }

        renderPager(pager, pageInfo, (nextPage) => {
          page = nextPage;
          draw();
        });
      };

      filterInput.addEventListener("input", () => {
        page = 1;
        draw();
      });

      draw();
    }

    async function renderBrowserNotifySection(section, host) {
      const { card, body, tools } = createSectionCard(section);
      const intro = create(
        "div",

        section && section.description
          ? String(section.description)

      );

      body.appendChild(statusLine);
      body.appendChild(hintLine);

      const form = create("div", "form-grid");
      const enabledCtl = createFieldControl(
        { key: "enabled", label: l("启用浏览器自动推送", "Enable Browser Auto Push"), type: "bool" },
        !!state.browserPush.prefs.enabled
      );
      const warningCtl = createFieldControl(
        { key: "warning", label: l("推送警告变化", "Notify Warning Changes"), type: "bool" },
        !!state.browserPush.prefs.warning
      );
      const runtimeCtl = createFieldControl(
        { key: "runtime", label: l("推送运行状态变化", "Notify Runtime Changes"), type: "bool" },
        !!state.browserPush.prefs.runtime
      );
      form.appendChild(enabledCtl.field);
      form.appendChild(warningCtl.field);
      form.appendChild(runtimeCtl.field);
      body.appendChild(form);

      const applyPrefs = () => {
        state.browserPush.prefs = normalizeBrowserPushPrefs({
          enabled: enabledCtl.getValue(),
          warning: warningCtl.getValue(),
          runtime: runtimeCtl.getValue()
        });
        if (!state.browserPush.prefs.enabled) {
          state.browserPush.baselineReady = false;
        }
        persistBrowserPushPrefs();
      };

      const refreshStatusText = () => {
        const permission = updateBrowserPushPermission();
        const supportedText = state.browserPush.supported
          ? l("支持", "Supported")
          : l("不支持", "Not Supported");
        statusLine.textContent = l(
          `浏览器通知支持: ${supportedText} ｜ 权限: ${permission}`,
          `Browser notification: ${supportedText} | Permission: ${permission}`
        );
        hintLine.textContent = state.browserPush.supported
          ? l("建议授权后再开启自动推送。关闭开关后不会再触发浏览器通知。", "Grant permission before enabling auto push. Disable the switch to stop notifications.")
          : l("当前浏览器不支持 Notification API。", "This browser does not support Notification API.");
      };

      enabledCtl.input.addEventListener("change", () => {
        applyPrefs();
        refreshStatusText();
      });
      warningCtl.input.addEventListener("change", () => {
        applyPrefs();
        refreshStatusText();
      });
      runtimeCtl.input.addEventListener("change", () => {
        applyPrefs();
        refreshStatusText();
      });
      applyPrefs();

      const permissionBtn = create("button", "btn", l("申请通知权限", "Request Permission"));
      permissionBtn.addEventListener("click", () => {
        runWithButtonBusy(permissionBtn, l("处理中...", "Working..."), async () => {
          if (!state.browserPush.supported) {
            showToast("warn", l("当前浏览器不支持通知。", "Browser notification is not supported."));
            return;
          }
          const result = await Notification.requestPermission();
          updateBrowserPushPermission();
          refreshStatusText();
          if (result === "granted") {
            showToast("ok", l("通知权限已授予。", "Notification permission granted."));
          } else {
            showToast("warn", l(`通知权限状态: ${result}`, `Notification permission: ${result}`));
          }
        }).catch(err => showToast("error", err.message || err));
      });
      tools.appendChild(permissionBtn);

      const testBtn = create("button", "btn primary", l("测试浏览器推送", "Test Browser Push"));
      testBtn.addEventListener("click", () => {
        runWithButtonBusy(testBtn, l("发送中...", "Sending..."), async () => {
          if (!state.browserPush.supported) {
            showToast("warn", l("当前浏览器不支持通知。", "Browser notification is not supported."));
            return;
          }
          const permission = updateBrowserPushPermission();
          if (permission !== "granted") {
            showToast("warn", l("请先申请并允许通知权限。", "Please grant notification permission first."));
            return;
          }
          const ok = sendBrowserNotification(
            l("BetterGI 浏览器推送测试", "BetterGI Browser Push Test"),
            l("收到这条消息说明浏览器推送可用。", "If you received this, browser push is working."),
            { tag: "bgi-browser-push-test", autoCloseMs: 8000 }
          );
          if (ok) {
            showToast("ok", l("测试通知已发送。", "Test notification sent."));
          } else {
            showToast("error", l("通知发送失败。", "Failed to send browser notification."));
          }
        }).catch(err => showToast("error", err.message || err));
      });
      tools.appendChild(testBtn);

      refreshStatusText();
      host.appendChild(card);
    }

              await executeSchemaAction(
                Object.assign(

                  action,
                  {
                    promptJson: action.promptJson || method === "POST",

                  {
                    method: "POST",
                    endpoint,
                    payload: {},
                    promptJson: true,
                    successMessage: ""
                  },
                  actionContext(),
                  (result) => {

      body.appendChild(renderResult);

      host.appendChild(card);

    const sectionRendererRegistry = Object.freeze({
      actions: renderActionsSection,
      settings: renderSettingsSection,
      task: renderTaskSection,
      screen: renderScreenSection,
      logs: renderLogsSection,
      scheduler: renderSchedulerSection,
      one_dragon: renderOneDragonSection,
      library: renderLibrarySection,
      ai_chat: renderAiChatSection,
      browser_notify: renderBrowserNotifySection,
      config_group: renderConfigGroupSection,
      fastapi_docs: renderFastApiDocsSection,
      route_explorer: renderRouteExplorerSection
    });

    function resolveSectionRenderer(section) {
      const type = String(section && section.type ? section.type : "").toLowerCase();
      if (type && Object.prototype.hasOwnProperty.call(sectionRendererRegistry, type)) {
        return sectionRendererRegistry[type];
      }

      // Fallback by shape: allow schema additions without new frontend renderer code.
      if (Array.isArray(section && section.fields) && (section.getEndpoint || section.postEndpoint)) {
        return renderSettingsSection;
      }
      if (Array.isArray(section && section.actions) && section.actions.length) {
        return renderActionsSection;
      }
      if (section && (section.runTask || section.getEndpoint || section.postEndpoint || Array.isArray(section.customPayload))) {
        return renderTaskSection;
      }
      return renderUnknownSection;
    }

    async function renderActivePage() {

        ui.pageHost.appendChild(create("div", "placeholder", "未找到页面"));
        return;
      }

      const header = create("div", "page-title card");
      const left = create("div");
      const pageTitleNode = create("h2", "", page.title || page.id);
      left.appendChild(pageTitleNode);
      left.appendChild(create("div", "muted", `${t("Page ID")}: ${page.id}`));
      header.appendChild(left);
      const query = String(state.globalQuery || "").trim().toLowerCase();
      const hasGlobalQuery = !!query;
      const pageFilterRaw = String(state.pageSectionFilter[page.id] || "").trim();
      const pageFilterQuery = pageFilterRaw.toLowerCase();
      if (hasGlobalQuery) {
        applyHighlightedText(pageTitleNode, pageTitleNode.textContent || "", query);
      }
      const desktopRailVisible = shouldShowDesktopRail();
      const useOverviewGrid = !state.standaloneMode && shouldUseOverviewGrid(page.id, hasGlobalQuery);
      const useDashboardLayout = shouldUseDashboardPairs(page.id, hasGlobalQuery) && !desktopRailVisible;
      ui.pageHost.classList.toggle("overview-grid", useOverviewGrid);
      ui.pageHost.classList.toggle("dashboard-pairs", useDashboardLayout);

      let sections = (Array.isArray(page.sections) ? page.sections : [])
        .filter(Boolean)
        .map(rawSection => {
          const pageMatched = hasGlobalQuery
            ? `${page.id || ""} ${page.title || ""}`.toLowerCase().includes(query)
            : false;
          const sectionType = String(rawSection.type || "").toLowerCase();
          const titleText = `${rawSection.id || ""} ${rawSection.title || ""}`.toLowerCase();
          const titleMatched = !hasGlobalQuery || pageMatched || titleText.includes(query);
          const fields = Array.isArray(rawSection.fields) ? rawSection.fields : [];
          const fieldMatched = hasGlobalQuery && !titleMatched && fields.length > 0
            ? fields.some(field => {
                const text = `${field.path || ""} ${field.key || ""} ${field.label || ""}`.toLowerCase();
                return text.includes(query);
              })
            : false;
          const actions = Array.isArray(rawSection.actions) ? rawSection.actions : [];
          const actionMatched = hasGlobalQuery && !titleMatched && !fieldMatched && actions.length > 0
            ? actions.some(action => {
                const text = `${action.label || ""} ${action.endpoint || ""} ${action.method || ""}`.toLowerCase();
                return text.includes(query);
              })
            : false;
          const endpointMatched = hasGlobalQuery && !titleMatched && !fieldMatched && !actionMatched &&
            rawSection.endpoints && typeof rawSection.endpoints === "object"
            ? Object.entries(rawSection.endpoints).some(([key, value]) => `${key} ${value || ""}`.toLowerCase().includes(query))
            : false;
          if (hasGlobalQuery && !titleMatched && !fieldMatched && !actionMatched && !endpointMatched) {
            return null;
          }

          const section = { ...rawSection };
          if (sectionType === "config_group") {
            section._globalConfigQuery = hasGlobalQuery && !titleMatched ? query : "";
          }
          const collapseKey = buildSectionCollapseKey(page.id, section);
          const collapsible = shouldDefaultCollapseSection(page.id, section);
          section._collapseKey = collapseKey;
          section._collapsible = collapsible;
          section._defaultCollapsed = collapsible;
          section._forceExpanded = hasGlobalQuery;
          return section;
        })
        .filter(Boolean);

      if (pageFilterQuery) {
        sections = sections.filter(section => {
          const text = `${section && section.id ? section.id : ""} ${section && section.title ? section.title : ""} ${section && section.type ? section.type : ""}`.toLowerCase();
          return text.includes(pageFilterQuery);
        });
      }

      if (desktopRailVisible) {
        sections = sections.filter(section => !isInfoRailSection(section));
      }

      if (String(page.id || "").toLowerCase() === "dashboard") {
        const order = ["runtime-actions", "basic-features", "screen", "logs"];
        sections = sections.slice().sort((a, b) => {
          const ai = order.indexOf(String(a && a.id ? a.id : "").toLowerCase());
          const bi = order.indexOf(String(b && b.id ? b.id : "").toLowerCase());
          const av = ai >= 0 ? ai : Number.MAX_SAFE_INTEGER;
          const bv = bi >= 0 ? bi : Number.MAX_SAFE_INTEGER;
          return av - bv;
        });
      }

      const taskRiskCandidates = sections.filter(section => isRiskSortableTaskSection(section));
      const canTaskRiskSort = !hasGlobalQuery && taskRiskCandidates.length >= 2;
      if (canTaskRiskSort && state.taskRiskSortEnabled) {
        sections = sortTaskSectionsByRisk(sections);
      }

      const right = create("div", "btn-row");
      right.appendChild(create("div", "chip", `${sections.length} ${t("区块")}`));
      if (canTaskRiskSort) {
        const riskToggleBtn = create("button", `btn${state.taskRiskSortEnabled ? " primary" : ""}`);
        riskToggleBtn.type = "button";
        riskToggleBtn.textContent = state.taskRiskSortEnabled
          ? l("风险优先: 开", "Risk Sort: On")
          : l("风险优先: 关", "Risk Sort: Off");
        riskToggleBtn.addEventListener("click", () => {
          setTaskRiskSortEnabled(!state.taskRiskSortEnabled);
          renderActivePage().catch(err => showToast("error", err.message || err));
        });
        right.appendChild(riskToggleBtn);

        const topRisk = taskRiskCandidates
          .map(section => ({ section, snapshot: resolveTaskRiskSnapshot(section) }))
          .filter(item => item.snapshot && item.snapshot.runs > 0)
          .sort((a, b) => b.snapshot.score - a.snapshot.score)[0];
        if (topRisk && topRisk.snapshot) {
          const riskPercent = Math.round(topRisk.snapshot.failureRate * 100);
          const riskChip = create("span", "chip");
          riskChip.textContent = l(`最高失败率 ${riskPercent}%`, `Top Failure ${riskPercent}%`);
          right.appendChild(riskChip);
        }
      }
      const collapsibleSections = sections.filter(section => section && section._collapsible && section._collapseKey);
      if (collapsibleSections.length && !hasGlobalQuery) {
        const expandAllBtn = create("button", "btn", "全部展开");
        expandAllBtn.addEventListener("click", () => {
          for (const sec of collapsibleSections) {
            state.sectionCollapse.set(sec._collapseKey, false);
          }
          renderActivePage().catch(err => showToast("error", err.message || err));
        });
        const collapseAllBtn = create("button", "btn", "全部折叠");
        collapseAllBtn.addEventListener("click", () => {
          for (const sec of collapsibleSections) {
            state.sectionCollapse.set(sec._collapseKey, true);
          }
          renderActivePage().catch(err => showToast("error", err.message || err));
        });
        right.appendChild(expandAllBtn);
        right.appendChild(collapseAllBtn);
      }
      if (shouldShowPageSectionFilter(page.id, sections.length)) {
        const filterInput = create("input", "page-filter-input");
        filterInput.placeholder = t("筛选区块（标题/类型）");
        filterInput.value = pageFilterRaw;
        let timer = null;
        filterInput.addEventListener("input", () => {
          state.pageSectionFilter[page.id] = filterInput.value || "";
          if (timer) {
            clearTimeout(timer);
          }
          timer = setTimeout(() => {
            renderActivePage().catch(err => showToast("error", err.message || err));
          }, 100);
        });
        right.appendChild(filterInput);
      }
      compressActionRow(right, { maxPrimary: 3, minWidth: 768, keepInputs: true });
      header.appendChild(right);
      if (!state.standaloneMode) {
        ui.pageHost.appendChild(header);
      }

      if (!sections.length) {
        ui.pageHost.appendChild(create("div", "placeholder", hasGlobalQuery ? "没有匹配的区块" : "此页面无区块"));
        await renderDesktopRail();
        return;
      }

      let dashboardPrimary = null;
      let dashboardSecondary = null;
      if (useDashboardLayout) {
        const dashboardLayout = create("section", "dashboard-layout");
        dashboardPrimary = create("div", "dashboard-col dashboard-col-primary");
        dashboardSecondary = create("div", "dashboard-col dashboard-col-secondary");
        dashboardLayout.appendChild(dashboardPrimary);
        dashboardLayout.appendChild(dashboardSecondary);
        ui.pageHost.appendChild(dashboardLayout);
      }

      for (const section of sections) {
        const renderer = resolveSectionRenderer(section);
        if (useDashboardLayout && dashboardPrimary && dashboardSecondary) {
          const host = isInfoRailSection(section) ? dashboardSecondary : dashboardPrimary;
          await renderer(section, host);
        } else {
          await renderer(section, ui.pageHost);
        }
      }

      if (useDashboardLayout && dashboardSecondary && !dashboardSecondary.childElementCount) {
        dashboardSecondary.appendChild(create("div", "placeholder", "信息区暂无内容"));
      }

      await renderDesktopRail();
      decorateResponsiveTables(ui.pageHost);
      decorateResponsiveTables(ui.desktopRail);
      if (typeof MutationObserver === "function") {
        const observer = new MutationObserver(() => {
          decorateResponsiveTables(ui.pageHost);
          decorateResponsiveTables(ui.desktopRail);
        });
        observer.observe(ui.pageHost, { childList: true, subtree: true });
        if (ui.desktopRail) {
          observer.observe(ui.desktopRail, { childList: true, subtree: true });
        }
        registerCleanup(() => observer.disconnect());
      }
    }

            renderActivePage().catch(err => showToast("error", err.message || err));
          } else if (currentRailVisible && ui.desktopRail && !ui.desktopRail.childElementCount) {
            renderDesktopRail().catch(err => showToast("error", err.message || err));
          }
        }, 120);
      });

      await setLocale(state.locale, { rerender: false, showTip: false });
      await loadSchema(false);

      setInterval(refreshStatus, 5000);
      setInterval(refreshNetwork, 15000);
      ensureLogStream();
    }

    init().catch((error) => {
      showToast("error", error.message || error);
    });
  </script>
</body>
</html>
