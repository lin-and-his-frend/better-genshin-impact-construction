    let authRedirecting = false;

    function redirectToLogin() {
      if (authRedirecting) return;
      authRedirecting = true;
      const current = `${window.location.pathname}${window.location.search}${window.location.hash}`;
      const redirect = current && current.startsWith("/") ? current : "/";
      showToast("warn", "Session expired, redirecting to login...");
      setTimeout(() => {
        window.location.href = `/login?redirect=${encodeURIComponent(redirect)}`;
      }, 120);
    }

    async function requestJson(url, options) {
      const response = await fetch(url, options);
      if (response.status === 401 || response.status === 403) {
        redirectToLogin();
        throw new Error(response.statusText || "Unauthorized");
      }
      const text = await response.text();
      if (!response.ok) {
        throw new Error(text || `${response.status} ${response.statusText}`);
      }
      if (!text.trim()) return {};
      try {
        return JSON.parse(text);
      } catch {
        return { raw: text };
      }
    }

    async function requestText(url, options) {
      const response = await fetch(url, options);
      if (response.status === 401 || response.status === 403) {
        redirectToLogin();
        throw new Error(response.statusText || "Unauthorized");
      }
      const text = await response.text();
      if (!response.ok) {
        throw new Error(text || `${response.status} ${response.statusText}`);
      }
      return text;
    }

    async function postJson(url, payload) {
      return requestJson(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload ?? {})
      });
    }

    function normalizeI18nMap(source) {
      if (!source || typeof source !== "object") {
        return {};
      }
      const map = {};
      for (const [key, value] of Object.entries(source)) {
        if (!key || typeof key !== "string") continue;
        if (value == null) continue;
        const text = String(value);
        if (!text) continue;
        map[key] = text;
      }
      return map;
    }

    async function loadRemoteI18n(locale) {
      const target = normalizeLocale(locale);
      if (target !== "en") {
        return;
      }

      const existing = state.remoteI18n;
      if (existing && existing.locale === target && existing.map && Object.keys(existing.map).length) {
        return;
      }

      try {
        const data = await requestJson(`/api/ui/i18n?lang=${encodeURIComponent(target)}`);
        state.remoteI18n = {
          locale: target,
          loadedCulture: data && data.loadedCulture ? String(data.loadedCulture) : "",
          map: normalizeI18nMap(data && data.map)
        };
      } catch {
        state.remoteI18n = { locale: target, loadedCulture: "", map: {} };
      }
    }

    function registerCleanup(fn) {
      if (typeof fn === "function") state.pageCleanups.push(fn);
    }

    function runPageCleanups() {
      for (const fn of state.pageCleanups) {
        try { fn(); } catch { }
      }
      state.pageCleanups = [];
      state.logRenderer = null;
    }

    function toFriendlyLabel(source) {
      const text = String(source || "").trim();
      if (!text) return "";
      if (state.locale === "zh" && Object.prototype.hasOwnProperty.call(FIELD_KEY_LABEL_ZH, text)) {
        return FIELD_KEY_LABEL_ZH[text];
      }
      return text
        .replace(/([a-z0-9])([A-Z])/g, "$1 $2")
        .replace(/[_-]+/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function toKebabCase(source) {
      const text = String(source || "").trim();
      if (!text) return "";
      return text
        .replace(/([a-z0-9])([A-Z])/g, "$1-$2")
        .replace(/[_\s]+/g, "-")
        .replace(/-+/g, "-")
        .toLowerCase();
    }

    function resolveAutoOptionEndpoint(fieldKey) {
      const kebab = toKebabCase(fieldKey);
      if (!kebab) return null;

      const candidates = new Set();
      candidates.add(`/api/options/${kebab}`);
      if (!kebab.endsWith("s")) {
        candidates.add(`/api/options/${kebab}s`);
      }
      if (kebab.endsWith("-name")) {
        candidates.add(`/api/options/${kebab.slice(0, -5)}-names`);
      }
      if (kebab.endsWith("-type")) {
        candidates.add(`/api/options/${kebab.slice(0, -5)}-types`);
      }
      if (kebab.endsWith("-country")) {
        candidates.add(`/api/options/${kebab.slice(0, -8)}-countries`);
      }

      for (const endpoint of candidates) {
        if (Array.isArray(state.routes.get) && state.routes.get.includes(endpoint)) {
          return endpoint;
        }
      }
      return null;
    }

    function mergeTaskOptionMap(sectionOptionMap, fieldDefs) {
      const merged = {};
      for (const def of fieldDefs) {
        if (!def || !def.key) continue;
        const endpoint = resolveAutoOptionEndpoint(def.key);
        if (endpoint) {
          merged[def.key] = endpoint;
        }
      }
      if (sectionOptionMap && typeof sectionOptionMap === "object") {
        for (const [key, endpoint] of Object.entries(sectionOptionMap)) {
          if (typeof endpoint === "string" && endpoint) {
            merged[key] = endpoint;
          }
        }
      }
      return merged;
    }

    function inferTypeFromValue(key, value) {
      if (typeof value === "boolean") return "bool";
      if (typeof value === "number") return "number";
      if (Array.isArray(value)) return "json";
      if (value && typeof value === "object") return "json";
      if (typeof value === "string") {
        const k = String(key || "").toLowerCase();
        if (k.includes("script") || k.includes("json") || k.includes("code") || value.length > 90 || value.includes("\n")) {
          return "textarea";
        }
        return "text";
      }
      return "text";
    }

    function cloneValue(value) {
      if (value === undefined) return undefined;
      try {
        return JSON.parse(JSON.stringify(value));
      } catch {
        return value;
      }
    }

    function normalizeComparableValue(value) {
      if (value === undefined) return "__undefined__";
      if (value === null) return "__null__";
      if (typeof value === "number") {
        return Number.isFinite(value) ? `n:${value}` : `n:${String(value)}`;
      }
      if (typeof value === "boolean") return value ? "b:1" : "b:0";
      if (typeof value === "string") return `s:${value}`;
      try {
        return `j:${JSON.stringify(value)}`;
      } catch {
        return `x:${String(value)}`;
      }
    }

    function isSameValue(a, b) {
      return normalizeComparableValue(a) === normalizeComparableValue(b);
    }

    function toJsonPretty(value) {
      if (typeof value === "string") return value;
      try {
        return JSON.stringify(value, null, 2);
      } catch {
        return String(value);
      }
    }

    function parseJsonOrThrow(text) {
      const raw = String(text || "").trim();
      if (!raw) return null;
      return JSON.parse(raw);
    }

    function normalizeOptionValue(inputValue, options) {
      const raw = String(inputValue == null ? "" : inputValue).trim();
      if (!raw) return "";
      const list = Array.isArray(options) ? options.map(x => String(x)) : [];
      const matchBy = (candidate) => {
        const text = String(candidate == null ? "" : candidate).trim().toLowerCase();
        if (!text) return "";
        const matched = list.find(option => option.toLowerCase() === text);
        return matched || "";
      };

      const direct = matchBy(raw);
      if (direct) return direct;

      const zhToEn = Object.prototype.hasOwnProperty.call(I18N_ZH_TO_EN, raw)
        ? I18N_ZH_TO_EN[raw]
        : replaceByMap(raw, I18N_TOKEN_ZH_TO_EN);
      const fromZh = matchBy(zhToEn);
      if (fromZh) return fromZh;

      const enToZh = Object.prototype.hasOwnProperty.call(I18N_EN_TO_ZH, raw)
        ? I18N_EN_TO_ZH[raw]
        : replaceByMap(raw, I18N_TOKEN_EN_TO_ZH);
      const fromEn = matchBy(enToZh);
      if (fromEn) return fromEn;

      return raw;
    }

    function paginate(items, page, size) {
      const list = Array.isArray(items) ? items : [];
      const safeSize = Math.max(1, Number(size) || 1);
      const total = Math.max(1, Math.ceil(list.length / safeSize));
      const current = Math.min(total, Math.max(1, Number(page) || 1));
      const start = (current - 1) * safeSize;
      const data = list.slice(start, start + safeSize);
      return { data, current, total, count: list.length, size: safeSize };
    }

    function renderPager(host, pageInfo, onChange) {
      clear(host);
      const wrap = create("div", "pager");
      const prev = create("button", "btn", "上一页");
      prev.disabled = pageInfo.current <= 1;
      prev.addEventListener("click", () => onChange(pageInfo.current - 1));
      const next = create("button", "btn", "下一页");
      next.disabled = pageInfo.current >= pageInfo.total;
      next.addEventListener("click", () => onChange(pageInfo.current + 1));
      const info = create("span", "pager-info", `${pageInfo.current}/${pageInfo.total} · ${pageInfo.count} ${t("项")}`);
      wrap.appendChild(prev);
      wrap.appendChild(next);
      wrap.appendChild(info);
      host.appendChild(wrap);
    }

    function bindSearchInput(input, onChange) {
      let composing = false;
      const emit = () => {
        if (typeof onChange === "function") {
          onChange(String(input.value || ""));
        }
      };
      input.addEventListener("compositionstart", () => {
        composing = true;
      });
      input.addEventListener("compositionend", () => {
        composing = false;
        emit();
      });
      input.addEventListener("input", () => {
        if (composing) return;
        emit();
      });
    }

    function createInlineMoreGroup(moreLabel, lessLabel) {
      const moreText = String(moreLabel || "更多");
      const lessText = String(lessLabel || "收起");
      const toggle = create("button", "btn ghost compact-more-toggle", moreText);
      const wrap = create("div", "inline-more-group");
      let opened = false;
      const applyOpenState = () => {
        wrap.style.display = opened ? "inline-flex" : "none";
        const base = opened ? lessText : moreText;
        toggle.setAttribute("data-i18n-base", base);
        toggle.textContent = t(base);
        toggle.classList.toggle("active", opened);
      };
      toggle.addEventListener("click", () => {
        opened = !opened;
        applyOpenState();
      });
      applyOpenState();
      return { toggle, wrap };
    }

    function compressActionRow(row, options) {
      if (!row) return;
      const opts = options || {};
      const minWidth = Math.max(0, Number(opts.minWidth) || 768);
      if (window.innerWidth < minWidth) return;
      const maxPrimary = Math.max(1, Number(opts.maxPrimary) || 3);
      const keepInputs = opts.keepInputs !== false;
      const nodes = Array.from(row.children || []);
      const movable = nodes.filter(node => {
        if (!keepInputs) return true;
        const tag = String(node.tagName || "").toUpperCase();
        return tag !== "INPUT" && tag !== "SELECT" && tag !== "TEXTAREA";
      });
      if (movable.length <= maxPrimary + 1) return;

      const more = createInlineMoreGroup(
        String(opts.moreLabel || "更多"),
        String(opts.lessLabel || "收起")
      );
      let kept = 0;
      for (const node of movable) {
        if (kept < maxPrimary) {
          kept += 1;
          continue;
        }
        more.wrap.appendChild(node);
      }
      if (!more.wrap.childElementCount) return;
      row.appendChild(more.toggle);
      row.appendChild(more.wrap);
    }

    function updateBrowserPushPermission() {
      const supported = typeof window !== "undefined" && "Notification" in window;
      state.browserPush.supported = supported;
      if (!supported) {
        state.browserPush.permission = "unsupported";
        return state.browserPush.permission;
      }
      state.browserPush.permission = Notification.permission || "default";
      return state.browserPush.permission;
    }

    function sendBrowserNotification(title, body, options) {
      if (!state.browserPush.supported) {
        return false;
      }
      const permission = updateBrowserPushPermission();
      if (permission !== "granted") {
        return false;
      }
      const opts = options && typeof options === "object" ? options : {};
      try {
        const notice = new Notification(String(title || "BetterGI"), {
          body: String(body || ""),
          icon: "/favicon.ico",
          tag: opts.tag ? String(opts.tag) : undefined
        });
        const autoCloseMs = Number(opts.autoCloseMs);
        if (notice && Number.isFinite(autoCloseMs) && autoCloseMs > 0) {
          setTimeout(() => {
            try {
              notice.close();
            } catch {
            }
          }, Math.round(autoCloseMs));
        }
        return true;
      } catch {
        return false;
      }
    }

    function maybePushRuntimeBrowserNotification(statusData) {
      const prefs = state.browserPush && state.browserPush.prefs
        ? normalizeBrowserPushPrefs(state.browserPush.prefs)
        : normalizeBrowserPushPrefs(null);
      state.browserPush.prefs = prefs;
      if (!prefs.enabled) {
        state.browserPush.baselineReady = false;
        return;
      }
      if (!statusData || typeof statusData !== "object") {
        return;
      }

      const warning = String(statusData.warning || "").trim();
      const initialized = !!statusData.isInitialized;
      const suspended = !!statusData.isSuspended;
      if (!state.browserPush.baselineReady) {
        state.browserPush.baselineReady = true;
        state.browserPush.lastWarning = warning;
        state.browserPush.lastInitialized = initialized;
        state.browserPush.lastSuspended = suspended;
        return;
      }

      const permission = updateBrowserPushPermission();
      if (!state.browserPush.supported || permission !== "granted") {
        state.browserPush.lastWarning = warning;
        state.browserPush.lastInitialized = initialized;
        state.browserPush.lastSuspended = suspended;
        return;
      }

      if (prefs.warning && warning && warning !== state.browserPush.lastWarning) {
        sendBrowserNotification(
          l("BetterGI 警告", "BetterGI Warning"),
          warning,
          { tag: "bgi-runtime-warning", autoCloseMs: 12000 }
        );
      }

      if (prefs.runtime &&
          state.browserPush.lastInitialized != null &&
          initialized !== state.browserPush.lastInitialized) {
        sendBrowserNotification(
          l("BetterGI 运行状态", "BetterGI Runtime"),
          initialized ? l("游戏任务已启动", "Game task started") : l("游戏任务已停止", "Game task stopped"),
          { tag: "bgi-runtime-state", autoCloseMs: 9000 }
        );
      }

      if (prefs.runtime &&
          state.browserPush.lastSuspended != null &&
          suspended !== state.browserPush.lastSuspended) {
        sendBrowserNotification(
          l("BetterGI 运行状态", "BetterGI Runtime"),
          suspended ? l("任务已暂停", "Tasks paused") : l("任务已继续", "Tasks resumed"),
          { tag: "bgi-runtime-suspend", autoCloseMs: 9000 }
        );
      }

      state.browserPush.lastWarning = warning;
      state.browserPush.lastInitialized = initialized;
      state.browserPush.lastSuspended = suspended;
    }

    async function refreshStatus() {
      try {
        const data = await requestJson("/api/status");
        state.runtimeStatus = data && typeof data === "object" ? data : null;
        const boolLabel = (value) => value ? t("True") : t("False");
        const thirdPartyEnabled = Object.prototype.hasOwnProperty.call(data, "thirdPartyEnabled")
          ? !!data.thirdPartyEnabled
          : !!data.lanEnabled;
        const thirdPartyActive = Object.prototype.hasOwnProperty.call(data, "thirdPartyActive")
          ? !!data.thirdPartyActive
          : !!data.lanActive;
        const listenPrefix = data.listenPrefix ? String(data.listenPrefix) : "-";
        ui.statusLine.textContent = `${t("版本")} ${data.version} · ${data.serverTime} · ${t("游戏已启动")}: ${boolLabel(data.isInitialized)} · ${t("暂停")}: ${boolLabel(data.isSuspended)} · ${t("屏幕推流")}: ${boolLabel(data.screenStreamEnabled)} · ${t("日志推流")}: ${boolLabel(data.logStreamEnabled)} · ${t("第三方访问(配置)")}: ${boolLabel(thirdPartyEnabled)} · ${t("第三方访问(生效)")}: ${boolLabel(thirdPartyActive)} · ${t("监听")}: ${listenPrefix}`;
        ui.warningLine.textContent = data.warning ? `${t("提示:")} ${data.warning}` : "";
        updateQuickStatusBadges(data);
        maybePushRuntimeBrowserNotification(data);
        return data;
      } catch (error) {
        state.runtimeStatus = null;
        ui.statusLine.textContent = t("状态获取失败");
        ui.warningLine.textContent = String(error.message || error);
        updateQuickStatusBadges(null);
        return null;

      if (!fallback) return "PG";
      const chars = Array.from(fallback.replace(/\s+/g, ""));

        const label = create("span", "nav-label", page.title || page.id);
        btn.setAttribute("aria-label", page.title || page.id || "");
        btn.title = page.title || page.id || "";
        btn.appendChild(icon);
        btn.appendChild(label);
        btn.addEventListener("click", () => selectPage(page.id));
        ui.navList.appendChild(btn);
      }

    async function loadSchema(showTip) {
      try {
        const forceSchema = showTip ? "1" : "0";
        const pageQuery = state.standalonePageId
          ? `&page=${encodeURIComponent(state.standalonePageId)}`
          : "";
        const [schema, routes] = await Promise.all([
          requestJson(`/api/ui/schema?lang=${encodeURIComponent(state.locale)}&force=${forceSchema}${pageQuery}`),
          requestJson("/api/ui/routes").catch(() => ({ get: [], post: [] }))
        ]);
        state.schema = schema;
        state.routes = {
          get: Array.isArray(routes.get) ? routes.get : [],
          post: Array.isArray(routes.post) ? routes.post : []
        };
        if (state.standaloneMode && state.standalonePageId && getPageById(state.standalonePageId)) {
          state.activePageId = state.standalonePageId;
        } else if (!state.activePageId || !getPageById(state.activePageId)) {
          const hashPageId = getPageIdFromHash();
          if (hashPageId && getPageById(hashPageId)) {
            state.activePageId = hashPageId;
          } else {
            const first = getPages()[0];
            state.activePageId = first ? first.id : "route-center";
          }
        }
        if (!state.standaloneMode) {
          const standaloneRoute = resolveStandaloneRouteForPage(state.activePageId);
          if (standaloneRoute) {
            window.location.replace(standaloneRoute);
            return;
          }
        }
        if (!state.standaloneMode) {
          syncHashWithPageId(state.activePageId);
        }
        ui.schemaVersion.textContent = `${t("Schema")}: ${schema.generatedAt ? new Date(schema.generatedAt).toLocaleString() : "-"}`;
        renderNavigation();
        await renderActivePage();
        applyDataI18n(document);
        if (showTip) showToast("ok", "页面结构已刷新");
      } catch (error) {
        showToast("error", `加载 /api/ui/schema 失败: ${error.message || error}`);
      }
    }

    async function selectPage(pageId) {
      if (!state.standaloneMode) {
        const standaloneRoute = resolveStandaloneRouteForPage(pageId);
        if (standaloneRoute) {
          window.location.href = standaloneRoute;
          return;
        }
      }
      if (state.standaloneMode && pageId !== state.standalonePageId) {
        return;
      }
      state.activePageId = pageId;
      pushSpotlightRecent(`page:${pageId}`);
      if (state.mobileSheetOpen) {
        setMobileSheetOpen(false);
      }
      if (!state.standaloneMode) {
        syncHashWithPageId(pageId);
      }
      if (shouldUseCompactTopbar() && state.statusPanelOpen) {
        setStatusPanelOpen(false, { persist: false });
      }
      renderNavigation();
      await renderActivePage();
    }

    function getSchemaActionButtonClass(action) {
      const style = String(action && action.style ? action.style : "").toLowerCase();
      if (style === "primary") return "btn primary";
      if (style === "danger") return "btn danger";
      return "btn";
    }

    function readPathValue(source, path) {
      const parts = String(path || "")
        .split(".")
        .map(x => x.trim())
        .filter(Boolean);
      let current = source;
      for (const part of parts) {
        if (current == null || typeof current !== "object" || !Object.prototype.hasOwnProperty.call(current, part)) {
          return undefined;
        }
        current = current[part];
      }
      return current;
    }

    function applyTemplateValue(value, context) {
      if (typeof value === "string") {
        const single = value.match(/^\{\{\s*([A-Za-z0-9_.]+)\s*\}\}$/);
        if (single) {
          const resolved = readPathValue(context, single[1]);
          return resolved === undefined ? "" : cloneValue(resolved);
        }
        return value.replace(/\{\{\s*([A-Za-z0-9_.]+)\s*\}\}/g, (_, path) => {
          const resolved = readPathValue(context, path);
          return resolved == null ? "" : String(resolved);
        });
      }
      if (Array.isArray(value)) {
        return value.map(item => applyTemplateValue(item, context));
      }
      if (value && typeof value === "object") {
        const next = {};
        for (const [k, v] of Object.entries(value)) {
          next[k] = applyTemplateValue(v, context);
        }
        return next;
      }
      return value;
    }

    function resolveSchemaActionMethod(action, endpoint) {
      const explicit = String(action && action.method ? action.method : "").trim().toUpperCase();
      if (explicit) return explicit;
      const hasGet = Array.isArray(state.routes.get) && state.routes.get.includes(endpoint);
      const hasPost = Array.isArray(state.routes.post) && state.routes.post.includes(endpoint);
      if (hasPost && !hasGet) return "POST";
      return "GET";
    }

    function normalizeRefreshList(refresh) {
      if (!refresh) return [];
      const source = Array.isArray(refresh) ? refresh : String(refresh).split(",");
      return source
        .map(item => String(item || "").trim().toLowerCase())
        .filter(Boolean);
    }

    async function executeSchemaAction(action, context, onSuccess) {
      const ctx = context && typeof context === "object" ? context : {};
      const endpoint = String(applyTemplateValue(action && action.endpoint ? action.endpoint : "", ctx) || "").trim();
      if (!endpoint) {
        throw new Error(l("缺少 endpoint", "Missing endpoint"));
      }

      const confirmText = String(applyTemplateValue(action && action.confirm ? action.confirm : "", ctx) || "").trim();
      if (confirmText && !confirmL(confirmText)) {
        return { cancelled: true };
      }

      const method = resolveSchemaActionMethod(action, endpoint);
      let data;
      let actualEndpoint = endpoint;
      if (method === "POST") {
        let payload = applyTemplateValue(action && Object.prototype.hasOwnProperty.call(action, "payload") ? action.payload : {}, ctx);
        if (action && action.promptJson) {
          const promptMessage = String(
            applyTemplateValue(
              action.promptMessage || l(`POST ${endpoint} 请求体（JSON）`, `POST ${endpoint} request body (JSON)`),
              ctx
            ) || ""
          );
          const input = promptL(promptMessage, toJsonPretty(payload));
          if (input == null) {
            return { cancelled: true };
          }
          payload = String(input || "").trim() ? JSON.parse(input) : {};
        }
        data = await postJson(endpoint, payload);
      } else {
        let url = endpoint;
        if (action && action.promptQuery) {
          const message = typeof action.promptQuery === "string"
            ? String(applyTemplateValue(action.promptQuery, ctx) || "")
            : l(`GET ${endpoint} 可选查询参数（如 name=demo）`, `GET ${endpoint} optional query (e.g. name=demo)`);
          const defaultQuery = String(applyTemplateValue(action.defaultQuery || "", ctx) || "");
          const queryInput = promptL(message, defaultQuery);
          if (queryInput == null) {
            return { cancelled: true };
          }
          const query = String(queryInput || "").trim().replace(/^\?+/, "");
          if (query) {
            url = `${endpoint}${endpoint.includes("?") ? "&" : "?"}${query}`;
          }
        }
        actualEndpoint = url;
        data = await requestJson(url);
      }

      if (typeof onSuccess === "function") {
        await onSuccess({ data, endpoint: actualEndpoint, method, action });
      }

      const refreshes = normalizeRefreshList(action && action.refresh ? action.refresh : "");
      for (const refresh of refreshes) {
        if (refresh === "status") {
          await refreshStatus();
          continue;
        }
        if (refresh === "network") {
          await refreshNetwork();
          continue;
        }
        if (refresh === "schema") {
          await loadSchema(false);
          continue;
        }
        if (refresh === "page") {
          await renderActivePage();
        }
      }

      const successMessage = action && Object.prototype.hasOwnProperty.call(action, "successMessage")
        ? String(applyTemplateValue(action.successMessage, ctx) || "")
        : l(
            `${action && action.label ? action.label : actualEndpoint} 已执行`,
            `${action && action.label ? action.label : actualEndpoint} executed`
          );
      if (successMessage) {
        showToast("ok", successMessage);
      }

      return { cancelled: false, data, endpoint: actualEndpoint, method };
    }

    function appendSectionToolActions(tools, section, getContext, onSuccess) {
      const actions = Array.isArray(section && section.toolActions) ? section.toolActions : [];
      for (const action of actions) {
        const btn = create("button", getSchemaActionButtonClass(action), action.label || action.endpoint || "动作");
        btn.addEventListener("click", async () => {

    function resolveSectionRole(section) {
      const type = String(section && section.type ? section.type : "").toLowerCase();
      if (type === "screen" || type === "logs" || type === "library" || type === "ai_chat" || type === "route_explorer" || type === "fastapi_docs") {
        return "info";
      }
      if (type === "settings" || type === "config_group" || type === "one_dragon" || type === "browser_notify") {
        return "settings";
      }
      return "control";
    }

    function resolveSectionStatus(section) {
      const runtime = state.runtimeStatus && typeof state.runtimeStatus === "object" ? state.runtimeStatus : {};
      const hasRuntime = Object.keys(runtime).length > 0;
      const type = String(section && section.type ? section.type : "").toLowerCase();
      if (!hasRuntime) {
        return "standby";
      }
      if (type === "screen") {
        return runtime.screenStreamEnabled ? "running" : "standby";
      }
      if (type === "logs") {
        return runtime.logStreamEnabled ? "running" : "standby";
      }
      if (runtime.warning && (type === "actions" || type === "task" || type === "scheduler" || type === "one_dragon")) {
        return "alert";
      }
      if (type === "actions" || type === "task" || type === "scheduler" || type === "library") {
        return runtime.isInitialized ? "running" : "stopped";
      }
      return runtime.warning ? "alert" : "standby";
    }

    function resolveSectionIconKey(section) {
      const type = String(section && section.type ? section.type : "").toLowerCase();
      const title = String(section && (section.title || section.id) ? (section.title || section.id) : "").toLowerCase();
      if (title.includes("战斗")) return "sword";
      if (title.includes("钓鱼")) return "fish";
      if (title.includes("拾取") || title.includes("采集")) return "hand";
      if (title.includes("剧情") || title.includes("对话")) return "dialog";
      if (type === "screen" || title.includes("画面")) return "screen";
      if (type === "logs" || title.includes("日志")) return "logs";
      if (type === "settings" || type === "config_group" || title.includes("配置")) return "sliders";
      if (type === "browser_notify" || title.includes("通知")) return "dialog";
      if (type === "one_dragon" || title.includes("调度") || title.includes("战斗") || title.includes("钓鱼")) return "bolt";
      if (type === "library" || title.includes("脚本")) return "folder";
      if (type === "ai_chat" || title.includes("ai")) return "spark";
      if (type === "route_explorer" || type === "fastapi_docs" || title.includes("接口")) return "route";
      if (type === "actions" || type === "task") return "play";
      return "grid";
    }

    function isInfoRailSection(section) {

    function resolveDesktopRailSections() {
      if (state.standaloneMode) {
        return [
          {
            id: "standalone-screen",
            type: "screen",
            title: l("实时画面", "Live Screen"),
            endpoint: "/api/screen"
          },
          {
            id: "standalone-logs",
            type: "logs",
            title: l("遮罩日志", "Overlay Logs"),
            endpoint: "/api/logs/stream"
          }
        ];
      }
      const pages = getPages();
      if (!Array.isArray(pages) || !pages.length) {
        return [];
      }
      const preferred = [];
      const dashboard = pages.find(page => String(page && page.id ? page.id : "").toLowerCase() === "dashboard");
      if (dashboard) {
        preferred.push(dashboard);
      }
      for (const page of pages) {
        if (page !== dashboard) {
          preferred.push(page);
        }
      }
      const pickFirstByType = (targetType) => {
        const type = String(targetType || "").toLowerCase();
        for (const page of preferred) {
          const sections = Array.isArray(page && page.sections) ? page.sections : [];
          const found = sections.find(section => String(section && section.type ? section.type : "").toLowerCase() === type);
          if (found) {
            return found;
          }
        }
        return null;
      };
      const screenSection = pickFirstByType("screen");
      const logSection = pickFirstByType("logs");
      return [screenSection, logSection].filter(Boolean);
    }

    async function renderDesktopRail() {
      if (!ui.desktopRail) {
        return;
      }
      clear(ui.desktopRail);
      if (!shouldShowDesktopRail()) {
        return;
      }
      const sections = resolveDesktopRailSections();
      if (!sections.length) {
        ui.desktopRail.appendChild(create("div", "placeholder", "信息区暂无内容"));
        return;
      }
      for (const rawSection of sections) {
        const section = Object.assign({}, rawSection, {
          _collapsible: false,
          _defaultCollapsed: false,
          _forceExpanded: true
        });
        const renderer = resolveSectionRenderer(section);
        await renderer(section, ui.desktopRail);
      }
    }

    function createSectionCard(section, options) {
      const opts = options || {};
      const card = create("section", "section-card");
      const sectionType = String(section && section.type ? section.type : "").toLowerCase().replace(/[^a-z0-9]+/g, "-");
      if (sectionType) {
        card.classList.add(`type-${sectionType}`);
      }
      card.classList.add(`role-${resolveSectionRole(section)}`);
      card.classList.add(`status-${resolveSectionStatus(section)}`);
      const head = create("div", "section-head");
      const titleWrap = create("div", "section-title");
      const collapseIcon = create("span", "section-collapse-icon");
      const statusDot = create("span", "section-status-dot");
      const iconNode = createSectionIconNode(section);
      const title = create("h3", "", section.title || section.id || "未命名区块");
      const tools = create("div", "btn-row");
      titleWrap.appendChild(collapseIcon);
      titleWrap.appendChild(statusDot);
      titleWrap.appendChild(iconNode);
      titleWrap.appendChild(title);
      head.appendChild(titleWrap);
      head.appendChild(tools);
      const body = create("div", "section-body");
      card.appendChild(head);
      card.appendChild(body);

      const metadataCollapsible = section && Object.prototype.hasOwnProperty.call(section, "_collapsible")
        ? !!section._collapsible
        : false;
      const collapsible = Object.prototype.hasOwnProperty.call(opts, "collapsible")
        ? !!opts.collapsible
        : metadataCollapsible;
      const collapseKey = opts.collapseKey || (section && section._collapseKey) || buildSectionCollapseKey(state.activePageId, section);
      if (collapseKey) {
        card.setAttribute("data-section-key", collapseKey);
      }
      if (state.activePageId) {
        card.setAttribute("data-page-id", String(state.activePageId));
      }
      if (section && section.id) {
        card.setAttribute("data-section-id", String(section.id));
      }
      let collapsed = Object.prototype.hasOwnProperty.call(opts, "defaultCollapsed")
        ? !!opts.defaultCollapsed
        : !!(section && section._defaultCollapsed);
      const forceExpanded = Object.prototype.hasOwnProperty.call(opts, "forceExpanded")
        ? !!opts.forceExpanded
        : !!(section && section._forceExpanded);
      if (forceExpanded) {
        collapsed = false;
      } else if (collapseKey && state.sectionCollapse.has(collapseKey)) {
        collapsed = !!state.sectionCollapse.get(collapseKey);
      }

      const applyCollapseState = () => {
        if (!collapsible) {
          body.style.display = "grid";
          tools.style.display = "flex";
          collapseIcon.textContent = "";
          collapseIcon.style.visibility = "hidden";
          return;
        }

        card.classList.toggle("is-collapsed", collapsed);
        body.style.display = collapsed ? "none" : "grid";
        tools.style.display = collapsed ? "none" : "flex";
        collapseIcon.textContent = collapsed ? "▶" : "▼";
        collapseIcon.style.visibility = "visible";
        head.setAttribute("aria-expanded", collapsed ? "false" : "true");
        if (collapseKey) {
          state.sectionCollapse.set(collapseKey, collapsed);
        }
      };

      if (collapsible) {
        head.classList.add("collapsible");
        head.setAttribute("role", "button");
        head.tabIndex = 0;
        const toggleCollapse = (event) => {
          const target = event && event.target;
          if (target && typeof target.closest === "function") {
            const interactive = target.closest("button,input,select,textarea,a,label,[data-no-collapse-toggle='1']");
            if (interactive) {
              return;
            }
          }
          collapsed = !collapsed;
          applyCollapseState();
        };
        head.addEventListener("click", toggleCollapse);
        head.addEventListener("keydown", (event) => {
          if (event.key !== "Enter" && event.key !== " ") return;
          event.preventDefault();
          toggleCollapse(event);
        });
        applyCollapseState();
      } else {
        applyCollapseState();
      }

      appendSectionToolActions(tools, section, () => ({
        activePageId: state.activePageId,
        sectionId: section.id || "",
        sectionTitle: section.title || "",
        schedulerSelectedGroup: state.scheduler.selectedGroup || ""
      }));
      if (state.globalQuery) {
        applyHighlightedText(title, title.textContent || "", state.globalQuery);
      }
      return { card, head, tools, body };
    }
    function createFieldControl(def, initialValue, optionItems) {

      label.setAttribute("data-i18n-base", baseLabel);

      const type = def.type || "text";

        input = create("input");

        input.checked = !!initialValue;
        const toggleWrap = create("label", "toggle");
        toggleWrap.appendChild(input);
        toggleWrap.appendChild(create("span", "", "启用"));
        field.appendChild(toggleWrap);
      } else if (type === "select" || type === "enum") {
        input = create("select");
        const values = Array.isArray(optionItems) ? optionItems : (Array.isArray(def.options) ? def.options : []);
        const emptyOpt = create("option");
        emptyOpt.value = "";
        emptyOpt.setAttribute("data-i18n-base", "(空)");
        emptyOpt.textContent = t("(空)");
        input.appendChild(emptyOpt);
        for (const item of values) {

          opt.setAttribute("data-i18n-base", baseOption);
          opt.textContent = t(baseOption);
          input.appendChild(opt);
        }
        input.value = initialValue == null ? "" : String(initialValue);
        field.appendChild(input);
      } else if (type === "number") {
        input = create("input");
        input.type = "number";
        input.value = initialValue == null ? "" : String(initialValue);
        field.appendChild(input);
      } else if (type === "json") {
        input = create("textarea", "mono");
        input.value = initialValue == null ? "" : toJsonPretty(initialValue);
        field.appendChild(input);
      } else if (type === "textarea") {
        input = create("textarea");
        input.value = initialValue == null ? "" : String(initialValue);
        field.appendChild(input);
      } else {
        input = create("input");
        input.type = "text";
        input.value = initialValue == null ? "" : String(initialValue);
        field.appendChild(input);
      }

      if (def.path) {
        field.appendChild(create("div", "field-path", def.path));
      }

      return {
        field,
        input,
        getValue() {
          if (type === "bool") {
            return !!input.checked;
          }
          if (type === "number") {
            const value = Number(input.value);
            return Number.isFinite(value) ? value : 0;
          }
          if (type === "json") {
            return parseJsonOrThrow(input.value);
          }
          if (def.key === "codes") {
            return String(input.value || "")
              .split(/\r?\n/)
              .map(x => x.trim())
              .filter(Boolean);
          }
          return input.value;
        },
        setValue(value) {
          if (type === "bool") {
            input.checked = !!value;
            return;
          }
          if (type === "json") {
            input.value = value == null ? "" : toJsonPretty(value);
            return;
          }
          input.value = value == null ? "" : String(value);
        }
      };
    }

      const form = create("div", "form-grid");

              control.setValue(latest[key]);

    async function loadOptionsMap(optionMap) {
      const result = {};
      if (!optionMap || typeof optionMap !== "object") return result;
      const entries = Object.entries(optionMap);
      await Promise.all(entries.map(async ([key, endpoint]) => {
        try {
          const data = await requestJson(endpoint);
          result[key] = Array.isArray(data) ? data : [];
        } catch {
          result[key] = [];
        }
      }));
      return result;
    }

    function buildTaskFieldDefs(section, model) {
      const defs = [];
      const obj = model && typeof model === "object" && !Array.isArray(model) ? model : {};
      for (const key of Object.keys(obj)) {
        defs.push({ key, label: toFriendlyLabel(key), type: inferTypeFromValue(key, obj[key]), value: cloneValue(obj[key]) });
      }

      const custom = Array.isArray(section.customPayload) ? section.customPayload : [];
      for (const c of custom) {
        if (!c || !c.key) continue;
        const existing = defs.find(d => d.key === c.key);
        if (existing) continue;
        defs.push({
          key: c.key,
          label: c.label || toFriendlyLabel(c.key),
          type: c.type === "textarea" ? "textarea" : c.type === "number" ? "number" : c.type === "bool" ? "bool" : "text",
          value: ""
        });
      }

      return defs;
    }

    async function renderTaskSection(section, host) {
      const { card, body, tools } = createSectionCard(section);
      const form = create("div", "form-grid");
      const controls = new Map();
      const sectionHead = card.querySelector(".section-head");
      const collapsedSummary = create("div", "section-collapsed-summary");
      const summaryStatus = create("span", "section-summary-chip neutral");
      const summaryRate = create("span", "section-summary-chip neutral");
      const summaryRuns = create("span", "section-summary-chip neutral");
      const summaryRunBtn = create("button", "section-summary-run", "快速执行");
      const summaryToggleBtn = create("button", "section-summary-run", "快速开关");
      summaryRunBtn.type = "button";
      summaryToggleBtn.type = "button";
      // 不再在折叠状态下显示摘要芯片
      // collapsedSummary.appendChild(summaryStatus);
      // collapsedSummary.appendChild(summaryRate);
      // collapsedSummary.appendChild(summaryRuns);
      if (section.runTask) {
        collapsedSummary.appendChild(summaryRunBtn);
      }
      if (sectionHead && tools && sectionHead.contains(tools)) {
        sectionHead.insertBefore(collapsedSummary, tools);
      }

      let model = {};
      if (section.getEndpoint) {
        try {
          model = await requestJson(section.getEndpoint);
        } catch (error) {
          body.appendChild(create("div", "placeholder", `读取任务设置失败: ${error.message || error}`));
          host.appendChild(card);
          return;
        }
      }

      const fieldDefs = buildTaskFieldDefs(section, model);
      const mergedOptionMap = mergeTaskOptionMap(section.optionMap || {}, fieldDefs);
      const optionMap = await loadOptionsMap(mergedOptionMap);
      const metricKey = resolveTaskMetricKey(section);
      const metricBar = create("div", "task-metrics");
      const runsMetric = create("span", "task-metric");
      const successMetric = create("span", "task-metric");
      const failMetric = create("span", "task-metric");
      const rateMetric = create("span", "task-metric");
      const lastMetric = create("span", "task-metric");
      const paramsMetric = create("span", "task-metric");
      const resultMetric = create("span", "task-metric");

      const renderTaskMetrics = () => {
        const metric = readTaskMetric(metricKey);
        const successRate = metric.runs > 0
          ? Math.round((metric.success * 100) / metric.runs)
          : 0;
        runsMetric.textContent = `${t("累计执行")}: ${metric.runs}`;
        successMetric.textContent = `${t("成功次数")}: ${metric.success}`;
        failMetric.textContent = `${t("失败次数")}: ${metric.failure}`;
        rateMetric.textContent = `${t("成功率")}: ${metric.runs > 0 ? `${successRate}%` : "-"}`;
        resultMetric.textContent = `${t("上次结果")}: ${formatTaskResultStatus(metric.lastStatus)}`;
        lastMetric.textContent = `${t("最近执行")}: ${formatMetricTime(metric.lastRun)}`;
        paramsMetric.textContent = `${t("参数")}: ${fieldDefs.length}`;

        successMetric.className = `task-metric${metric.success > 0 ? " metric-ok" : ""}`;
        failMetric.className = `task-metric${metric.failure > 0 ? " metric-bad" : ""}`;
        if (metric.lastStatus === "success") {
          resultMetric.className = "task-metric metric-ok";
        } else if (metric.lastStatus === "failure") {
          resultMetric.className = "task-metric metric-bad";
        } else {
          resultMetric.className = "task-metric metric-neutral";
        }
        if (!metric.runs) {
          rateMetric.className = "task-metric metric-neutral";
        } else if (successRate >= 85) {
          rateMetric.className = "task-metric metric-ok";
        } else if (successRate < 60) {
          rateMetric.className = "task-metric metric-bad";
        } else {
          rateMetric.className = "task-metric metric-neutral";
        }

        summaryStatus.textContent = `${t("上次结果")}: ${formatTaskResultStatus(metric.lastStatus)}`;
        summaryRate.textContent = `${t("成功率")}: ${metric.runs > 0 ? `${successRate}%` : "-"}`;
        summaryRuns.textContent = `${t("累计执行")}: ${metric.runs}`;
        if (metric.lastStatus === "success") {
          summaryStatus.className = "section-summary-chip ok";
        } else if (metric.lastStatus === "failure") {
          summaryStatus.className = "section-summary-chip bad";
        } else {
          summaryStatus.className = "section-summary-chip neutral";
        }
        if (!metric.runs) {
          summaryRate.className = "section-summary-chip neutral";
        } else if (successRate >= 85) {
          summaryRate.className = "section-summary-chip ok";
        } else if (successRate < 60) {
          summaryRate.className = "section-summary-chip bad";
        } else {
          summaryRate.className = "section-summary-chip neutral";
        }
        summaryRuns.className = "section-summary-chip neutral";
      };
      renderTaskMetrics();
      metricBar.appendChild(runsMetric);
      metricBar.appendChild(successMetric);
      metricBar.appendChild(failMetric);
      metricBar.appendChild(rateMetric);
      metricBar.appendChild(resultMetric);
      metricBar.appendChild(lastMetric);
      metricBar.appendChild(paramsMetric);

      for (const def of fieldDefs) {
        const options = optionMap[def.key];
        const inferredType = Array.isArray(options) && options.length && def.type !== "json" ? "select" : def.type;
        const control = createFieldControl({ key: def.key, label: def.label, type: inferredType, options }, def.value, options);
        controls.set(def.key, control);
        form.appendChild(control.field);
      }

      const collectControlValues = () => {
        const payload = {};
        for (const [key, control] of controls.entries()) {
          payload[key] = control.getValue();
        }
        return payload;
      };

      const applyResponseToControls = (data) => {
        if (!data || typeof data !== "object") {
          return;
        }
        for (const [key, control] of controls.entries()) {
          if (Object.prototype.hasOwnProperty.call(data, key)) {
            control.setValue(data[key]);
          }
        }
      };

      const boolCandidates = fieldDefs.filter(def => String(def && def.type ? def.type : "").toLowerCase() === "bool");
      const pickQuickToggleDef = () => {
        if (!boolCandidates.length) {
          return null;
        }
        const scored = boolCandidates
          .map(def => {
            const keyText = `${def.key || ""} ${def.label || ""}`.toLowerCase();
            let score = 0;
            if (/enable|enabled|active|switch|toggle|on|off|start|stop/.test(keyText)) score += 120;
            if (/is/.test(String(def.key || "").toLowerCase())) score += 25;
            if (/auto|run|task/.test(keyText)) score += 8;
            return { def, score };
          })
          .sort((a, b) => b.score - a.score);
        return scored[0] ? scored[0].def : null;
      };
      const quickToggleDef = pickQuickToggleDef();
      const quickToggleControl = quickToggleDef ? controls.get(quickToggleDef.key) : null;
      const hasQuickToggle = !!(section.postEndpoint && quickToggleDef && quickToggleControl);
      // 不再将快速开关添加到折叠摘要中
      // if (hasQuickToggle) {
      //   collapsedSummary.appendChild(summaryToggleBtn);
      // }

      const updateSummaryToggleButton = () => {
        if (!hasQuickToggle) {
          return;
        }
        const enabled = !!quickToggleControl.getValue();
        summaryToggleBtn.textContent = `${l("快速开关", "Quick Toggle")} · ${t(enabled ? "Enabled" : "Disabled")}`;
        summaryToggleBtn.classList.remove("is-on", "is-off", "is-pending");
        summaryToggleBtn.classList.add(enabled ? "is-on" : "is-off");
      };
      let toggleConfirmPending = false;
      let toggleConfirmTimer = null;
      const clearToggleConfirm = () => {
        toggleConfirmPending = false;
        if (toggleConfirmTimer) {
          clearTimeout(toggleConfirmTimer);
          toggleConfirmTimer = null;
        }
        updateSummaryToggleButton();
      };
      const beginToggleConfirm = () => {
        toggleConfirmPending = true;
        if (toggleConfirmTimer) {
          clearTimeout(toggleConfirmTimer);
        }
        summaryToggleBtn.textContent = l("再次点击确认", "Tap again to confirm");
        summaryToggleBtn.classList.remove("is-on", "is-off");
        summaryToggleBtn.classList.add("is-pending");
        toggleConfirmTimer = setTimeout(() => {
          toggleConfirmPending = false;
          toggleConfirmTimer = null;
          updateSummaryToggleButton();
        }, 1500);
      };
      updateSummaryToggleButton();
      if (hasQuickToggle && quickToggleControl && quickToggleControl.input) {
        quickToggleControl.input.addEventListener("change", clearToggleConfirm);
        quickToggleControl.input.addEventListener("input", clearToggleConfirm);
      }

      const saveBtn = create("button", "btn", "保存设置");
      saveBtn.disabled = !section.postEndpoint;
      saveBtn.addEventListener("click", () => {
        runWithButtonBusy(saveBtn, "保存中...", async () => {
          try {
            const payload = collectControlValues();
            const data = await postJson(section.postEndpoint, payload);
            applyResponseToControls(data);
            updateSummaryToggleButton();
            showToast("ok", `${section.title} 设置已保存`);
          } catch (error) {
            showToast("error", `保存失败: ${error.message || error}`);
          }
        }).catch(err => showToast("error", err.message || err));
      });

      const runTaskAction = async () => {
        try {
          const params = collectControlValues();
          const result = await postJson("/api/tasks/run", { task: section.runTask, params });
          if (result && result.ok === false) {
            bumpTaskMetric(metricKey, false);
            renderTaskMetrics();
            showToast("warn", result.error || "任务启动失败");
          } else {
            bumpTaskMetric(metricKey, true);
            renderTaskMetrics();
            showToast("ok", `${section.title} 已下发`);
          }
        } catch (error) {
          bumpTaskMetric(metricKey, false);
          renderTaskMetrics();
          showToast("error", `执行失败: ${error.message || error}`);
        }
      };

      const bindTaskRunButton = (button) => {
        if (!button) {
          return;
        }
        button.disabled = !section.runTask;
        if (!section.runTask) {
          return;
        }
        button.addEventListener("click", () => {
          runWithButtonBusy(button, "执行中...", runTaskAction).catch(err => showToast("error", err.message || err));
        });
      };

      const runBtn = create("button", "btn primary", "执行任务");
      bindTaskRunButton(runBtn);
      bindTaskRunButton(summaryRunBtn);
      if (hasQuickToggle) {
        summaryToggleBtn.addEventListener("click", () => {
          if (!toggleConfirmPending) {
            beginToggleConfirm();
            return;
          }
          clearToggleConfirm();
          runWithButtonBusy(summaryToggleBtn, "执行中...", async () => {
            const previous = !!quickToggleControl.getValue();
            try {
              quickToggleControl.setValue(!previous);
              const payload = collectControlValues();
              const data = await postJson(section.postEndpoint, payload);
              applyResponseToControls(data);
              updateSummaryToggleButton();
              showToast("ok", `${section.title} ${l("开关已更新", "Toggle updated")}`);
            } catch (error) {
              quickToggleControl.setValue(previous);
              updateSummaryToggleButton();
              showToast("error", `${l("开关更新失败", "Toggle update failed")}: ${error.message || error}`);
            }
          }).catch(err => showToast("error", err.message || err));
        });
      }

      const reloadBtn = create("button", "btn", "重载");
      reloadBtn.disabled = !section.getEndpoint;
      reloadBtn.addEventListener("click", () => {
        runWithButtonBusy(reloadBtn, "加载中...", async () => {
          try {
            const latest = section.getEndpoint ? await requestJson(section.getEndpoint) : {};
            applyResponseToControls(latest);
            updateSummaryToggleButton();
            showToast("ok", "已重载任务设置");
          } catch (error) {
            showToast("error", error.message || error);
          }
        }).catch(err => showToast("error", err.message || err));
      });

      tools.appendChild(reloadBtn);
      tools.appendChild(saveBtn);
      tools.appendChild(runBtn);

      if (Array.isArray(section.extraActions)) {
        for (const extra of section.extraActions) {
          const btn = create("button", "btn", extra.label || "额外动作");
          btn.addEventListener("click", () => {
            runWithButtonBusy(btn, "执行中...", async () => {
              try {
                if ((extra.method || "POST").toUpperCase() === "POST") {
                  await postJson(extra.endpoint, extra.payload || {});
                } else {
                  await requestJson(extra.endpoint);
                }
                showToast("ok", `${extra.label || extra.endpoint} 已执行`);
              } catch (error) {
                showToast("error", error.message || error);
              }
            }).catch(err => showToast("error", err.message || err));
          });
          tools.appendChild(btn);
        }
      }

      body.appendChild(metricBar);
      if (fieldDefs.length === 0) {
        body.appendChild(create("div", "placeholder", "当前任务没有可编辑参数"));
      } else {
        // 将快速开关按钮添加到 form 开头
        if (hasQuickToggle) {
          const toggleRow = create("div", "form-row");
          toggleRow.style.gridColumn = "1 / -1";
          toggleRow.style.marginBottom = "8px";
          summaryToggleBtn.style.width = "100%";
          toggleRow.appendChild(summaryToggleBtn);
          form.insertBefore(toggleRow, form.firstChild);
        }
        body.appendChild(form);
      }

      host.appendChild(card);
    }

    async function ensureLogSnapshot() {
      if (state.logsLoaded) return;
      try {
        const data = await requestJson("/api/logs");
        state.logs = Array.isArray(data) ? data.slice(-2000) : [];
        state.logsLoaded = true;
      } catch {
        state.logsLoaded = true;
      } finally {
        if (state.globalLogDock.open) {
          renderGlobalLogDock();
        }
      }
    }

    function appendLogLine(line) {
      state.logs.push(line || {});
      if (state.logs.length > 2000) {
        state.logs.splice(0, state.logs.length - 2000);
      }
      if (state.globalLogDock.open) {
        renderGlobalLogDock();
      }
      if (typeof state.logRenderer === "function") {
        state.logRenderer();
      }
    }

    function ensureLogStream() {
      if (state.logStream) return;
      try {
        const es = new EventSource("/api/logs/stream");
        es.addEventListener("log", (event) => {
          try {
            const data = JSON.parse(event.data);
            appendLogLine(data);
          } catch { }
        });
        es.onerror = () => { };
        state.logStream = es;
      } catch { }
    }

    async function renderLogsSection(section, host) {
      const { card, body, tools } = createSectionCard(section);
      await ensureLogSnapshot();
      ensureLogStream();

      const sizeSelect = create("select");
      for (const n of [40, 80, 120, 200]) {
        const opt = create("option");
        opt.value = String(n);
        opt.textContent = `${n} / ${t("页")}`;
        if (n === 80) opt.selected = true;
        sizeSelect.appendChild(opt);
      }

      const autoTailInput = create("input");
      autoTailInput.type = "checkbox";
      autoTailInput.checked = true;
      const autoTailLabel = create("label", "toggle");
      autoTailLabel.appendChild(autoTailInput);
      autoTailLabel.appendChild(create("span", "", "自动跳到最新"));

      const refreshBtn = create("button", "btn", "刷新快照");
      const clearBtn = create("button", "btn", "清空视图");
      const dockBtn = create("button", "btn", "停靠底栏");
      const fullscreenBtn = create("button", "btn", "放大日志");
      const pagerWrap = create("div");
      const dockResize = create("div", "log-dock-resizer");
      dockResize.setAttribute("title", t("拖动调整高度"));
      const logBox = create("div", "log-box");

      let page = 1;
      let pageSize = 80;
      let autoTail = true;
      let isFullscreen = false;
      let isDocked = false;
      let dockHeight = Math.max(220, Number(state.logDockHeight) || 320);
      let resizingDock = false;
      let resizeStartY = 0;
      let resizeStartHeight = dockHeight;

      function render() {
        const pageInfo = paginate(state.logs, page, pageSize);
        page = pageInfo.current;
        const lines = pageInfo.data.map(line => {
          const ts = line && line.timestamp ? new Date(line.timestamp).toLocaleTimeString() : "--:--:--";
          const lv = line && line.level ? String(line.level) : "INFO";
          const msg = line && line.message ? String(line.message) : "";
          return `[${ts}] [${lv}] ${msg}`;
        });
        logBox.textContent = lines.join("\n");
        renderPager(pagerWrap, pageInfo, (nextPage) => {
          page = nextPage;
          render();
        });
        if (autoTail) {
          logBox.scrollTop = logBox.scrollHeight;
        }
      }

      const clampDockHeight = (value) => {
        const maxHeight = Math.max(260, Math.floor(window.innerHeight * 0.82));
        return Math.max(220, Math.min(maxHeight, Math.round(Number(value) || 320)));
      };

      const persistDockHeight = () => {
        try {
          localStorage.setItem(LOG_DOCK_HEIGHT_KEY, String(dockHeight));
        } catch {
        }
      };

      const applyDockHeight = (height, options) => {
        const opts = options || {};
        dockHeight = clampDockHeight(height);
        state.logDockHeight = dockHeight;
        card.style.setProperty("--log-dock-height", `${dockHeight}px`);
        if (opts.persist !== false) {
          persistDockHeight();
        }
      };

      const setDocked = (open) => {
        isDocked = !!open;
        if (isDocked && isFullscreen) {
          setFullscreen(false);
        }
        if (isDocked && state.globalLogDock.open) {
          setGlobalLogDockOpen(false);
        }
        if (isDocked) {
          applyDockHeight(dockHeight, { persist: false });
        }
        card.classList.toggle("logs-docked", isDocked);
        document.body.classList.toggle("logs-docked", isDocked);
        dockBtn.setAttribute("data-i18n-base", isDocked ? "取消底栏" : "停靠底栏");
        dockBtn.textContent = t(isDocked ? "取消底栏" : "停靠底栏");
        if (!isDocked && !isFullscreen) {
          logBox.style.resize = "vertical";
        }
        if (isDocked || isFullscreen) {
          logBox.style.resize = "none";
        }
      };

      const setFullscreen = (open) => {
        isFullscreen = !!open;
        if (isFullscreen && isDocked) {
          setDocked(false);
        }
        card.classList.toggle("logs-fullscreen", isFullscreen);
        document.body.classList.toggle("logs-fullscreen", isFullscreen);
        fullscreenBtn.setAttribute("data-i18n-base", isFullscreen ? "退出全屏" : "放大日志");
        fullscreenBtn.textContent = t(isFullscreen ? "退出全屏" : "放大日志");
        if (isFullscreen) {
          logBox.style.resize = "none";
        } else {
          logBox.style.resize = "vertical";
        }
      };

      const renderer = () => {
        if (autoTail) {
          const total = Math.max(1, Math.ceil(state.logs.length / pageSize));
          page = total;
        }
        render();
      };
      state.logRenderer = renderer;

      applyDockHeight(dockHeight, { persist: false });

      refreshBtn.addEventListener("click", () => {
        runWithButtonBusy(refreshBtn, "加载中...", async () => {
          try {
            state.logsLoaded = false;
            await ensureLogSnapshot();
            const total = Math.max(1, Math.ceil(state.logs.length / pageSize));
            page = total;
            render();
            showToast("ok", "日志快照已刷新");
          } catch (error) {
            showToast("error", error.message || error);
          }
        }).catch(err => showToast("error", err.message || err));
      });

      clearBtn.addEventListener("click", () => {
        state.logs = [];
        page = 1;
        render();
      });

      dockBtn.addEventListener("click", () => {
        setDocked(!isDocked);
      });

      fullscreenBtn.addEventListener("click", () => {
        setFullscreen(!isFullscreen);
      });

      const onDockResizeStart = (event) => {
        if (!isDocked) {
          return;
        }
        event.preventDefault();
        resizingDock = true;
        resizeStartY = event.clientY;
        resizeStartHeight = dockHeight;
        document.body.classList.add("log-dock-resizing");
      };

      const onDockResizeMove = (event) => {
        if (!resizingDock) {
          return;
        }
        const delta = resizeStartY - event.clientY;
        applyDockHeight(resizeStartHeight + delta, { persist: false });
      };

      const onDockResizeEnd = () => {
        if (!resizingDock) {
          return;
        }
        resizingDock = false;
        document.body.classList.remove("log-dock-resizing");
        persistDockHeight();
      };

      dockResize.addEventListener("pointerdown", onDockResizeStart);
      window.addEventListener("pointermove", onDockResizeMove);
      window.addEventListener("pointerup", onDockResizeEnd);
      window.addEventListener("pointercancel", onDockResizeEnd);

      const onKeydown = (event) => {
        if (event.key === "Escape" && isFullscreen) {
          setFullscreen(false);
        }
      };
      window.addEventListener("keydown", onKeydown);

      sizeSelect.addEventListener("change", () => {
        pageSize = Number(sizeSelect.value) || 80;
        page = 1;
        render();
      });

      autoTailInput.addEventListener("change", () => {
        autoTail = !!autoTailInput.checked;
        render();
      });

      tools.appendChild(refreshBtn);
      tools.appendChild(clearBtn);
      tools.appendChild(dockBtn);
      tools.appendChild(fullscreenBtn);
      tools.appendChild(sizeSelect);
      tools.appendChild(autoTailLabel);
      body.appendChild(pagerWrap);
      body.appendChild(dockResize);
      body.appendChild(logBox);
      host.appendChild(card);

      render();

      registerCleanup(() => {
        if (state.logRenderer && state.logRenderer === renderer) {
          state.logRenderer = null;
        }
        setDocked(false);
        setFullscreen(false);
        window.removeEventListener("keydown", onKeydown);
        dockResize.removeEventListener("pointerdown", onDockResizeStart);
        window.removeEventListener("pointermove", onDockResizeMove);
        window.removeEventListener("pointerup", onDockResizeEnd);
        window.removeEventListener("pointercancel", onDockResizeEnd);
        document.body.classList.remove("log-dock-resizing");
      });
    }

    async function renderScreenSection(section, host) {
      const { card, body, tools } = createSectionCard(section);
      const box = create("div", "screen-box");
      const img = create("img");
      img.alt = "screen";
      box.appendChild(img);
      const periodInput = create("input");
      periodInput.type = "number";
      periodInput.min = "500";
      periodInput.step = "100";
      periodInput.value = "1500";
      periodInput.style.width = "100px";

      const refreshBtn = create("button", "btn", "立即刷新");
      const applyBtn = create("button", "btn", "应用间隔(ms)");
      const hint = create("div", "muted", "未开启屏幕传输时会显示占位图。");

      let timer = null;
      const endpoint = section.endpoint || "/api/screen";

      const refreshOnce = () => {
        img.src = `${endpoint}?ts=${Date.now()}`;
      };

      const restartTimer = () => {
        if (timer) {
          clearInterval(timer);
          timer = null;
        }
        const ms = Math.max(500, Number(periodInput.value) || 1500);
        timer = setInterval(refreshOnce, ms);
      };

      refreshBtn.addEventListener("click", () => {
        runWithButtonBusy(refreshBtn, "加载中...", async () => {
          refreshOnce();
        }).catch(err => showToast("error", err.message || err));
      });
      applyBtn.addEventListener("click", () => {
        runWithButtonBusy(applyBtn, "保存中...", async () => {
          restartTimer();
          showToast("ok", "已应用刷新间隔");
        }).catch(err => showToast("error", err.message || err));
      });

      tools.appendChild(refreshBtn);
      tools.appendChild(periodInput);
      tools.appendChild(applyBtn);
      body.appendChild(box);
      body.appendChild(hint);
      host.appendChild(card);

      refreshOnce();
      restartTimer();

      registerCleanup(() => {
        if (timer) clearInterval(timer);
      });
    }
    function resolveSchedulerEndpoints(section) {
      const source = section && section.endpoints && typeof section.endpoints === "object" ? section.endpoints : {};
      return Object.assign({
        groups: "/api/scripts/groups",
        detail: "/api/scripts/group/detail",
        library: "/api/scripts/library",
        get: "/api/scripts/group",
        save: "/api/scripts/group/save",
        run: "/api/scripts/run",
        create: "/api/scripts/group/create",
        rename: "/api/scripts/group/rename",
        delete: "/api/scripts/group/delete",
        copy: "/api/scripts/group/copy",
        addItems: "/api/scripts/group/add-items",
        removeItem: "/api/scripts/group/remove-item",
        updateItem: "/api/scripts/group/update-item",
        batchUpdate: "/api/scripts/group/batch-update",
        reorder: "/api/scripts/group/reorder",
        reverse: "/api/scripts/group/reverse",
        setNext: "/api/scripts/group/set-next",
        setNextGroup: "/api/scripts/group/set-next-group",
        runFrom: "/api/scripts/group/run-from",
        exportMerged: "/api/scripts/group/export-merged",
        statusOptions: "/api/options/script-project-statuses",
        scheduleOptions: "/api/options/script-project-schedules"
      }, source);
    }

    async function loadSchedulerGroups(api) {
      const groups = await requestJson(api.groups);
      state.scheduler.groups = Array.isArray(groups) ? groups : [];
      if (state.scheduler.selectedGroup && !state.scheduler.groups.some(g => g.name === state.scheduler.selectedGroup)) {
        state.scheduler.selectedGroup = "";
      }
      if (!state.scheduler.selectedGroup && state.scheduler.groups.length > 0) {
        state.scheduler.selectedGroup = state.scheduler.groups[0].name;
      }
      for (const name of Array.from(state.scheduler.selectedForRun)) {
        if (!state.scheduler.groups.some(g => g.name === name)) {
          state.scheduler.selectedForRun.delete(name);
        }
      }
    }

    async function loadSchedulerDetail(api, name) {
      if (!name) {
        state.scheduler.detail = null;
        state.scheduler.groupJson = "";
        state.scheduler.lastExport = null;
        return;
      }
      const [detail, jsonText] = await Promise.all([
        requestJson(`${api.detail}?name=${encodeURIComponent(name)}`),
        requestText(`${api.get}?name=${encodeURIComponent(name)}`).catch(() => "")
      ]);
      state.scheduler.detail = detail;
      state.scheduler.groupJson = jsonText;
      if (state.scheduler.lastExport && state.scheduler.lastExport.name !== name) {
        state.scheduler.lastExport = null;
      }
    }

    async function loadSchedulerLibrary(api) {
      const data = await requestJson(api.library);
      state.scheduler.library.js = Array.isArray(data.js) ? data.js : [];
      state.scheduler.library.keymouse = Array.isArray(data.keymouse) ? data.keymouse : [];
      state.scheduler.library.pathing = Array.isArray(data.pathing) ? data.pathing : [];
    }

    async function loadSchedulerOptions(api) {
      const [statuses, schedules] = await Promise.all([
        requestJson(api.statusOptions).catch(() => []),
        requestJson(api.scheduleOptions).catch(() => [])
      ]);
      state.scheduler.options.statuses = Array.isArray(statuses) && statuses.length ? statuses : ["Enabled", "Disabled"];
      state.scheduler.options.schedules = Array.isArray(schedules) && schedules.length
        ? schedules
        : ["Daily", "EveryTwoDays", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];
    }

    async function schedulerRefreshAll(api) {
      await Promise.all([loadSchedulerGroups(api), loadSchedulerLibrary(api), loadSchedulerOptions(api)]);
      await loadSchedulerDetail(api, state.scheduler.selectedGroup);
    }

    function applySchedulerPagePreset(expanded) {
      // 始终使用 5 条/页的分页设置
      state.scheduler.groupPageSize = 5;
      state.scheduler.detailPageSize = 5;
      state.scheduler.libraryPageSize = 5;
    }

    function resetSchedulerPager() {
      state.scheduler.groupPage = 1;
      state.scheduler.detailPage = 1;
      state.scheduler.libraryPage.js = 1;
      state.scheduler.libraryPage.keymouse = 1;
      state.scheduler.libraryPage.pathing = 1;
    }

        card.classList.add("is-standalone-workspace");

      }
      applySchedulerPagePreset(state.standaloneMode && state.scheduler.expandedView);
      const left = create("div", "card scheduler-pane");
      const mid = create("div", "card scheduler-pane");
      const right = create("div", "card scheduler-pane");

      root.appendChild(mid);
      root.appendChild(right);
      body.appendChild(root);
      host.appendChild(card);

      const refreshBtn = create("button", "btn", "刷新全部");
      const foldPanesBtn = create("button", "btn", "折叠三区块");
      const unfoldPanesBtn = create("button", "btn", "展开三区块");
      tools.appendChild(refreshBtn);
      const updatePaneActions = () => {
        const paneCollapsed = state.scheduler.paneCollapsed || {};
        const collapsedValues = ["groups", "detail", "library"].map(key => !!paneCollapsed[key]);
        const allCollapsed = collapsedValues.every(Boolean);
        const allExpanded = collapsedValues.every(flag => !flag);
        foldPanesBtn.disabled = allCollapsed;

      if (state.standaloneMode) {

      } else {
        tools.appendChild(foldPanesBtn);
        tools.appendChild(unfoldPanesBtn);
      }

      const draw = () => {
        drawSchedulerGroups(left, api, draw);
        drawSchedulerDetail(mid, api, draw);
        drawSchedulerLibraryAndJson(right, api, draw);
        updatePaneActions();
      };

      refreshBtn.addEventListener("click", async () => {
        try {
          await schedulerRefreshAll(api);
          draw();
          showToast("ok", "调度器数据已刷新");
        } catch (error) {
          showToast("error", error.message || error);
        }
      });

      foldPanesBtn.addEventListener("click", () => {
        state.scheduler.paneCollapsed.groups = true;
        state.scheduler.paneCollapsed.detail = true;
        state.scheduler.paneCollapsed.library = true;
        draw();
        updatePaneActions();
      });

      unfoldPanesBtn.addEventListener("click", () => {
        state.scheduler.paneCollapsed.groups = false;
        state.scheduler.paneCollapsed.detail = false;
        state.scheduler.paneCollapsed.library = false;
        draw();
        updatePaneActions();

      try {
        await schedulerRefreshAll(api);
        draw();
        updateDensityActions();
        updatePaneActions();
      } catch (error) {
        body.appendChild(create("div", "placeholder", `调度器加载失败: ${error.message || error}`));
      }
    }

    function createSchedulerPaneShell(host, paneKey, title, summaryText, redrawAll) {
      const paneState = state.scheduler.paneCollapsed && typeof state.scheduler.paneCollapsed === "object"
        ? state.scheduler.paneCollapsed
        : {};
      if (!Object.prototype.hasOwnProperty.call(paneState, paneKey)) {
        paneState[paneKey] = false;
      }
      state.scheduler.paneCollapsed = paneState;
      const collapsed = !!paneState[paneKey];

      const wrap = create("div", "scheduler-pane-block");
      const head = create("div", "scheduler-pane-head");
      const titleNode = create("h4", "", title);
      const right = create("div", "inline-field");
      if (summaryText) {
        right.appendChild(create("span", "chip", summaryText));
      }
      const toggleBtn = create("button", "btn ghost scheduler-pane-toggle", collapsed ? "显示更多" : "折叠");
      toggleBtn.addEventListener("click", () => {
        paneState[paneKey] = !paneState[paneKey];
        if (typeof redrawAll === "function") {
          redrawAll();
        }
      });
      right.appendChild(toggleBtn);
      head.appendChild(titleNode);
      head.appendChild(right);
      wrap.appendChild(head);

      const body = create("div", "scheduler-pane-content");
      if (collapsed) {
        wrap.appendChild(create("div", "placeholder", "内容已折叠，点击显示更多展开"));
        host.appendChild(wrap);
        return null;
      }

      wrap.appendChild(body);
      host.appendChild(wrap);
      return body;
    }

    function drawSchedulerGroups(host, api, redrawAll) {
      clear(host);
      const paneHost = createSchedulerPaneShell(
        host,
        "groups",
        "配置组",
        l(`${state.scheduler.groups.length} 组`, `${state.scheduler.groups.length} groups`),
        redrawAll
      );
      if (!paneHost) {
        return;
      }

      const ops = create("div", "btn-row");
      const runBtn = create("button", "btn primary", "运行勾选组");
      const createBtn = create("button", "btn", "新建");
      const copyBtn = create("button", "btn", "复制");
      const setNextGroupBtn = create("button", "btn", "设为连续起点");
      const clearNextGroupBtn = create("button", "btn", "清除连续起点");
      const renameBtn = create("button", "btn", "重命名");
      const deleteBtn = create("button", "btn danger", "删除");
      ops.appendChild(runBtn);
      ops.appendChild(createBtn);
      ops.appendChild(copyBtn);
      ops.appendChild(setNextGroupBtn);
      ops.appendChild(clearNextGroupBtn);
      ops.appendChild(renameBtn);
      ops.appendChild(deleteBtn);
