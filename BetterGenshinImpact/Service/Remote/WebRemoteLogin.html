<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>BetterGI Web 登录</title>
  <style>
    :root {
      --safe-top: env(safe-area-inset-top);
      --safe-right: env(safe-area-inset-right);
      --safe-bottom: env(safe-area-inset-bottom);
      --safe-left: env(safe-area-inset-left);
      --bg: #f8f9fb;
      --bg-2: #eef1f5;
      --card: #ffffff;
      --panel: rgba(255, 255, 255, 0.85);
      --line: rgba(31, 31, 40, 0.12);
      --text: #1a1d23;
      --muted: #6b7280;
      --primary: #0f7f9f;
      --primary-hover: #056180;
      --danger: #ef4444;
      --success: #10b981;
      --notice: rgba(15, 127, 159, 0.1);
      --shadow: 0 20px 50px rgba(15, 30, 50, 0.15);
      --shadow-sm: 0 4px 12px rgba(15, 30, 50, 0.08);
      --ui: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text",
        "PingFang SC", "Noto Sans SC", "Segoe UI", sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0a0b0d;
        --bg-2: #1a1b1f;
        --card: #1e1f24;
        --panel: rgba(30, 31, 36, 0.88);
        --line: rgba(255, 255, 255, 0.12);
        --text: #f1f3f5;
        --muted: #9ca3af;
        --primary: #22d3ee;
        --primary-hover: #06b6d4;
        --danger: #f87171;
        --success: #34d399;
        --notice: rgba(34, 211, 238, 0.15);
        --shadow: 0 24px 60px rgba(0, 0, 0, 0.6);
        --shadow-sm: 0 4px 16px rgba(0, 0, 0, 0.3);
      }
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--ui);
      color: var(--text);
      background:
        radial-gradient(60rem 42rem at -12% -15%, rgba(15, 127, 159, 0.18), transparent 62%),
        radial-gradient(48rem 34rem at 112% -10%, rgba(231, 143, 47, 0.14), transparent 64%),
        linear-gradient(180deg, var(--bg), var(--bg-2));
      display: grid;
      place-items: center;
      padding: calc(20px + var(--safe-top)) calc(20px + var(--safe-right))
        calc(20px + var(--safe-bottom)) calc(20px + var(--safe-left));
      transition: background-color .3s ease, color .3s ease;
    }

    .panel {
      width: min(480px, 100%);
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--panel);
      backdrop-filter: saturate(180%) blur(24px);
      -webkit-backdrop-filter: saturate(180%) blur(24px);
      box-shadow: var(--shadow);
      padding: 28px;
      display: grid;
      gap: 18px;
      transition: background-color .3s ease, border-color .3s ease, box-shadow .3s ease;
    }

    .head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .brand {
      margin: 0;
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
      background: linear-gradient(135deg, var(--primary) 0%, #e78f2f 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .lang select {
      min-width: 116px;
    }

    .notice {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--notice);
      color: var(--text);
      padding: 11px 12px;
      font-size: 13px;
      line-height: 1.5;
    }

    .form {
      display: grid;
      gap: 10px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    label {
      font-size: 12px;
      color: var(--muted);
    }

    input, select, button {
      font-family: inherit;
      font-size: 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      padding: 10px 11px;
      transition: border-color .2s ease, box-shadow .2s ease,
        background-color .2s ease, color .2s ease, transform .18s ease;
    }

    input, select {
      width: 100%;
      min-height: 44px;
      color: var(--text);
      background: var(--card);
    }

    input:focus, select:focus, button:focus-visible {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px var(--notice), var(--shadow-sm);
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 9px 10px;
      background: var(--card);
    }

    .remember input {
      width: 16px;
      height: 16px;
      margin: 0;
      padding: 0;
      accent-color: var(--primary);
    }

    .remember span {
      color: var(--muted);
      font-size: 13px;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      cursor: pointer;
      min-height: 44px;
      border-radius: 999px;
      font-weight: 560;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn.primary {
      flex: 1;
      min-width: 150px;
      color: #fff;
      border-color: var(--primary);
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-hover) 100%);
      box-shadow: 0 4px 14px rgba(15, 127, 159, 0.3);
    }

    .btn.primary:hover {
      border-color: var(--primary-hover);
      background: linear-gradient(135deg, var(--primary-hover) 0%, #044d66 100%);
      box-shadow: 0 6px 20px rgba(15, 127, 159, 0.4);
    }

    .btn.ghost {
      color: var(--text);
      background: var(--card);
      border-color: var(--line);
    }

    .error {
      min-height: 18px;
      color: var(--danger);
      font-size: 13px;
      line-height: 1.4;
    }

    .footer {
      border-top: 1px solid var(--line);
      padding-top: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    @media (max-width: 560px) {
      .panel {
        padding: 16px;
        border-radius: 16px;
      }

      .head {
        flex-direction: column;
        align-items: stretch;
      }

      .brand {
        font-size: 24px;
      }

      .lang select {
        width: 100%;
      }

      .actions {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }
    }

    @supports not ((backdrop-filter: blur(1px)) or (-webkit-backdrop-filter: blur(1px))) {
      .panel {
        background: var(--card);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <main class="panel">
    <div class="head">
      <div>
        <h1 class="brand">BetterGI Web</h1>
        <p class="subtitle" data-i18n-base="远程控制登录 / Secure Remote Access">远程控制登录 / Secure Remote Access</p>
      </div>
      <div class="lang">
        <label for="localeSelect" data-i18n-base="语言">语言</label>
        <select id="localeSelect">
          <option value="zh">中文</option>
          <option value="en">English</option>
        </select>
      </div>
    </div>

    <div class="notice" data-i18n-base="为确保安全，Web 远程控制必须先通过账号密码验证。">
      为确保安全，Web 远程控制必须先通过账号密码验证。
    </div>

    <form id="loginForm" class="form" autocomplete="off">
      <div class="field">
        <label for="username" data-i18n-base="账号">账号</label>
        <input id="username" name="username" required data-i18n-placeholder="请输入账号" placeholder="请输入账号">
      </div>
      <div class="field">
        <label for="password" data-i18n-base="密码">密码</label>
        <input id="password" name="password" type="password" required data-i18n-placeholder="请输入密码" placeholder="请输入密码">
      </div>
      <label class="remember">
        <input id="remember" type="checkbox">
        <span data-i18n-base="两周内保持登录">两周内保持登录</span>
      </label>
      <div class="actions">
        <button id="submitBtn" type="submit" class="btn primary" data-i18n-base="登录">登录</button>
        <button id="btnFillAdmin" type="button" class="btn ghost" data-i18n-base="填入默认账号">填入默认账号</button>
      </div>
    </form>

    <div id="errorLine" class="error"></div>

    <div class="footer" data-i18n-base="提示：如未配置账号/密码，请先在桌面端“设置 → Web 远程控制”中完成配置。">
      提示：如未配置账号/密码，请先在桌面端“设置 → Web 远程控制”中完成配置。
    </div>
  </main>

  <script>
    "use strict";

    const LOCALE_STORAGE_KEY = "bgi.webui.locale";
    const FALLBACK_EN = Object.freeze({
      "语言": "Language",
      "远程控制登录 / Secure Remote Access": "Remote Control Login / Secure Remote Access",
      "为确保安全，Web 远程控制必须先通过账号密码验证。": "For security, Web remote control requires account/password verification.",
      "账号": "Username",
      "密码": "Password",
      "请输入账号": "Enter username",
      "请输入密码": "Enter password",
      "两周内保持登录": "Keep me signed in for 2 weeks",
      "登录": "Sign In",
      "登录中...": "Signing in...",
      "填入默认账号": "Use default username",
      "提示：如未配置账号/密码，请先在桌面端“设置 → Web 远程控制”中完成配置。": "Tip: if credentials are not configured, set them in desktop app: Settings -> Web Remote Control.",
      "用户名或密码错误": "Invalid username or password",
      "登录失败": "Login failed",
      "网络请求失败": "Network request failed"
    });

    const ui = {
      localeSelect: document.getElementById("localeSelect"),
      loginForm: document.getElementById("loginForm"),
      username: document.getElementById("username"),
      password: document.getElementById("password"),
      remember: document.getElementById("remember"),
      submitBtn: document.getElementById("submitBtn"),
      btnFillAdmin: document.getElementById("btnFillAdmin"),
      errorLine: document.getElementById("errorLine")
    };

    const state = {
      locale: "zh",
      remoteI18n: { locale: "", map: {} }
    };

    function normalizeLocale(locale) {
      return String(locale || "").toLowerCase().startsWith("en") ? "en" : "zh";
    }

    function loadInitialLocale() {
      try {
        const saved = localStorage.getItem(LOCALE_STORAGE_KEY);
        if (saved) return normalizeLocale(saved);
      } catch {}
      const nav = navigator.language || navigator.userLanguage || "";
      return normalizeLocale(nav);
    }

    function t(zh) {
      const base = String(zh || "");
      if (state.locale !== "en") return base;

      const remoteMap = state.remoteI18n && state.remoteI18n.locale === "en" ? state.remoteI18n.map : null;
      if (remoteMap && Object.prototype.hasOwnProperty.call(remoteMap, base)) {
        return String(remoteMap[base] || base);
      }
      if (Object.prototype.hasOwnProperty.call(FALLBACK_EN, base)) {
        return FALLBACK_EN[base];
      }
      return base;
    }

    function applyI18n() {
      document.documentElement.lang = state.locale === "en" ? "en" : "zh-CN";
      document.title = state.locale === "en" ? "BetterGI Web Login" : "BetterGI Web 登录";

      const textNodes = document.querySelectorAll("[data-i18n-base]");
      for (const node of textNodes) {
        const base = node.getAttribute("data-i18n-base");
        if (!base) continue;
        node.textContent = t(base);
      }

      const placeholders = document.querySelectorAll("[data-i18n-placeholder]");
      for (const node of placeholders) {
        const base = node.getAttribute("data-i18n-placeholder");
        if (!base) continue;
        node.setAttribute("placeholder", t(base));
      }

      if (ui.submitBtn && !ui.submitBtn.disabled) {
        ui.submitBtn.textContent = t("登录");
      }
    }

    function normalizeI18nMap(source) {
      if (!source || typeof source !== "object") {
        return {};
      }
      const map = {};
      for (const [key, value] of Object.entries(source)) {
        if (!key || typeof key !== "string") continue;
        if (value == null) continue;
        const text = String(value);
        if (!text) continue;
        map[key] = text;
      }
      return map;
    }

    async function loadRemoteI18n(locale) {
      if (locale !== "en") {
        state.remoteI18n = { locale: locale, map: {} };
        return;
      }

      try {
        const res = await fetch(`/api/ui/i18n?lang=${encodeURIComponent(locale)}`);
        const data = await res.json();
        state.remoteI18n = {
          locale: "en",
          map: normalizeI18nMap(data && data.map)
        };
      } catch {
        state.remoteI18n = { locale: "en", map: {} };
      }
    }

    async function setLocale(locale) {
      state.locale = normalizeLocale(locale);
      try {
        localStorage.setItem(LOCALE_STORAGE_KEY, state.locale);
      } catch {}
      await loadRemoteI18n(state.locale);
      if (ui.localeSelect) {
        ui.localeSelect.value = state.locale;
      }
      applyI18n();
    }

    function getRedirectPath() {
      const query = new URLSearchParams(window.location.search);
      const redirect = String(query.get("redirect") || "").trim();
      if (!redirect || !redirect.startsWith("/") || redirect.startsWith("//") || redirect.startsWith("/login")) {
        return "/";
      }
      return redirect;
    }

    function setError(message) {
      ui.errorLine.textContent = message ? t(message) : "";
    }

    async function submitLogin(event) {
      event.preventDefault();
      setError("");

      const username = String(ui.username.value || "").trim();
      const password = String(ui.password.value || "");
      if (!username || !password) {
        setError("请输入账号");
        return;
      }

      ui.submitBtn.disabled = true;
      ui.submitBtn.textContent = t("登录中...");
      try {
        const response = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            username,
            password,
            remember: !!ui.remember.checked
          })
        });

        let payload = {};
        try {
          payload = await response.json();
        } catch {}

        if (!response.ok) {
          const message = payload && payload.error ? String(payload.error) : "登录失败";
          setError(message);
          return;
        }

        window.location.assign(getRedirectPath());
      } catch {
        setError("网络请求失败");
      } finally {
        ui.submitBtn.disabled = false;
        ui.submitBtn.textContent = t("登录");
      }
    }

    async function init() {
      ui.loginForm.addEventListener("submit", submitLogin);
      ui.btnFillAdmin.addEventListener("click", () => {
        ui.username.value = "admin";
        ui.username.focus();
      });
      ui.localeSelect.addEventListener("change", () => {
        setLocale(ui.localeSelect.value);
      });

      await setLocale(loadInitialLocale());
      ui.username.focus();
    }

    init().catch(() => {
      setError("登录失败");
    });
  </script>
</body>
</html>
